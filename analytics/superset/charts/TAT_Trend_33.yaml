slice_name: TAT Trend
description: Median and P95 turn-around time over time.
certified_by: null
certification_details: null
viz_type: echarts_timeseries_line
params:
  datasource: 1__table
  viz_type: echarts_timeseries_line
  slice_id: 33
  x_axis: message_dt
  time_grain_sqla: P1W
  metrics:
    - aggregate: null
      column: null
      datasourceWarning: false
      expressionType: SQL
      hasCustomLabel: true
      label: Median TAT (hours)
      optionName: metric_trend_median_tat
      sqlExpression:
        APPROX_PERCENTILE(date_diff('hour', requested_dt, results_report_status_change_dt),
        0.5)
    - aggregate: null
      column: null
      datasourceWarning: false
      expressionType: SQL
      hasCustomLabel: true
      label: P95 TAT (hours)
      optionName: metric_trend_p95_tat
      sqlExpression:
        APPROX_PERCENTILE(date_diff('hour', requested_dt, results_report_status_change_dt),
        0.95)
  groupby: []
  adhoc_filters:
    - clause: WHERE
      subject: message_dt
      operator: TEMPORAL_RANGE
      comparator: No filter
      expressionType: SIMPLE
    - clause: WHERE
      expressionType: SQL
      sqlExpression: requested_dt IS NOT NULL AND results_report_status_change_dt IS
        NOT NULL AND results_report_status_change_dt > requested_dt
      filterOptionName: filter_tat_valid_trend
  row_limit: 10000
  truncate_metric: true
  show_empty_columns: true
  comparison_type: values
  annotation_layers: []
  x_axis_title: Report Date (weekly)
  x_axis_title_margin: 30
  y_axis_title: Hours
  y_axis_title_margin: 30
  y_axis_title_position: Left
  sort_series_type: sum
  sort_series_ascending: false
  color_scheme: presetColors
  time_shift_color: true
  seriesType: line
  show_value: false
  only_total: true
  markerEnabled: true
  markerSize: 6
  zoomable: false
  minorTicks: false
  show_legend: true
  legendType: scroll
  legendOrientation: top
  x_axis_time_format: smart_date
  rich_tooltip: true
  showTooltipTotal: false
  showTooltipPercentage: false
  tooltipTimeFormat: '%Y-%m-%d'
  y_axis_format: ',.1f'
  truncateXAxis: true
  y_axis_bounds:
    - 0
    - null
  extra_form_data: {}
  dashboards:
    - 2
