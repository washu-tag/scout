apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "open-webui-bootstrap.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "open-webui-bootstrap.labels" . | nindent 4 }}
  annotations:
    # Pre-install/pre-upgrade so the ConfigMap exists before the post-install
    # Job tries to mount it. before-hook-creation delete-policy replaces the
    # CM on every upgrade so payload edits propagate.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  bootstrap.py: |-
{{ .Files.Get "files/bootstrap.py" | indent 4 }}
  persistent_config.json: |-
    {{ .Values.persistentConfig | toJson }}
  filters.json: |-
    {{ .Values.filterFunctions | toJson }}
  models.json: |-
    {{ .Values.models | toJson }}
