{{/*
Two deployment shapes share this template:
  * Normal mode: prebuilt image at `image.repository:image.tag`, source
    is baked in, no init container.
  * Test mode (`sourceConfigMap.enabled=true`): use a stock python:slim
    image; an init container pip-installs `requirements.txt` from a
    source ConfigMap into a shared emptyDir; the main container then
    runs `python -m scout_report_viewer` against the same mounted source.

The shared values (envFrom, env, probes, volumes for trino-ca etc.) are
the same in both paths — only the image/command/initContainers/volumes
diverge.
*/}}
{{- $useSrc := .Values.sourceConfigMap.enabled -}}
{{- $srcCMName := default (printf "%s-source" (include "report-viewer-service.fullname" .)) .Values.sourceConfigMap.name -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "report-viewer-service.fullname" . }}
  labels:
    {{- include "report-viewer-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "report-viewer-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Roll the pod when the rendered Secret (DB URL / shared secret /
        # Trino CA) changes, since env values are only read at start.
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- if $useSrc }}
        # In test mode, also roll on source changes — the init container's
        # pip install + the runtime source come from this ConfigMap.
        # Ansible regenerates it from the repo on every `make install-`.
        # NOTE: the configmap isn't shipped by the chart in test mode; it
        # comes from the Ansible role. checksum here is best-effort only.
        scout-report-viewer/test-mode: "true"
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "report-viewer-service.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "report-viewer-service.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}

      {{- if $useSrc }}
      # Init container: untar the source bundle (from the role-managed
      # ConfigMap) into /work, then pip-install runtime deps + the
      # project itself into /deps (emptyDir shared with the main
      # container). Runs with the staging CA bundled when configured so
      # pip can verify the internal Nexus proxy's self-signed cert.
      initContainers:
        - name: pip-install
          image: {{ .Values.sourceConfigMap.pythonImage | quote }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -euo pipefail
              {{- if .Values.sourceConfigMap.stagingCaSecret.name }}
              # Combined CA bundle: system + staging CA → /deps/ca-bundle.crt
              cat /etc/ssl/certs/ca-certificates.crt /etc/pki/staging/{{ .Values.sourceConfigMap.stagingCaSecret.key }} > /deps/ca-bundle.crt
              export PIP_CERT=/deps/ca-bundle.crt
              export SSL_CERT_FILE=/deps/ca-bundle.crt
              {{- end }}
              {{- if .Values.sourceConfigMap.pipIndexUrl }}
              export PIP_INDEX_URL={{ .Values.sourceConfigMap.pipIndexUrl | quote }}
              {{- end }}
              # Untar the source bundle written by the Ansible role.
              # ConfigMap key `source.tar.gz` (binaryData) holds the
              # project tree (src/scout_report_viewer/** + pyproject.toml).
              mkdir -p /work
              tar xzf /src/source.tar.gz -C /work
              # Install runtime deps from the flat requirements.txt (also
              # in the CM as a data key) into the shared emptyDir.
              # `--target` keeps it isolated from the base image's
              # site-packages so PYTHONPATH=/deps wins cleanly.
              pip install --no-cache-dir --target=/deps -r /src/requirements.txt
              # Then install the project itself.
              pip install --no-cache-dir --target=/deps --no-deps /work
              echo "init complete: $(ls /deps | wc -l) entries in /deps"
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          volumeMounts:
            - name: source
              mountPath: /src
            - name: deps
              mountPath: /deps
            {{- if .Values.sourceConfigMap.stagingCaSecret.name }}
            - name: staging-ca
              mountPath: /etc/pki/staging
              readOnly: true
            {{- end }}
          resources:
            requests: {cpu: "100m", memory: "256Mi"}
            limits: {cpu: "1", memory: "1Gi"}
      {{- end }}

      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- if $useSrc }}
          image: {{ .Values.sourceConfigMap.pythonImage | quote }}
          # In test mode, the init container has already populated /deps
          # with the project + its dependencies. PYTHONPATH puts /deps
          # first so `python -m scout_report_viewer` resolves there.
          command: ["python", "-m", "scout_report_viewer"]
          {{- else }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: REPORT_VIEWER_PORT
              value: {{ .Values.service.port | quote }}
            {{- if $useSrc }}
            - name: PYTHONPATH
              value: /deps
            - name: PYTHONUNBUFFERED
              value: "1"
            {{- end }}
            {{- if .Values.trinoCaCert }}
            - name: REPORT_VIEWER_TRINO_CA_CERT
              value: /etc/trino-ca/ca.crt
            {{- end }}
            {{- if .Values.trustedCaSecret.name }}
            # Trust the extra CA bundle for outbound HTTPS (Trino, Keycloak,
            # any upstream behind the staging cert).
            - name: REQUESTS_CA_BUNDLE
              value: /etc/pki/trust/{{ .Values.trustedCaSecret.key }}
            - name: SSL_CERT_FILE
              value: /etc/pki/trust/{{ .Values.trustedCaSecret.key }}
            {{- end }}
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- /* secretEnv: env-from-specific-secret-key references.
                   Map of envName → {secretName, key}. Used to pull
                   per-key references (e.g. the OWUI admin password
                   from the open-webui-secrets Secret) without
                   mounting every key in that secret as an env var.  */}}
            {{- range $envName, $ref := .Values.secretEnv }}
            - name: {{ $envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $ref.secretName | quote }}
                  key: {{ $ref.key | quote }}
                  optional: {{ default false $ref.optional }}
            {{- end }}
          envFrom:
            {{- if or .Values.databaseUrl .Values.devSharedSecret .Values.trinoAuthClientSecret }}
            - secretRef:
                name: {{ include "report-viewer-service.fullname" . }}
            {{- end }}
            {{- with .Values.envFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.trinoCaCert }}
            - name: trino-ca
              mountPath: /etc/trino-ca
              readOnly: true
            {{- end }}
            {{- if .Values.trustedCaSecret.name }}
            - name: trusted-ca
              mountPath: /etc/pki/trust
              readOnly: true
            {{- end }}
            {{- if $useSrc }}
            - name: source
              mountPath: /src
              readOnly: true
            - name: deps
              mountPath: /deps
              readOnly: true
            {{- end }}
      volumes:
        {{- if .Values.trinoCaCert }}
        - name: trino-ca
          secret:
            secretName: {{ include "report-viewer-service.fullname" . }}
            items:
              - key: ca.crt
                path: ca.crt
        {{- end }}
        {{- if .Values.trustedCaSecret.name }}
        - name: trusted-ca
          secret:
            secretName: {{ .Values.trustedCaSecret.name }}
            items:
              - key: {{ .Values.trustedCaSecret.key | quote }}
                path: {{ .Values.trustedCaSecret.key | quote }}
        {{- end }}
        {{- if $useSrc }}
        - name: source
          configMap:
            name: {{ $srcCMName | quote }}
        - name: deps
          emptyDir: {}
        {{- if .Values.sourceConfigMap.stagingCaSecret.name }}
        - name: staging-ca
          secret:
            secretName: {{ .Values.sourceConfigMap.stagingCaSecret.name | quote }}
            items:
              - key: {{ .Values.sourceConfigMap.stagingCaSecret.key | quote }}
                path: {{ .Values.sourceConfigMap.stagingCaSecret.key | quote }}
        {{- end }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
