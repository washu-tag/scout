{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "report-viewer-service.fullname" . }}
  labels:
    {{- include "report-viewer-service.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "report-viewer-service.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
{{- if and .Values.ingress.enabled .Values.ingress.sameOriginAlias.enabled }}
# Same-origin alias. The OWUI chat host (chat.<env>.tag.rcif.io) proxies
# `/spa/...` and the `/api/searches/...` + `/api/reports/...` JSON
# endpoints through to the report-viewer-service. The viewer is served
# from the chat origin, so when OWUI embeds it via `message.embeds`,
# the iframe document is same-origin with the chat page — letting the
# SPA access `window.frameElement` and resize itself to fit content,
# fixing the OWUI 0.9.5 cross-origin auto-resize gap that pinned every
# embedded viewer to 150px tall.
#
# Traefik longest-prefix matching routes `/api/searches/...` and
# `/api/reports/...` here while bare `/api/...` (everything else) still
# resolves to OWUI on the chat host. OWUI's catch-all returns its SPA
# shell for unknown `/api/*` paths rather than 404, so the explicit
# Ingress rules below are what actually splits the traffic.
#
# Capability-style read paths under `/api/searches/{id}/{rows,...}`
# don't need oauth2-proxy auth annotations — the search_id IS the cap
# and the service validates ownership at the DB level.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "report-viewer-service.fullname" . }}-chat-alias
  labels:
    {{- include "report-viewer-service.labels" . | nindent 4 }}
  {{- with .Values.ingress.sameOriginAlias.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.sameOriginAlias.tls }}
  tls:
    {{- range .Values.ingress.sameOriginAlias.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.sameOriginAlias.host | quote }}
      http:
        paths:
          # SPA static + client-side routes. /spa/searches/{id} loads
          # index.html (SpaStaticFiles fallback) and bootstraps the
          # React app.
          - path: /spa
            pathType: Prefix
            backend:
              service:
                name: {{ include "report-viewer-service.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
          # JSON API. The SPA inside the iframe fetches rows / report
          # detail / accessions / CSV from /api/searches/*; the OWUI
          # tools post to /api/reports/* and /api/searches. Longest-
          # prefix match wins over OWUI's catch-all on the same host.
          - path: /api/searches
            pathType: Prefix
            backend:
              service:
                name: {{ include "report-viewer-service.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
          - path: /api/reports
            pathType: Prefix
            backend:
              service:
                name: {{ include "report-viewer-service.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
