# Default values for report-viewer-service.

replicaCount: 1

image:
  repository: ghcr.io/washu-tag/scout-report-viewer-service
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ''
fullnameOverride: ''

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ''

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  className: traefik
  # No default middlewares: this service uses capability-URL auth on
  # read paths (the search id is the cap) so oauth2-proxy can't share
  # cookies across the chat→report-viewer origin. POST writes are JWT-authed
  # in-app. CSP headers are emitted by SecurityHeadersMiddleware in the
  # FastAPI app (with `frame-ancestors` allowing the chat origin),
  # replacing the shared Traefik security-headers middleware which
  # would set `frame-ancestors 'none'` and block the chat iframe.
  annotations: {}
  host: ''
  tls: []

# Restrict ingress to Traefik only. The Authorization-bearer trust model
# (Phase 2) expects in-cluster callers to be (a) Traefik forwarding an
# end-user JWT, or (b) the OWUI tool pod forwarding the same JWT. Direct
# in-cluster reachability would let any pod craft a forged bearer.
# Defence-in-depth (label-based, not cryptographic).
networkPolicy:
  enabled: true
  traefikNamespace: kube-system
  # Optional additional pod selectors that may reach the service on
  # service.port — e.g. the OWUI tool pod once it talks to us directly.
  # Each entry becomes one `from:` block in the NetworkPolicy.
  extraFrom: []

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1
    memory: 1Gi

# Env vars injected as REPORT_VIEWER_* — see scout_report_viewer.config.Settings.
# Populated by the Ansible role's values.yaml.j2 in production.
env: {}

# Optional envFrom (e.g. secretRef for DATABASE_URL).
envFrom: []

# REPORT_VIEWER_DATABASE_URL is sensitive; chart can render a Secret from this
# value, or leave empty to let the role manage the Secret externally.
databaseUrl: ''

# Optional: shared dev secret used in Phase 0/1 before Keycloak JWT lands.
# Empty string disables the shared-header gate.
devSharedSecret: ''

# Trino CA cert (PEM). When set, the chart renders a Secret and mounts it
# at /etc/trino-ca/ca.crt so the service can verify HTTPS Trino.
trinoCaCert: ''

# ---------------------------------------------------------------------------
# Test mode — bypass the published image, run from source mounted as a
# ConfigMap on top of a stock `python:3.12-slim`. Lets us iterate on dev02
# without publishing an image. Per-restart pip install is slow (~30-60s);
# acceptable for dev, never use in prod.
#
# The Ansible role projects `report-viewer-service/src/scout_report_viewer/`
# plus a `requirements.txt` into the ConfigMap referenced here. An init
# container pip-installs into a shared emptyDir; the main container runs
# the source.
# ---------------------------------------------------------------------------
sourceConfigMap:
  enabled: false
  # ConfigMap name — defaults to `<fullname>-source` when unset.
  name: ''
  # Stock image used in test mode. Pinned so an unexpected upstream change
  # doesn't break startup at the worst possible moment.
  pythonImage: python:3.12-slim
  # PIP_INDEX_URL for the init container (typically the air-gapped pip
  # proxy). Empty falls through to PyPI defaults.
  pipIndexUrl: ''
  # When pipIndexUrl is a self-signed-cert host (Scout's air-gapped Nexus),
  # mount the staging CA into the init container via this Secret + key.
  # The secret should be in the same namespace as the deployment.
  stagingCaSecret:
    name: '' # e.g. 'staging-ca-cert'
    key: 'ca.crt'

# Trust an extra CA bundle in BOTH the init container (for pip) and the
# main container (for outbound HTTPS to Trino, Keycloak, etc.). Same
# secret as sourceConfigMap.stagingCaSecret in air-gapped setups.
trustedCaSecret:
  name: ''
  key: 'ca.crt'

nodeSelector: {}
tolerations: []
affinity: {}
