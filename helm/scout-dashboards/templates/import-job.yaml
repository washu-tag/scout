apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "scout-dashboards.fullname" . }}-import
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "scout-dashboards.labels" . | nindent 4 }}
  annotations:
    # Re-create the Job (which re-runs the import) whenever any dashboard YAML
    # or bundle list changes. The hash covers the rendered ConfigMap, so any
    # analytics file edit or .Values.bundles.enabled change produces a
    # different annotation. Helm's hook semantics (post-install,post-upgrade
    # + before-hook-creation) also recreate the Job on every upgrade.
    checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
    "helm.sh/hook-weight": "5"
spec:
  ttlSecondsAfterFinished: {{ .Values.ttlSecondsAfterFinished }}
  backoffLimit: {{ .Values.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "scout-dashboards.selectorLabels" . | nindent 8 }}
        component: dashboard-import
    spec:
      restartPolicy: Never
      containers:
        - name: import
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - secretRef:
                name: {{ .Values.supersetRelease.envSecret }}
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.supersetRelease.valkeyAuthSecret }}
                  key: REDIS_PASSWORD
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              cd /app/dashboard-config
              zip -rq /tmp/dashboard.zip analytics
              # Pre-CLI: heal Database.sqlalchemy_uri so the CLI hits the
              # right Trino endpoint when creating a new dataset. Skipping
              # this risks the CLI aborting on a stale URI before the
              # post-CLI pass can heal it.
              cd /app
              python /app/dashboard-config/import.py /app/dashboard-config/analytics --databases-only
              # Creates new assets only. The v1 importer skips any UUID
              # that already exists, so edited charts/dashboards need the
              # post-CLI pass below.
              cd /app/dashboard-config
              superset import-dashboards -p /tmp/dashboard.zip -u {{ .Values.importUser }}
              # Post-CLI: force-overwrite existing assets by UUID.
              # import-dashboards in 5.0 has no --overwrite flag.
              cd /app
              python /app/dashboard-config/import.py /app/dashboard-config/analytics
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: superset-config
              mountPath: /app/pythonpath
              readOnly: true
            - name: dashboard-config
              mountPath: /app/dashboard-config
              readOnly: true
            {{- if .Values.supersetRelease.trinoCaSecret }}
            # Mirrors the trino-ca mount on the Superset Deployment so the
            # import process's DB_CONNECTION_MUTATOR can verify Trino's
            # self-signed cert at /etc/trino-ca/ca.crt when validating
            # dataset references during import.
            - name: trino-ca
              mountPath: /etc/trino-ca
              readOnly: true
            {{- end }}
      volumes:
        - name: superset-config
          secret:
            secretName: {{ .Values.supersetRelease.configSecret }}
        - name: dashboard-config
          configMap:
            name: dashboard-config
            items:
              {{- include "scout-dashboards.configMapItems" . | nindent 14 }}
        {{- if .Values.supersetRelease.trinoCaSecret }}
        - name: trino-ca
          secret:
            secretName: {{ .Values.supersetRelease.trinoCaSecret }}
            items:
              - key: ca.crt
                path: ca.crt
        {{- end }}
