apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "scout-dashboards.fullname" . }}-import
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "scout-dashboards.labels" . | nindent 4 }}
  annotations:
    # Re-create the Job (which re-runs the import) whenever any dashboard YAML
    # or bundle list changes. The hash covers the rendered ConfigMap, so any
    # analytics file edit or .Values.bundles.enabled change produces a
    # different annotation. Helm's hook semantics (post-install,post-upgrade
    # + before-hook-creation) also recreate the Job on every upgrade, which
    # catches .Values.extraConfigMaps changes that flip volume mounts.
    checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
    "helm.sh/hook-weight": "5"
spec:
  ttlSecondsAfterFinished: {{ .Values.ttlSecondsAfterFinished }}
  backoffLimit: {{ .Values.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "scout-dashboards.selectorLabels" . | nindent 8 }}
        component: dashboard-import
    spec:
      restartPolicy: Never
      containers:
        - name: import
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - secretRef:
                name: {{ .Values.supersetRelease.envSecret }}
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.supersetRelease.valkeyAuthSecret }}
                  key: REDIS_PASSWORD
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              cd /app/dashboard-config
              {{- if .Values.extraConfigMaps }}
              # Merge site-overlay ConfigMaps into analytics/. Each extra
              # ConfigMap is expected to expose items at paths under
              # analytics/ (e.g. items[].path "charts/my_chart.yaml").
              # find+cp preserves the directory structure; later entries
              # in extraConfigMaps overwrite earlier ones on name collision.
              for d in /app/dashboard-config-extras/*/; do
                [ -d "$d" ] || continue
                find "$d" -type f | while read -r f; do
                  rel="${f#$d}"
                  dest="analytics/$rel"
                  mkdir -p "$(dirname "$dest")"
                  cp "$f" "$dest"
                done
              done
              {{- end }}
              zip -rq /tmp/dashboard.zip analytics
              # Creates new assets; v1 importer skips any UUID that already
              # exists, so this alone won't update edited charts/dashboards.
              superset import-dashboards -p /tmp/dashboard.zip -u {{ .Values.importUser }}
              # Force-overwrite params/position/etc. on existing assets by
              # UUID. Required because import-dashboards has no --overwrite
              # flag in 5.0 (only the API does).
              cd /app
              python /app/dashboard-config/import.py /app/dashboard-config/analytics
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: superset-config
              mountPath: /app/pythonpath
              readOnly: true
            - name: dashboard-config
              mountPath: /app/dashboard-config
            {{- range $i, $cm := .Values.extraConfigMaps }}
            - name: extra-{{ $i }}
              mountPath: /app/dashboard-config-extras/{{ $i }}
              readOnly: true
            {{- end }}
      volumes:
        - name: superset-config
          secret:
            secretName: {{ .Values.supersetRelease.configSecret }}
        - name: dashboard-config
          configMap:
            name: dashboard-config
            items:
              {{- include "scout-dashboards.configMapItems" . | nindent 14 }}
        {{- range $i, $cm := .Values.extraConfigMaps }}
        - name: extra-{{ $i }}
          configMap:
            name: {{ $cm }}
        {{- end }}
