# Image for the import Job. Should match the Superset image so it has the same
# Python deps and superset CLI.
image:
  repository: ghcr.io/washu-tag/superset
  tag: 5.0.0
  pullPolicy: IfNotPresent

# Trino connection details that get baked into the Scout Data Lake database YAML.
trino:
  user: admin
  namespace: scout-analytics

# Names of secrets/configmaps already created by the apache/superset Helm
# release. The import Job mounts these so it has the same DB/Redis/config as
# the Superset deployment.
supersetRelease:
  envSecret: superset-env # envFrom (DB connection, secret key)
  configSecret: superset-config # mounted at /app/pythonpath
  valkeyAuthSecret: superset-valkey-auth # REDIS_PASSWORD

# Admin username dashboards are imported as. Must exist in Superset already
# (created by the apache/superset chart's init Job).
importUser: admin

# Built-in dashboard bundles to install. Each name corresponds to a
# subdirectory under files/analytics/{charts,dashboards,datasets/Scout_Data_Lake}/.
# Available built-ins: core, quality, followup.
#
# Adding a new built-in bundle is a matter of dropping files into a new
# subdirectory under each kind and adding its name here — no template
# edits required.
#
# Removing a bundle stops new installs from importing its assets. Assets
# that were already imported into Superset are NOT removed automatically;
# Superset import is one-way. Drop them via the UI or `superset fab` if needed.
bundles:
  enabled:
    - core

# Site-overlay ConfigMaps. Each entry is the name of a ConfigMap in the
# release namespace whose contents are merged into the import. Each
# ConfigMap must structure its items so they map under analytics/ — e.g.
# items with paths like "charts/my_chart.yaml", "dashboards/my_dashboard.yaml",
# "datasets/Scout_Data_Lake/my_dataset.yaml". The Job mounts each one and
# rsync-style copies its tree into a single analytics/ before zipping.
#
# Use this to layer site-specific dashboards on top of the built-in
# bundles without forking the chart. Files with the same name as a
# built-in are overwritten by the overlay (later entries win).
extraConfigMaps: []

# Resources for the import Job pod.
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1
    memory: 1Gi

# How long to keep the completed Job around.
ttlSecondsAfterFinished: 3600

# Backoff for the import script. Set to 1 — if import fails the manifest is bad
# and retrying won't help.
backoffLimit: 1
