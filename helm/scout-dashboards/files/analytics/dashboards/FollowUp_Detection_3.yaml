  MARKDOWN-fu-concordance:
    children: []
    id: MARKDOWN-fu-concordance
    meta:
      code: |
        ### Human Review & Concordance

        These metrics populate after a reviewer exports annotations from the
        Follow-up Detection Voila playbook. Until then they will read as
        zero or "N/A".

        - **Reviewed:** number of reports a reviewer has labeled.
        - **Agreement %:** share of reviewed reports where the model and reviewer agree.
        - **Precision:** of model-flagged reports the reviewer confirmed.
        - **Recall:** of reviewer-confirmed follow-ups the model caught.
      height: 30
      width: 12
    parents:
