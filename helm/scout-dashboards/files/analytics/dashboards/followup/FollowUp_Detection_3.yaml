metadata:
  # Cross-filtering is enabled globally below; per-chart scope overrides
  # would go in `chart_configuration`. Word_cloud (46) has no click handler
  # in Superset 5.0 so it can't emit a cross-filter — table (53), donut (44),
  # bubble (52), and trend line (43) are the click sources.
  chart_configuration: {}
  global_chart_configuration:
    scope:
      rootPath:
        - ROOT_ID
      excluded: []
    chartsInScope:
      - 40
      - 41
      - 42
      - 43
      - 44
      - 46
      - 47
      - 48
      - 49
      - 50
      - 51
      - 52
      - 53
      - 54
