slice_name: Patient age (at latest exam)
description: Age distribution at the patient level (latest_age per scout_patient_id).
  Unlike the exam-level Age chart on the Scout dashboard, frequent fliers don't double-count.
certified_by: null
certification_details: null
viz_type: echarts_timeseries_bar
params:
  datasource: 4__table
  viz_type: echarts_timeseries_bar
  slice_id: 63
  x_axis: latest_age
  metrics:
  - count
  groupby:
  - sex
  adhoc_filters:
  - clause: WHERE
    subject: last_exam_dt
    operator: TEMPORAL_RANGE
    comparator: No filter
    expressionType: SIMPLE
  - clause: WHERE
    subject: latest_age
    operator: <
    operatorId: LESS_THAN
    comparator: 100
    expressionType: SIMPLE
  - clause: WHERE
    subject: sex
    operator: NOT IN
    operatorId: NOT_IN
    comparator:
    - ''
    - null
    expressionType: SIMPLE
  row_limit: 10000
  truncate_metric: true
  show_empty_columns: true
  annotation_layers: []
  orientation: vertical
  x_axis_title: Age at latest exam
  x_axis_title_margin: 30
  y_axis_title: Patients
  y_axis_title_margin: 30
  y_axis_title_position: Left
  sort_series_type: sum
  color_scheme: presetColors
