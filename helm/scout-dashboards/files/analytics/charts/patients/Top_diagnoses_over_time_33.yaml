slice_name: Top diagnoses over time
description: Quarterly patient counts for the top 5 diagnoses (by total patient count).
  Surfaces shifts in case mix that exam-level charts can mask when one patient generates
  many visits in a short window.
certified_by: null
certification_details: null
viz_type: echarts_timeseries_line
params:
  datasource: 6__table
  viz_type: echarts_timeseries_line
  slice_id: 71
  x_axis: message_dt
  time_grain_sqla: P3M
  metrics:
  - distinct_patients
  groupby:
  - diagnosis_code_text
  adhoc_filters:
  - clause: WHERE
    subject: message_dt
    operator: TEMPORAL_RANGE
    comparator: No filter
    expressionType: SIMPLE
  - clause: WHERE
    subject: diagnosis_code
    operator: IS NOT NULL
    operatorId: IS_NOT_NULL
    expressionType: SIMPLE
  series_limit: 5
  series_limit_metric: distinct_patients
  row_limit: 10000
  truncate_metric: true
  show_empty_columns: true
  annotation_layers: []
  orientation: vertical
  x_axis_title: Month
  x_axis_title_margin: 30
  y_axis_title: Distinct patients
  y_axis_title_margin: 30
  y_axis_title_position: Left
  sort_series_type: sum
  sort_series_ascending: false
