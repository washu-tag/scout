slice_name: Follow-up Examples
description: Individual reports the model flagged for follow-up, with the extracted
  snippet alongside the modality and finding category.
certified_by: null
certification_details: null
viz_type: table
params:
  datasource: 3__table
  viz_type: table
  slice_id: 53
  query_mode: raw
  all_columns:
    - modality
    - finding_category
    - followup_snippet
  groupby: []
  metrics: []
  percent_metrics: []
  adhoc_filters:
    - clause: WHERE
      subject: message_dt
      operator: TEMPORAL_RANGE
      comparator: No filter
      expressionType: SIMPLE
