slice_name: About this dashboard
description: Always-on banner with a short description of the follow-up classifier.
  Aggregates COUNT(*) over followup_errors with no HAVING clause so a single row
  is always returned; the Handlebars template renders the description
  unconditionally and appends an amber warning only when the count is non-zero.
certified_by: null
certification_details: null
viz_type: handlebars
params:
  datasource: 5__table
  viz_type: handlebars
  slice_id: 54
  query_mode: aggregate
  groupby: []
  metrics:
    - count
  percent_metrics: []
  adhoc_filters: []
  row_limit: 1
  order_by_cols: []
  server_pagination: false
  styleTemplate: ''
  handlebarsTemplate: |
    <div style="overflow:hidden;color:#334155;font-size:13px;line-height:1.55;padding:2px 4px;">
      <strong style="color:#0f172a;">About the follow-up classifier.</strong>
      Scout scans every radiology report for recommendations of additional
      imaging follow-up, assigning each report a yes/no detection and a
      finding category. Re-run the classifier notebook in Scout Notebooks
      to score new reports.
      {{#each data}}
        {{#if this.count}}
        <div style="margin-top:8px;padding:8px 12px;background:#fef3c7;border-left:3px solid #f59e0b;border-radius:3px;color:#78350f;">
          <strong style="color:#92400e;">&#9888; Classifier errors detected.</strong>
          {{this.count}} recent errors logged — re-run the notebook to retry
          stalled reports.
        </div>
        {{/if}}
      {{/each}}
    </div>
  extra_form_data: {}
  dashboards:
    - 3
  annotation_layers: []
query_context: null
cache_timeout: null
