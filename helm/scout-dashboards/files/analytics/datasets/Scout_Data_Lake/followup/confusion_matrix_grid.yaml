table_name: confusion_matrix_grid
main_dttm_col: null
description: Pre-padded 2x2 confusion-matrix grid. Always returns the four cells
  (TP/FP/FN/TN) so heatmap chart cells render even when a quadrant is empty.
default_endpoint: null
offset: 0
cache_timeout: 7200
catalog: delta
schema: default
sql: |
  SELECT
    CASE WHEN c.human_ground_truth THEN 'Reviewer: Yes' ELSE 'Reviewer: No' END
      AS reviewer,
    CASE WHEN c.followup_detected   THEN 'Model: Yes'    ELSE 'Model: No'    END
      AS model,
    COALESCE(counts.cell_count, 0) AS cell_count,
    -- Signed count for color: positive on the diagonal (concordance, green),
    -- negative off-diagonal (discordance, red). Magnitude == cell_count.
    CASE
      WHEN c.human_ground_truth = c.followup_detected
        THEN  COALESCE(counts.cell_count, 0)
      ELSE -COALESCE(counts.cell_count, 0)
    END AS signed_count
  FROM (
    VALUES
      (TRUE,  TRUE),
      (TRUE,  FALSE),
      (FALSE, TRUE),
      (FALSE, FALSE)
  ) AS c (human_ground_truth, followup_detected)
  LEFT JOIN (
    SELECT
      human_ground_truth,
      followup_detected,
      COUNT(*) AS cell_count
    FROM delta.default.reports_followup
    WHERE human_ground_truth IS NOT NULL
    GROUP BY human_ground_truth, followup_detected
  ) counts
    ON c.human_ground_truth = counts.human_ground_truth
   AND c.followup_detected = counts.followup_detected
