      1.5 cm hyperechoic in right upper lobe".'
    python_date_format: null
    extra: {}
  - column_name: finding_category
    verbose_name: Finding category
    is_dttm: false
    is_active: true
    type: VARCHAR
    advanced_data_type: null
    groupby: true
    filterable: true
    expression: TRIM(SPLIT_PART(followup_finding, ':', 1))
    description: Part of the finding before the first colon, or the whole string
      when there's no colon.
    python_date_format: null
    extra: {}
  - column_name: finding_detail
    verbose_name: Finding detail
    is_dttm: false
    is_active: true
    type: VARCHAR
    advanced_data_type: null
    groupby: true
    filterable: true
    expression: |-
      CASE
        WHEN POSITION(':' IN followup_finding) > 0
          THEN TRIM(SUBSTRING(followup_finding FROM POSITION(':' IN followup_finding) + 1))
        ELSE NULL
      END
    description: Part of the finding after the first colon, or NULL when there's
      no colon.
    python_date_format: null
    extra: {}
