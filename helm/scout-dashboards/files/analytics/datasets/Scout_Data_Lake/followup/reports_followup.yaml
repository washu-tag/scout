table_name: reports_followup
main_dttm_col: message_dt
description: Per-report follow-up classifier output, with optional human ground-truth
  columns that get merged in by the reviewer Voila dashboard.
default_endpoint: null
offset: 0
cache_timeout: 7200
catalog: delta
schema: default
sql: null
params: null
template_params: null
filter_select_enabled: true
fetch_values_predicate: null
extra: null
normalize_columns: false
always_filter_main_dttm: false
uuid: cf33626a-2b35-423b-9a9d-7d8e62a6b021
metrics:
  - metric_name: count
    verbose_name: COUNT(*)
    metric_type: count
    expression: COUNT(*)
    description: null
    d3format: null
    currency: null
    extra:
      warning_markdown: ''
    warning_text: null
  - metric_name: processed_count
    verbose_name: Reports processed
    metric_type: null
    expression: SUM(CASE WHEN followup_processed_at IS NOT NULL THEN 1 ELSE 0 END)
    description: Reports the classifier has scored at least once.
    d3format: ',d'
    currency: null
    extra:
      warning_markdown: ''
    warning_text: null
  - metric_name: detection_rate
    verbose_name: '% follow-up detected'
    metric_type: null
    expression: 100.0 * SUM(CASE WHEN followup_detected = TRUE THEN 1 ELSE 0 END) /
      NULLIF(SUM(CASE WHEN followup_processed_at IS NOT NULL THEN 1 ELSE 0 END), 0)
    description: Share of processed reports flagged for follow-up.
    d3format: ',.1f'
    currency: null
    extra:
      warning_markdown: ''
    warning_text: null
  - metric_name: reviewed_count
    verbose_name: Reviewed
    metric_type: null
    expression: SUM(CASE WHEN human_reviewed_at IS NOT NULL AND human_ground_truth IS
      NOT NULL THEN 1 ELSE 0 END)
    description: Reports a human reviewer has labeled with a definitive ground truth.
    d3format: ',d'
    currency: null
    extra:
      warning_markdown: ''
    warning_text: null
  - metric_name: agreement_pct
    verbose_name: Agreement %
    metric_type: null
    expression: 100.0 * SUM(CASE WHEN human_ground_truth IS NOT NULL AND followup_detected
      = human_ground_truth THEN 1 ELSE 0 END) / NULLIF(SUM(CASE WHEN human_ground_truth
      IS NOT NULL THEN 1 ELSE 0 END), 0)
    description: Fraction of reviewed reports where the model and the human agree.
    d3format: ',.1f'
    currency: null
    extra:
      warning_markdown: ''
    warning_text: null
  - metric_name: precision_pct
    verbose_name: Precision %
    metric_type: null
    expression: 100.0 * SUM(CASE WHEN followup_detected = TRUE AND human_ground_truth
      = TRUE THEN 1 ELSE 0 END) / NULLIF(SUM(CASE WHEN followup_detected = TRUE AND
      human_ground_truth IS NOT NULL THEN 1 ELSE 0 END), 0)
    description: Of reports the model flagged among reviewed ones, what fraction the
      human confirmed.
    d3format: ',.1f'
    currency: null
    extra:
      warning_markdown: ''
    warning_text: null
  - metric_name: recall_pct
    verbose_name: Recall %
    metric_type: null
    expression: 100.0 * SUM(CASE WHEN followup_detected = TRUE AND human_ground_truth
      = TRUE THEN 1 ELSE 0 END) / NULLIF(SUM(CASE WHEN human_ground_truth = TRUE THEN
      1 ELSE 0 END), 0)
    description: Of reports the human said needed follow-up, what fraction the model
      caught.
    d3format: ',.1f'
    currency: null
    extra:
      warning_markdown: ''
    warning_text: null
