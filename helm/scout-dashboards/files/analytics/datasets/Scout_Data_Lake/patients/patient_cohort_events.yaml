table_name: patient_cohort_events
main_dttm_col: event_dt
description: One row per exam from reports_latest_epic_view, tagged 'new' in the patient's
  first calendar month and 'returning' in any later month. event_dt is the exam date
  (observation_dt) when present, falling back to the order date then the HL7 message
  date — observation_dt alone is sparsely populated, so the fallback keeps every exam
  on the timeline. Each patient is 'new' exactly once (their debut month) and 'returning'
  in each later month they appear — never both in the same month.
default_endpoint: null
offset: 0
cache_timeout: 300
catalog: delta
schema: default
sql: |-
  SELECT
    scout_patient_id,
    event_dt,
    modality,
    sending_facility,
    resolved_epic_mrn,
    CASE WHEN date_trunc('month', event_dt)
           = date_trunc('month', MIN(event_dt) OVER (PARTITION BY scout_patient_id))
         THEN 'new'
         ELSE 'returning'
    END AS cohort
  FROM (
    SELECT
      scout_patient_id,
      COALESCE(observation_dt, requested_dt, message_dt) AS event_dt,
      modality,
      sending_facility,
      resolved_epic_mrn
    FROM delta.default.reports_latest_epic_view
  )
  WHERE event_dt IS NOT NULL
