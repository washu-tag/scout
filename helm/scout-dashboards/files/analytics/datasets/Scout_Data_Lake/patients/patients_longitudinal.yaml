table_name: patients_longitudinal
main_dttm_col: last_exam_dt
description: One row per reconciled patient (scout_patient_id), with aggregates over
  reports_latest_epic_view and reports_dx_epic_view. Drives all patient-level charts
  on the Patients (Longitudinal) dashboard — every COUNT is at the patient level, not
  the exam level. First/last exam dates use the exam date when present, falling back
  to order then HL7 message date (observation_dt alone is sparsely populated), so the
  dashboard date filter scopes by a reliably-populated date.
default_endpoint: null
offset: 0
cache_timeout: 300
catalog: delta
schema: default
sql: |-
  WITH exams AS (
    SELECT
      scout_patient_id,
      COALESCE(observation_dt, requested_dt, message_dt) AS event_dt,
      modality,
      sex,
      race,
      ethnic_group,
      patient_age,
      sending_facility,
      resolved_epic_mrn,
      resolved_mpi
    FROM delta.default.reports_latest_epic_view
  ),
  patient_base AS (
    SELECT
      scout_patient_id,
      COUNT(*) AS exam_count,
      COUNT(DISTINCT modality) AS modality_count,
      MIN(event_dt) AS first_exam_dt,
      MAX(event_dt) AS last_exam_dt,
      DATE_DIFF('day', MIN(event_dt), MAX(event_dt)) AS span_days,
      MAX(sex) AS sex,
      MAX(race) AS race,
      MAX(ethnic_group) AS ethnic_group,
      MAX(patient_age) AS latest_age,
      MIN(patient_age) AS first_age,
      MAX(sending_facility) AS sending_facility,
      MAX(resolved_epic_mrn) AS resolved_epic_mrn,
      MAX(resolved_mpi) AS resolved_mpi
    FROM exams
    GROUP BY scout_patient_id
  ),
  patient_dx AS (
    SELECT
      scout_patient_id,
      COUNT(DISTINCT diagnosis_code) AS distinct_diagnoses
    FROM delta.default.reports_dx_epic_view
    WHERE diagnosis_code IS NOT NULL
    GROUP BY scout_patient_id
  )
  SELECT
    p.scout_patient_id,
    p.exam_count,
    p.modality_count,
    p.first_exam_dt,
    p.last_exam_dt,
    p.span_days,
    p.sex,
    p.race,
    p.ethnic_group,
    p.latest_age,
    p.first_age,
    p.sending_facility,
    p.resolved_epic_mrn,
    p.resolved_mpi,
    COALESCE(d.distinct_diagnoses, 0) AS distinct_diagnoses,
    CASE WHEN p.exam_count = 1 THEN '1'
         WHEN p.exam_count = 2 THEN '2'
         WHEN p.exam_count BETWEEN 3 AND 5 THEN '3-5'
         WHEN p.exam_count BETWEEN 6 AND 10 THEN '6-10'
         ELSE '11+'
    END AS exam_count_bucket,
    CASE WHEN p.modality_count = 1 THEN '1'
         WHEN p.modality_count = 2 THEN '2'
         ELSE '3+'
    END AS modality_count_bucket
  FROM patient_base p
  LEFT JOIN patient_dx d ON p.scout_patient_id = d.scout_patient_id
