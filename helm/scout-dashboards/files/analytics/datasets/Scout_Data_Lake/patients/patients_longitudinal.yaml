metrics:
- metric_name: pct_returning
  verbose_name: '% patients with 2+ exams'
  metric_type: null
  expression: 100.0 * SUM(CASE WHEN exam_count >= 2 THEN 1 ELSE 0 END) / NULLIF(COUNT(*),
    0)
  description: Share of patients who appear in the lake with more than one exam.
  d3format: ',.1f'
  currency: null
  extra:
    warning_markdown: ''
  warning_text: null
- metric_name: avg_distinct_diagnoses
  verbose_name: Avg distinct diagnoses per patient
  metric_type: null
  expression: AVG(distinct_diagnoses)
