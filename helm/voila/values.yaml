# Default values for voila.

replicaCount: 1

image:
  repository: ghcr.io/washu-tag/scout-notebook
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ''
fullnameOverride: ''

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ''

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 8866

ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: >-
      kube-system-oauth2-proxy-error@kubernetescrd,
      kube-system-oauth2-proxy-auth@kubernetescrd
  host: ''
  tls: []

# Restrict ingress to Voila's port to Traefik only. The X-Trino-User
# impersonation trust model depends on it: any in-cluster pod able to reach
# Voila directly could forge X-Auth-Request-Preferred-Username and impersonate
# arbitrary users. Defence-in-depth (label-based, not cryptographic).
networkPolicy:
  enabled: true
  traefikNamespace: kube-system

# Resource limits - sized for POC with multiple concurrent users
# Each dashboard view spawns a kernel, so memory can grow quickly
resources:
  requests:
    cpu: 500m
    memory: 2Gi
  limits:
    cpu: 2
    memory: 8Gi

# List of playbook names to mount from ConfigMaps (created externally by Ansible with the name format playbook-<name>)
playbooks: []

# Environment variables for Trino connectivity — populated by the
# voila role's values.yaml.j2 (TRINO_HOST/PORT/SCHEME/CATALOG/SCHEMA,
# plus Keycloak vars for the voila_svc impersonation flow). The chart
# leaves this empty so role-supplied env wins cleanly via Helm's
# dict-merge (a default key here would persist even when the role
# omits it, since merge doesn't delete).
env: {}

# voila_svc Keycloak client secret for the client_credentials JWT mint
# (ADR 0022). The Ansible role injects it from keycloak_voila_svc_client_secret;
# the chart renders it into the voila-svc-keycloak Secret (templates/secret.yaml).
# Under GitOps, leave this empty and supply a Secret named voila-svc-keycloak
# from an external secret manager instead.
voilaSvcClientSecret: ''

# KEYCLOAK_VOILA_SVC_CLIENT_SECRET is pulled from the chart-managed Secret.
envFrom:
  - secretRef:
      name: voila-svc-keycloak

nodeSelector: {}

tolerations: []

affinity: {}
