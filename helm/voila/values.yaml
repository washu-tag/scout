# Default values for voila.

replicaCount: 1

image:
  repository: ghcr.io/washu-tag/pyspark-notebook
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ''
fullnameOverride: ''

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ''

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 8866

ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: >-
      kube-system-oauth2-proxy-error@kubernetescrd,
      kube-system-oauth2-proxy-auth@kubernetescrd
  host: ''
  tls: []

# Resource limits - sized for POC with multiple concurrent users
# Each dashboard view spawns a kernel, so memory can grow quickly
resources:
  requests:
    cpu: 500m
    memory: 2Gi
  limits:
    cpu: 2
    memory: 8Gi

# List of playbook names to mount from ConfigMaps (created externally by Ansible with the name format playbook-<name>)
playbooks: []

# Dynamic playbooks configuration
# When enabled, creates a PVC for dynamically-published playbooks
dynamicPlaybooks:
  enabled: false
  storageSize: 1Gi
  # storageClassName: ""  # Optional: use default if not specified

# Name of the ConfigMap containing spark-defaults.conf (created externally by Ansible)
sparkConfigMapName: spark-defaults

# Environment variables for Trino connectivity
# S3/Spark settings come from spark-defaults.conf ConfigMap
env:
  TRINO_HOST: trino.trino
  TRINO_PORT: '8080'
  TRINO_SCHEME: http
  TRINO_USER: scout
  TRINO_CATALOG: delta
  TRINO_SCHEMA: default
  # Make pyspark importable from the bundled Spark distro at $SPARK_HOME.
  # The base image ships pyspark + py4j on disk but doesn't expose them on
  # PYTHONPATH for Voilà-launched kernels (JupyterHub gets this for free via
  # Spark's startup-script chain; Voilà bypasses it). Setting PYTHONPATH here
  # avoids needing a per-playbook environment.yml just for pyspark, since
  # nothing else currently diverges from the base image. If/when a playbook
  # needs different/conflicting deps, switch that one to a per-playbook
  # environment.yml-driven kernel instead of expanding this list.
  PYTHONPATH: /usr/local/spark/python/lib/py4j-0.10.9.7-src.zip:/usr/local/spark/python

nodeSelector: {}

tolerations: []

affinity: {}
