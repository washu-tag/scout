apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "voila.fullname" . }}
  labels:
    {{- include "voila.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "voila.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Roll the pod when the mounted helpers or the svc-account secret
        # change: subPath ConfigMap mounts don't hot-update, and envFrom
        # secret values are only read at container start.
        checksum/scout-python: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/voila-svc-keycloak: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "voila.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "voila.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - voila
            - /home/jovyan/notebooks
            - --port=8866
            - --no-browser
            - --Voila.ip=0.0.0.0
            - --VoilaConfiguration.file_allowlist=[".*"]
          ports:
            - name: http
              containerPort: 8866
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- range .Values.playbooks }}
            - name: playbook-{{ . }}
              mountPath: /home/jovyan/notebooks/{{ . }}
              readOnly: true
            {{- end }}
            # Voila reads its config from /etc/jupyter/voila.py (subPath mount).
            - name: scout-python
              mountPath: /etc/jupyter/voila.py
              subPath: voila.py
              readOnly: true
            # Helper modules (voila_runtime, playbook_helpers) importable on
            # PYTHONPATH (/opt/scout) by the Voila server + spawned kernels.
            # voila.py is deliberately NOT projected here: PYTHONPATH sits ahead
            # of site-packages, so a voila.py under /opt/scout would shadow the
            # `voila` package and crash the server at startup (`import voila`
            # would resolve to the config file, which references the config-only
            # global `c`). scout-python-lib projects the importable helpers only.
            - name: scout-python-lib
              mountPath: /opt/scout
              readOnly: true
            - name: trino-ca
              mountPath: /etc/trino-ca
              readOnly: true
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        {{- range .Values.playbooks }}
        - name: playbook-{{ . }}
          configMap:
            name: voila-playbook-{{ . }}
        {{- end }}
        - name: scout-python
          configMap:
            name: voila-scout-python
        # Importable helpers only (no voila.py) for the /opt/scout PYTHONPATH
        # mount — see the volumeMount comment. New chart-shipped helper modules
        # must be listed here too, or they won't be importable.
        - name: scout-python-lib
          configMap:
            name: voila-scout-python
            items:
              - key: voila_runtime.py
                path: voila_runtime.py
              - key: playbook_helpers.py
                path: playbook_helpers.py
        - name: trino-ca
          secret:
            secretName: trino-tls
            # Tolerate the Secret being briefly missing -- cert-manager
            # issues it as part of the analytics playbook, so during a
            # cold deploy or a cert renewal there's a window where the
            # Secret doesn't exist yet. With `optional: true`, the Pod
            # starts (mount is empty) instead of hanging until the
            # 15m helm-install timeout. The scout SDK passes
            # `verify=$TRINO_CA_CERT` to requests; with no file at
            # that path, the scout SDK's TLS handshake fails with
            # FileNotFoundError rather than silently bypassing verification
            # -- queries error out loudly until kubelet's next Secret-volume sync
            # picks up the issued Secret (~60s default).
            optional: true
            items:
              - key: ca.crt
                path: ca.crt
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
