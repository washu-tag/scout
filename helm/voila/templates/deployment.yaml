apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "voila.fullname" . }}
  labels:
    {{- include "voila.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "voila.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "voila.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "voila.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - voila
            - /home/jovyan/notebooks
            - --port=8866
            - --no-browser
            - --Voila.ip=0.0.0.0
            - --VoilaConfiguration.file_allowlist=[".*"]
          ports:
            - name: http
              containerPort: 8866
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- range .Values.playbooks }}
            - name: playbook-{{ . }}
              mountPath: /home/jovyan/notebooks/{{ . }}
              readOnly: true
            {{- end }}
            - name: scout-python
              mountPath: /opt/scout/scout_trino.py
              subPath: scout_trino.py
              readOnly: true
            - name: scout-python
              mountPath: /opt/scout/scout_voila.py
              subPath: scout_voila.py
              readOnly: true
            - name: scout-python
              mountPath: /etc/jupyter/voila.py
              subPath: voila.py
              readOnly: true
            - name: trino-ca
              mountPath: /etc/trino-ca
              readOnly: true
            - name: exports
              mountPath: /home/jovyan/notebooks/exports
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        {{- range .Values.playbooks }}
        - name: playbook-{{ . }}
          configMap:
            name: voila-playbook-{{ . }}
        {{- end }}
        - name: scout-python
          configMap:
            name: voila-scout-python
        - name: trino-ca
          secret:
            secretName: trino-tls
            items:
              - key: ca.crt
                path: ca.crt
        - name: exports
          emptyDir: {}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
