{{- if or .Values.databaseUrl .Values.trinoCaCert .Values.trinoAuthClientSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "report-viewer.fullname" . }}
  labels:
    {{- include "report-viewer.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.databaseUrl }}
  REPORT_VIEWER_DATABASE_URL: {{ .Values.databaseUrl | quote }}
  {{- end }}
  {{- if .Values.trinoAuthClientSecret }}
  REPORT_VIEWER_TRINO_AUTH_CLIENT_SECRET: {{ .Values.trinoAuthClientSecret | quote }}
  {{- end }}
  {{- if .Values.trinoCaCert }}
  ca.crt: {{ .Values.trinoCaCert | quote }}
  {{- end }}
{{- end }}
