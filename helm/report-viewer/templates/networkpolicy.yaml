{{- if .Values.networkPolicy.enabled }}
# Restrict ingress to Traefik (the browser path comes through oauth2-proxy
# at the ingress) plus any optional explicit peers. The Authorization-
# bearer trust model assumes incoming requests carry an unforged end-user
# JWT — defence-in-depth, label-based, not cryptographic.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "report-viewer.fullname" . }}-ingress
  labels:
    {{- include "report-viewer.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "report-viewer.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.traefikNamespace | quote }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
    {{- with .Values.networkPolicy.extraFrom }}
    - from:
        {{- toYaml . | nindent 8 }}
      ports:
        - protocol: TCP
          port: {{ $.Values.service.port }}
    {{- end }}
{{- end }}
