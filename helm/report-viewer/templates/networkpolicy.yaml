{{- if .Values.networkPolicy.enabled }}
# Narrows who can reach the service (Traefik plus optional peers). Not the
# auth gate: the bearer path is cryptographic and the header path is gated
# by the gateway secret. Defence-in-depth, label-based.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "report-viewer.fullname" . }}-ingress
  labels:
    {{- include "report-viewer.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "report-viewer.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.traefikNamespace | quote }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
    {{- with .Values.networkPolicy.extraFrom }}
    - from:
        {{- toYaml . | nindent 8 }}
      ports:
        - protocol: TCP
          port: {{ $.Values.service.port }}
    {{- end }}
{{- end }}
