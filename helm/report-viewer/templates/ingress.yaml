{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "report-viewer.fullname" . }}
  labels:
    {{- include "report-viewer.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    # External surface is /api (SPA fetches) and /spa (the React bundle).
    # /metrics, /healthz, /docs are in-cluster only.
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "report-viewer.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
          - path: /spa
            pathType: Prefix
            backend:
              service:
                name: {{ include "report-viewer.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
