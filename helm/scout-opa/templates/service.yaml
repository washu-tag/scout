apiVersion: v1
kind: Service
metadata:
  name: {{ include "scout-opa.fullname" . }}
  labels:
    {{- include "scout-opa.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "scout-opa.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
