{{- if .Values.managementConsole.enabled }}
# Lets Traefik speak HTTPS to the WildFly management port over the in-cluster hop.
# insecureSkipVerify is required because that port presents the dcm4chee image's BAKED-IN demo
# cert (CN=dcm4che, issued by the IHE Europe "Gazelle" test CA, keystore password "secret") —
# not a Scout cert. It is unverifiable by design: the Gazelle CA is in no trust store, the CN
# does not match the backend service DNS, and the keypair ships publicly in every dcm4chee image.
# This is only the internal pod-to-pod hop; real TLS to the browser uses Scout's cert-manager
# wildcard and is terminated at the ingress. To verify instead, replace the WildFly management
# keystore with a cert-manager cert and set rootCAsSecrets here — low value for an internal hop.
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: arc-management-transport
  labels:
    {{- include "dcm4chee.labels" . | nindent 4 }}
spec:
  insecureSkipVerify: true
{{- end }}
