# Batcher route: consume HL7 messages from Kafka in batches, zip each batch, upload it to object
# storage (bronze), publish the archive's S3 key back to Kafka as a manifest, then commit.
#
# Uses the Camel Kafka batching consumer (batching=true): it accumulates records across polls
# until maxPollRecords OR pollTimeoutMs of inactivity, then delivers the whole batch as one
# exchange (body = List of child exchanges). That lets hl7BatchZipper build the archive in a
# single O(n) pass instead of the O(n^2) rewrite ZipAggregationStrategy incurs per message.
#
# Delivery is at-least-once: autoCommitEnable=false + allowManualCommit=true, and
# kafkaBatchCommitter commits the batch's offsets only at the very end — after the S3 upload and
# manifest publish succeed. A crash mid-batch therefore replays the batch rather than dropping it
# (auto-commit would advance offsets as records enter the route, before the durable write).
#
# Config values are Camel property placeholders resolved from the Deployment env.
- route:
    id: batchHl7Messages
    from:
      uri: 'kafka:{{kafka.hl7.topic}}?brokers={{kafka.brokers}}&groupId={{hl7.batcher.group.id}}&autoOffsetReset=earliest&batching=true&allowManualCommit=true&autoCommitEnable=false&maxPollRecords={{hl7.batcher.max.poll.records}}&pollTimeoutMs={{hl7.batcher.poll.timeout.ms}}'
      steps:
        - setHeader:
            name: CamelAwsS3Key
            expression:
              simple: 'hl7-batches/${date:now:yyyy/MM/dd}/batch-${date:now:HHmmssSSS}.zip'
        - process:
            ref: hl7BatchZipper
        - log:
            message: 'Uploading batch to S3: bucket={{s3.bucket}}, key=${header.CamelAwsS3Key}'
            loggingLevel: INFO
        - to:
            uri: 'aws2-s3://{{s3.bucket}}?region={{aws.region}}&useDefaultCredentialsProvider={{s3.use.default.creds}}&overrideEndpoint={{s3.override.endpoint}}&uriEndpointOverride={{s3.endpoint:}}&forcePathStyle={{s3.force.path.style}}&accessKey=RAW({{aws.access.key:}})&secretKey=RAW({{aws.secret.key:}})'
        - log:
            message: 'S3 upload successful: ${header.CamelAwsS3Key}, eTag=${header.CamelAwsS3ETag}'
            loggingLevel: INFO
        - setBody:
            expression:
              simple: '${header.CamelAwsS3Key}'
        - to:
            uri: 'kafka:{{kafka.hl7.batches.topic}}?brokers={{kafka.brokers}}'
        - log:
            message: 'Published batch manifest to Kafka: topic={{kafka.hl7.batches.topic}}, s3Key=${body}'
            loggingLevel: INFO
        - process:
            ref: kafkaBatchCommitter
