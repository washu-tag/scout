spring.application.name=hl7-listener
camel.springboot.name=hl7-listener

# Each deployment loads only the route(s) it is responsible for, selected by the
# CAMEL_MAIN_ROUTES_INCLUDE_PATTERN env var set on the Deployment (listener / batcher /
# test-sender). Defaults to the listener so a bare run still does something useful.
camel.main.routes-include-pattern=classpath:camel/listener.camel.yaml

# Camel micrometer meters (route + context level) surfaced on the Actuator Prometheus
# endpoint. The route-policy meters carry the routeId/eventType tags the HL7 Listener
# dashboards and alerts key on.
camel.metrics.enable-route-policy=true
camel.metrics.enable-exchange-event-notifier=true
camel.metrics.enable-message-history=false

# Only health (k8s liveness/readiness probes) and prometheus (in-cluster scrape on :8080,
# never exposed via the external MLLP Service) are enabled — the minimal set this app needs.
# nosemgrep: java.spring.security.audit.spring-actuator-non-health-enabled.spring-actuator-dangerous-endpoints-enabled
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}
