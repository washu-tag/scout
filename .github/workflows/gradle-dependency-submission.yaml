name: Gradle Dependency Submission

# Submits resolved Gradle dependencies to the GitHub dependency graph so that
# Dependabot can detect CVEs in transitive Java deps (including Spring Boot
# BOM-managed versions, which static manifest parsing cannot resolve).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

env:
  JAVA_DIST: 'zulu'
  JAVA_VERSION: '21'

jobs:
  hl7log-extractor:
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to submit to the dependency graph
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: ${{ env.JAVA_DIST }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/dependency-submission@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          build-root-directory: extractor/hl7log-extractor
          # Submit only the deps that ship in the artifact. Compile/test
          # classpaths (e.g. the Keycloak server APIs the event-listener
          # builds against) otherwise generate Dependabot alerts for code
          # we never distribute.
          dependency-graph-include-configurations: 'runtimeClasspath'

  keycloak-event-listener:
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to submit to the dependency graph
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: ${{ env.JAVA_DIST }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/dependency-submission@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          build-root-directory: keycloak/event-listener
          dependency-graph-include-configurations: 'runtimeClasspath'
