name: Post-Commit Tasks

on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches:
      - main
      - 'ci-**'
      - 'demo**'

env:
  JAVA_DIST: 'zulu'
  JAVA_VERSION: '21'
  REGISTRY: ghcr.io

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      ci: ${{ steps.filter.outputs.ci }}
      hl7log-extractor: ${{ steps.filter.outputs.hl7log-extractor }}
      hl7-transformer: ${{ steps.filter.outputs.hl7-transformer }}
      pyspark-notebook: ${{ steps.filter.outputs.pyspark-notebook }}
      launchpad: ${{ steps.filter.outputs.launchpad }}
      superset: ${{ steps.filter.outputs.superset }}
      keycloak: ${{ steps.filter.outputs.keycloak }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            ci:
              - '.github/workflows/**'
              - '.github/actions/**'
            hl7log-extractor:
              - 'extractor/hl7log-extractor/**'
              - 'linting_java_checkstyle.xml'
            hl7-transformer:
              - 'extractor/hl7-transformer/**'
            pyspark-notebook:
              - 'helm/jupyter/notebook/**'
            launchpad:
              - 'launchpad/**'
            superset:
              - 'helm/superset/**'
            keycloak:
              - 'keycloak/**'
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'
      - uses: actions/setup-java@v5
        with:
          distribution: ${{ ENV.JAVA_DIST }}
          java-version: ${{ ENV.JAVA_VERSION }}
          cache: 'gradle'
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
  build-and-upload:
    runs-on: ubuntu-latest
    needs: changes
    permissions:
      contents: read
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include: &image-matrix
          - image-name: hl7log-extractor
            subproject: extractor/hl7log-extractor
          - image-name: hl7-transformer
            subproject: extractor/hl7-transformer
            allow-failure: true
          - image-name: pyspark-notebook
            subproject: helm/jupyter/notebook
            allow-failure: true
          - image-name: launchpad
            subproject: launchpad
          - image-name: superset
            subproject: helm/superset
            allow-failure: true
          - image-name: keycloak
            subproject: keycloak
            allow-failure: true
    steps:
      - uses: actions/checkout@v6
      - name: 'Check if image exists'
        id: check-image
        uses: ./.github/actions/check-image-exists
        with:
          subproject: ${{ matrix.subproject }}
          image-name: ${{ matrix.image-name }}
      - name: 'Build/Cache Image - ${{ matrix.image-name }}'
        if: needs.changes.outputs[matrix.image-name] == 'true' || steps.check-image.outputs.exists == 'false' || needs.changes.outputs.ci == 'true'
        uses: ./.github/actions/docker-build-cache
        with:
          subproject: ${{ matrix.subproject }}
          image-name: ${{ matrix.image-name }}
  unit-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: ${{ ENV.JAVA_DIST }}
          java-version: ${{ ENV.JAVA_VERSION }}
          cache: 'gradle'
      - name: 'Unit tests: hl7log-extractor'
        shell: bash
        run: cd extractor/hl7log-extractor && ./gradlew test
  ansible-and-python-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'
      - name: Install Molecule and dependencies
        run: |
          pip install molecule ansible-core pytest pydantic tiktoken httpx pytest-asyncio
      - name: 'Unit tests: filter plugins'
        shell: bash
        run: cd ansible && pytest tests/unit/filter_plugins/ -v
      - name: 'Unit tests: Open WebUI link sanitizer filter'
        shell: bash
        run: cd ansible/roles/open-webui/files && pytest test_link_sanitizer_filter.py -v
      - name: 'Unit tests: Open WebUI context summarization filter'
        shell: bash
        run: cd ansible/roles/open-webui/files && pytest test_context_summarization_filter.py -v
      - name: 'Unit tests: verify-node'
        shell: bash
        run: cd verify-node && pytest tests/ -v
      - name: 'Molecule tests: postgres role'
        shell: bash
        run: cd ansible/roles/postgres && molecule test -s default
      - name: 'Molecule tests: scout_common role'
        shell: bash
        run: cd ansible/roles/scout_common && molecule test -s default
  scan-images:
    runs-on: ubuntu-latest
    needs: build-and-upload
    if: ${{ !cancelled() && needs.build-and-upload.result == 'success' }}
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include: *image-matrix
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/trivy-scan-image
        with:
          image-name: ${{ matrix.image-name }}
          subproject: ${{ matrix.subproject }}
        continue-on-error: ${{ matrix.allow-failure == true }}
  deploy-and-test:
    runs-on: ubuntu-latest
    needs:
      - lint
      - build-and-upload
      - unit-test
      - ansible-and-python-tests
    permissions:
      contents: read
      packages: read
    env:
      KUBECONFIG: /etc/rancher/k3s/k3s.yaml
    steps:
      - uses: actions/checkout@v6
      - name: 'Free up disk space'
        shell: bash
        run: |
          echo "Disk space before cleanup:"
          df -h

          echo "Removing unnecessary tools to free up disk space..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/swift
          sudo rm -rf /opt/ghc
          sudo apt-get clean
          docker system prune -af --volumes

          echo "Disk space after cleanup:"
          df -h
      - name: 'Prepare inventory.yaml'
        shell: bash
        run: |
          NODE_IP=$(hostname -I | awk '{print $1}')
          sed -e "s/HOSTNAME/$(hostname)/" -e "s/K3S_TOKEN/$(openssl rand -hex 16)/" \
            -e "s:WORK_DIR:$(pwd):" -e "s/NODE_IP/$NODE_IP/g" \
            .github/ci_resources/inventory.yaml > ansible/inventory.yaml
      - name: 'ansible-galaxy dependencies'
        shell: bash
        run: cd ansible && sudo -E /opt/pipx_bin/ansible-galaxy install -r collections/requirements.yaml
      - name: Install Python dependencies for Ansible Kubernetes modules
        run: |
          /opt/pipx/venvs/ansible-core/bin/python -m pip install kubernetes
      - name: 'Install k3s'
        shell: bash
        run: |
          cd ansible && sudo -E /opt/pipx_bin/ansible-playbook -v -i inventory.yaml --diff playbooks/k3s.yaml
      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ ENV.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 'Push image to k3s - hl7log-extractor'
        uses: ./.github/actions/k3s-image-import-or-pull
        with:
          subproject: extractor/hl7log-extractor
          image-name: hl7log-extractor
      - name: 'Push image to k3s - hl7-transformer'
        uses: ./.github/actions/k3s-image-import-or-pull
        with:
          subproject: extractor/hl7-transformer
          image-name: hl7-transformer
      - name: 'Install helm and helm diff'
        shell: bash
        run: cd ansible && sudo -E /opt/pipx_bin/ansible-playbook -v -i inventory.yaml --diff playbooks/helm.yaml
      - name: 'Install postgres'
        shell: bash
        run: |
          cd ansible && sudo -E /opt/pipx_bin/ansible-playbook -v -i inventory.yaml --diff playbooks/postgres.yaml
      - name: 'Install lake'
        shell: bash
        run: |
          cd ansible && sudo -E /opt/pipx_bin/ansible-playbook -v -i inventory.yaml --diff playbooks/lake.yaml
          sudo -E kubectl describe pod -l v1.min.io/tenant=minio-scout -n scout-data
      - name: 'Install orchestrator'
        shell: bash
        run: |
          cd ansible && sudo -E /opt/pipx_bin/ansible-playbook -i inventory.yaml --diff playbooks/orchestrator.yaml
      - name: 'Install extractor'
        shell: bash
        run: |
          # Background watcher that captures transformer pod state during the
          # install. Helm runs with atomic=true, so on failure the deployment
          # is uninstalled before any post-step logging can fire — this gives
          # us snapshots from just before the rollback.
          (
            while true; do
              echo "=== watcher: $(date -u +%H:%M:%S) ==="
              sudo -E kubectl -n scout-extractor get pods -l app.kubernetes.io/name=hl7-transformer 2>/dev/null || true
              sudo -E kubectl -n scout-extractor logs --tail=20 -l app.kubernetes.io/name=hl7-transformer --all-containers=true 2>/dev/null || true
              sleep 30
            done
          ) &
          WATCHER_PID=$!
          trap "kill $WATCHER_PID 2>/dev/null || true" EXIT
          cd ansible && sudo -E /opt/pipx_bin/ansible-playbook -i inventory.yaml --diff playbooks/extractor.yaml
      - name: 'Run tests'
        shell: bash
        run: |
          cp .github/ci_resources/test_config_template.json tests/ingest/src/test/resources/config/local.json
          sed -i "s:WORK_DIR:$(pwd):" .github/ci_resources/tests-job.yaml
          sudo -E kubectl apply -f .github/ci_resources/tests-job.yaml
          sudo -E kubectl wait --for=condition=complete --timeout=900s job/ci-tests -n scout-extractor &
          completion_pid=$!
          sudo -E kubectl wait --for=condition=failed --timeout=900s job/ci-tests -n scout-extractor && exit 1 &
          failure_pid=$!
          wait -n $completion_pid $failure_pid
      - name: Test Logs
        shell: bash
        if: always()
        run: |
          sudo -E kubectl -n scout-extractor logs job/ci-tests
      - name: Test Summary
        uses: test-summary/action@31493c76ec9e7aa675f1585d3ed6f1da69269a86 # v2.4
        if: always()
        with:
          paths: 'tests/ingest/**/TEST-*.xml'
          show: 'fail, skip'
      - name: Logging (hl7log-extractor)
        shell: bash
        if: always()
        run: |
          sudo -E kubectl -n scout-extractor logs deployment/hl7log-extractor
      - name: Logging (hl7-transformer)
        shell: bash
        if: always()
        run: |
          sudo -E kubectl -n scout-extractor logs deployment/hl7-transformer
  smoke-test:
    runs-on: ubuntu-latest
    needs:
      - lint
      - build-and-upload
    permissions:
      contents: read
      packages: read
    env:
      KUBECONFIG: /etc/rancher/k3s/k3s.yaml
    steps:
      - uses: actions/checkout@v6
      - name: 'Free up disk space'
        shell: bash
        run: |
          echo "Disk space before cleanup:"
          df -h
          echo "Removing unnecessary tools to free up disk space..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/swift
          sudo rm -rf /opt/ghc
          sudo apt-get clean
          docker system prune -af --volumes
          echo "Disk space after cleanup:"
          df -h
      - name: 'Generate TLS certificates and configure /etc/hosts'
        shell: bash
        run: |
          # Generate self-signed wildcard cert for *.scout.test
          mkdir -p /tmp/scout-ci-tls
          openssl req -x509 -newkey rsa:2048 -keyout /tmp/scout-ci-tls/key.pem \
            -out /tmp/scout-ci-tls/cert.pem -days 1 -nodes \
            -subj "/CN=scout.test" \
            -addext "subjectAltName=DNS:scout.test,DNS:*.scout.test,DNS:*.jupyter.scout.test"
          # Trust the self-signed cert so curl validates it in auth tests
          sudo cp /tmp/scout-ci-tls/cert.pem /usr/local/share/ca-certificates/scout-ci.crt
          sudo update-ca-certificates
          # Add /etc/hosts entries for subdomain routing (BEFORE deployment)
          {
            echo "127.0.0.1 scout.test"
            for sub in superset jupyter grafana keycloak auth temporal minio chat playbooks testuser.jupyter; do
              echo "127.0.0.1 ${sub}.scout.test"
            done
          } | sudo tee -a /etc/hosts
      - name: 'Prepare inventory.yaml'
        shell: bash
        run: |
          NODE_IP=$(hostname -I | awk '{print $1}')
          echo "Node IP for CoreDNS: $NODE_IP"
          sed -e "s/HOSTNAME/$(hostname)/" -e "s/K3S_TOKEN/$(openssl rand -hex 16)/" \
            -e "s:WORK_DIR:$(pwd):" -e "s/NODE_IP/$NODE_IP/g" \
            .github/ci_resources/inventory.yaml > ansible/inventory.yaml
      - name: 'ansible-galaxy dependencies'
        shell: bash
        run: cd ansible && sudo -E /opt/pipx_bin/ansible-galaxy install -r collections/requirements.yaml
      - name: Install Python dependencies for Ansible Kubernetes modules
        run: /opt/pipx/venvs/ansible-core/bin/python -m pip install kubernetes
      - name: 'Install k3s'
        shell: bash
        run: cd ansible && sudo -E /opt/pipx_bin/ansible-playbook -v -i inventory.yaml --diff playbooks/k3s.yaml
      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Import ALL custom images into k3s
      - name: 'Push image to k3s - superset'
        uses: ./.github/actions/k3s-image-import-or-pull
        with:
          subproject: helm/superset
          image-name: superset
      - name: 'Push image to k3s - keycloak'
        uses: ./.github/actions/k3s-image-import-or-pull
        with:
          subproject: keycloak
          image-name: keycloak
      - name: 'Push image to k3s - launchpad'
        uses: ./.github/actions/k3s-image-import-or-pull
        with:
          subproject: launchpad
          image-name: launchpad
      - name: 'Push image to k3s - pyspark-notebook'
        uses: ./.github/actions/k3s-image-import-or-pull
        with:
          subproject: helm/jupyter/notebook
          image-name: pyspark-notebook
      - name: 'Install helm and helm diff'
        shell: bash
        run: cd ansible && sudo -E /opt/pipx_bin/ansible-playbook -v -i inventory.yaml --diff playbooks/helm.yaml
      # Deploy services not covered by deploy-and-test job
      # Skipped: orchestrator (Cassandra+ES+Temporal) and extractor — tested in deploy-and-test
      # Auto-skipped by missing config: staging, gpu, scout clone
      - name: 'Deploy Scout services'
        shell: bash
        run: |
          cd ansible
          for playbook in k3s traefik postgres valkey auth lake chatbot voila analytics jupyter monitor launchpad; do
            echo "=== Deploying $playbook ==="
            sudo -E /opt/pipx_bin/ansible-playbook -i inventory.yaml --diff "playbooks/${playbook}.yaml"
          done
      # Health checks — verify all services rolled out
      - name: 'Service health checks'
        shell: bash
        run: |
          echo "=== Checking Hive Metastore ==="
          sudo -E kubectl rollout status deployment/hive-metastore -n scout-data --timeout=180s
          echo "=== Checking Trino ==="
          sudo -E kubectl rollout status deployment/trino-coordinator -n scout-analytics --timeout=180s
          sudo -E kubectl rollout status deployment/trino-worker -n scout-analytics --timeout=180s
          echo "=== Checking Prometheus ==="
          sudo -E kubectl rollout status deployment/prometheus-server -n scout-monitoring --timeout=180s
          echo "=== Checking Grafana ==="
          sudo -E kubectl rollout status deployment/grafana -n scout-monitoring --timeout=180s
          echo "=== Checking Loki ==="
          sudo -E kubectl rollout status statefulset/loki -n scout-monitoring --timeout=180s
          echo "=== All pods ==="
          sudo -E kubectl get pods -A
      # Trino connectivity check
      - name: 'Trino connectivity check'
        shell: bash
        run: |
          sudo -E kubectl exec -n scout-analytics deployment/trino-coordinator -- trino \
            --execute "SHOW CATALOGS; SHOW SCHEMAS FROM delta"
      # Auth tests — verify OAuth2 Proxy blocks unauthenticated access
      - name: 'Auth curl tests'
        shell: bash
        run: bash tests/auth/auth-curl-tests.sh scout.test
      # NetworkPolicy tests — verify trino-rw ingress restrictions
      - name: 'NetworkPolicy tests'
        shell: bash
        run: KUBECTL='sudo -E kubectl' bash tests/network/network-policy-tests.sh
      # Diagnostic logging on failure
      - name: 'Debug - pod status'
        if: failure()
        shell: bash
        run: |
          sudo -E kubectl get pods -A
          sudo -E kubectl get events -A --sort-by='.lastTimestamp' | tail -50
      - name: 'Debug - all pod logs'
        if: failure()
        shell: bash
        run: |
          for ns in $(sudo -E kubectl get ns -o jsonpath='{.items[*].metadata.name}'); do
            for pod in $(sudo -E kubectl get pods -n "$ns" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
              echo "=== $ns/$pod ==="
              sudo -E kubectl logs -n "$ns" "$pod" --all-containers --tail=30 --previous 2>/dev/null || \
              sudo -E kubectl logs -n "$ns" "$pod" --all-containers --tail=30 2>/dev/null || true
            done
          done
  publish:
    if: github.ref_name == 'main' && needs.deploy-and-test.result == 'success' && needs.smoke-test.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    needs: [changes, deploy-and-test, scan-images, smoke-test]
    steps:
      - name: Checkout GitHub Action
        uses: actions/checkout@v6
      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ ENV.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Free up disk space
        shell: bash
        run: |
          echo "Disk space before cleanup:"
          df -h

          echo "Removing unnecessary tools to free up disk space..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/swift
          sudo rm -rf /opt/ghc
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          docker system prune -af --volumes

          echo "Disk space after cleanup:"
          df -h
      - name: 'Push Image - hl7log-extractor'
        if: needs.changes.outputs.hl7log-extractor == 'true'
        uses: ./.github/actions/docker-push
        with:
          image-name: hl7log-extractor
      - name: 'Push Image - hl7-transformer'
        if: needs.changes.outputs.hl7-transformer == 'true'
        uses: ./.github/actions/docker-push
        with:
          image-name: hl7-transformer
      - name: 'Push Image - pyspark-notebook'
        if: needs.changes.outputs.pyspark-notebook == 'true'
        uses: ./.github/actions/docker-push
        with:
          image-name: pyspark-notebook
      - name: 'Push Image - launchpad'
        if: needs.changes.outputs.launchpad == 'true'
        uses: ./.github/actions/docker-push
        with:
          image-name: launchpad
      - name: 'Push Image - superset'
        if: needs.changes.outputs.superset == 'true'
        uses: ./.github/actions/docker-push
        with:
          image-name: superset
      - name: 'Push Image - keycloak'
        if: needs.changes.outputs.keycloak == 'true'
        uses: ./.github/actions/docker-push
        with:
          image-name: keycloak
  publish-demo:
    if: startsWith(github.ref_name, 'demo') && needs.deploy-and-test.result == 'success' && needs.smoke-test.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    needs: [changes, deploy-and-test, scan-images, smoke-test]
    steps:
      - name: Checkout GitHub Action
        uses: actions/checkout@v6
      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ ENV.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Free up disk space
        shell: bash
        run: |
          echo "Disk space before cleanup:"
          df -h

          echo "Removing unnecessary tools to free up disk space..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/swift
          sudo rm -rf /opt/ghc
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          docker system prune -af --volumes

          echo "Disk space after cleanup:"
          df -h
      - name: 'Push Image - pyspark-notebook'
        if: needs.changes.outputs.pyspark-notebook == 'true'
        uses: ./.github/actions/docker-push
        with:
          image-name: pyspark-notebook
      - name: 'Push Image - hl7log-extractor'
        if: needs.changes.outputs.hl7log-extractor == 'true'
        uses: ./.github/actions/docker-push
        with:
          image-name: hl7log-extractor
      - name: 'Push Image - hl7-transformer'
        if: needs.changes.outputs.hl7-transformer == 'true'
        uses: ./.github/actions/docker-push
        with:
          image-name: hl7-transformer
      - name: 'Push Image - launchpad'
        if: needs.changes.outputs.launchpad == 'true'
        uses: ./.github/actions/docker-push
        with:
          image-name: launchpad
      - name: 'Push Image - superset'
        if: needs.changes.outputs.superset == 'true'
        uses: ./.github/actions/docker-push
        with:
          image-name: superset
      - name: 'Push Image - keycloak'
        if: needs.changes.outputs.keycloak == 'true'
        uses: ./.github/actions/docker-push
        with:
          image-name: keycloak
