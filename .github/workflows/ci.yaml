name: Post-Commit Tasks

on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches:
      - main
      - 'ci-**'
      - 'demo**'

env:
  JAVA_DIST: 'zulu'
  JAVA_VERSION: '21'
  REGISTRY: ghcr.io

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      ci: ${{ steps.filter.outputs.ci }}
      hl7log-extractor: ${{ steps.filter.outputs.hl7log-extractor }}
      hl7-transformer: ${{ steps.filter.outputs.hl7-transformer }}
      scout-notebook: ${{ steps.filter.outputs.scout-notebook }}
      launchpad: ${{ steps.filter.outputs.launchpad }}
      superset: ${{ steps.filter.outputs.superset }}
      keycloak: ${{ steps.filter.outputs.keycloak }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            ci:
              - '.github/workflows/**'
              - '.github/actions/**'
            hl7log-extractor:
              - 'extractor/hl7log-extractor/**'
              - 'linting_java_checkstyle.xml'
            hl7-transformer:
              - 'extractor/hl7-transformer/**'
            scout-notebook:
              - 'helm/scout-notebook/**'
            launchpad:
              - 'launchpad/**'
            superset:
              - 'helm/superset/**'
            keycloak:
              - 'keycloak/**'
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'
      - uses: actions/setup-java@v5
        with:
          distribution: ${{ ENV.JAVA_DIST }}
          java-version: ${{ ENV.JAVA_VERSION }}
          cache: 'gradle'
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
  build-and-upload:
    runs-on: ubuntu-latest
    needs: changes
    permissions:
      contents: read
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include: &image-matrix
          - image-name: hl7log-extractor
            subproject: extractor/hl7log-extractor
          - image-name: hl7-transformer
            subproject: extractor/hl7-transformer
            allow-failure: true
          - image-name: scout-notebook
            subproject: helm/scout-notebook
            allow-failure: true
          - image-name: launchpad
            subproject: launchpad
          - image-name: superset
            subproject: helm/superset
            allow-failure: true
          - image-name: keycloak
            subproject: keycloak
            allow-failure: true
    steps:
      - uses: actions/checkout@v6
      - name: 'Check if image exists'
        id: check-image
        uses: ./.github/actions/check-image-exists
        with:
          subproject: ${{ matrix.subproject }}
          image-name: ${{ matrix.image-name }}
      - name: 'Build/Cache Image - ${{ matrix.image-name }}'
        if: needs.changes.outputs[matrix.image-name] == 'true' || steps.check-image.outputs.exists == 'false' || needs.changes.outputs.ci == 'true'
        uses: ./.github/actions/docker-build-cache
        with:
          subproject: ${{ matrix.subproject }}
          image-name: ${{ matrix.image-name }}
  unit-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: ${{ ENV.JAVA_DIST }}
          java-version: ${{ ENV.JAVA_VERSION }}
          cache: 'gradle'
      - name: 'Unit tests: hl7log-extractor'
        shell: bash
        run: cd extractor/hl7log-extractor && ./gradlew test
      - name: 'Unit tests: keycloak event-listener'
        shell: bash
        run: cd keycloak/event-listener && ./gradlew test
  ansible-and-python-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'
      - name: Install Molecule and dependencies
        run: |
          pip install molecule ansible-core pytest pydantic tiktoken httpx pytest-asyncio
      - name: 'Unit tests: filter plugins'
        shell: bash
        run: cd ansible && pytest tests/unit/filter_plugins/ -v
      - name: 'Unit tests: Open WebUI link sanitizer filter'
        shell: bash
        run: cd helm/open-webui-bootstrap && PYTHONPATH=files/payloads pytest tests/test_link_sanitizer_filter.py -v
      - name: 'Unit tests: Open WebUI context summarization filter'
        shell: bash
        run: cd helm/open-webui-bootstrap && PYTHONPATH=files/payloads pytest tests/test_context_summarization_filter.py -v
      - name: 'Unit tests: Open WebUI tool result attribute migrator filter'
        shell: bash
        run: cd helm/open-webui-bootstrap && PYTHONPATH=files/payloads pytest tests/test_tool_result_attr_filter.py -v
      - name: 'Unit tests: verify-node'
        shell: bash
        run: cd verify-node && pytest tests/ -v
      - name: 'Install OPA'
        shell: bash
        # Pinned to match the OPA image we deploy (opa_image_tag in
        # group_vars/all/versions.yaml). Builtin behavior — especially
        # `regex.match` and `http.send` semantics — can drift across
        # OPA versions; testing against the same binary the policy will
        # evaluate under in production keeps test/prod aligned.
        run: |
          OPA_VERSION=$(yq '.opa_image_tag' ansible/group_vars/all/versions.yaml)
          curl -fsSL -o /tmp/opa "https://openpolicyagent.org/downloads/v${OPA_VERSION}/opa_linux_amd64_static"
          chmod +x /tmp/opa
          sudo mv /tmp/opa /usr/local/bin/opa
          opa version
      - name: 'Unit tests: OPA policy (Trino AuthZ)'
        shell: bash
        run: opa test policy/ -v
      - name: 'Molecule tests: postgres role'
        shell: bash
        run: cd ansible/roles/postgres && molecule test -s default
      - name: 'Molecule tests: scout_common role'
        shell: bash
        run: cd ansible/roles/scout_common && molecule test -s default
  scan-images:
    runs-on: ubuntu-latest
    needs: build-and-upload
    if: ${{ !cancelled() && needs.build-and-upload.result == 'success' }}
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include: *image-matrix
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/trivy-scan-image
        with:
          image-name: ${{ matrix.image-name }}
          subproject: ${{ matrix.subproject }}
        continue-on-error: ${{ matrix.allow-failure == true }}
  deploy-and-test:
    runs-on: ubuntu-latest
    needs:
      - lint
      - build-and-upload
      - unit-test
      - ansible-and-python-tests
    permissions:
      contents: read
      packages: read
    env:
      KUBECONFIG: /etc/rancher/k3s/k3s.yaml
    steps:
      - uses: actions/checkout@v6
      - name: 'Free up disk space'
        shell: bash
        run: |
          echo "Disk space before cleanup:"
          df -h

          echo "Removing unnecessary tools to free up disk space..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/swift
          sudo rm -rf /opt/ghc
          sudo apt-get clean
          docker system prune -af --volumes

          echo "Disk space after cleanup:"
          df -h
      - name: 'Prepare inventory.yaml'
        shell: bash
        run: |
          NODE_IP=$(hostname -I | awk '{print $1}')
          sed -e "s/HOSTNAME/$(hostname)/" -e "s/K3S_TOKEN/$(openssl rand -hex 16)/" \
            -e "s:WORK_DIR:$(pwd):" -e "s/NODE_IP/$NODE_IP/g" \
            .github/ci_resources/inventory.yaml > ansible/inventory.yaml
      - name: 'ansible-galaxy dependencies'
        shell: bash
        run: cd ansible && sudo -E /opt/pipx_bin/ansible-galaxy install -r collections/requirements.yaml
      - name: Install Python dependencies for Ansible Kubernetes modules
        run: |
          /opt/pipx/venvs/ansible-core/bin/python -m pip install kubernetes
      - name: 'Install k3s'
        shell: bash
        run: |
          cd ansible && sudo -E /opt/pipx_bin/ansible-playbook -v -i inventory.yaml --diff playbooks/k3s.yaml
      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ ENV.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 'Push image to k3s - hl7log-extractor'
        uses: ./.github/actions/k3s-image-import-or-pull
        with:
          subproject: extractor/hl7log-extractor
          image-name: hl7log-extractor
      - name: 'Push image to k3s - hl7-transformer'
        uses: ./.github/actions/k3s-image-import-or-pull
        with:
          subproject: extractor/hl7-transformer
          image-name: hl7-transformer
      - name: 'Install helm and helm diff'
        shell: bash
        run: cd ansible && sudo -E /opt/pipx_bin/ansible-playbook -v -i inventory.yaml --diff playbooks/helm.yaml
      - name: 'Install postgres'
        shell: bash
        run: |
          cd ansible && sudo -E /opt/pipx_bin/ansible-playbook -v -i inventory.yaml --diff playbooks/postgres.yaml
      - name: 'Install lake'
        shell: bash
        run: |
          cd ansible && sudo -E /opt/pipx_bin/ansible-playbook -v -i inventory.yaml --diff playbooks/lake.yaml
          sudo -E kubectl describe pod -l v1.min.io/tenant=minio-scout -n scout-data
      - name: 'Install orchestrator'
        shell: bash
        run: |
          cd ansible && sudo -E /opt/pipx_bin/ansible-playbook -i inventory.yaml --diff playbooks/orchestrator.yaml
      - name: 'Install extractor'
        shell: bash
        run: |
          cd ansible && sudo -E /opt/pipx_bin/ansible-playbook -i inventory.yaml --diff playbooks/extractor.yaml
      - name: 'Run tests'
        shell: bash
        run: |
          cp .github/ci_resources/test_config_template.json tests/ingest/src/test/resources/config/local.json
          sed -i "s:WORK_DIR:$(pwd):" .github/ci_resources/tests-job.yaml
          sudo -E kubectl apply -f .github/ci_resources/tests-job.yaml
          sudo -E kubectl wait --for=condition=complete --timeout=1800s job/ci-tests -n scout-extractor &
          completion_pid=$!
          sudo -E kubectl wait --for=condition=failed --timeout=1800s job/ci-tests -n scout-extractor && exit 1 &
          failure_pid=$!
          wait -n $completion_pid $failure_pid
      - name: Test Logs
        shell: bash
        if: always()
        run: |
          sudo -E kubectl -n scout-extractor logs job/ci-tests
      - name: Test Summary
        uses: test-summary/action@37b508cfee6d4d080eedd00b5bb240a6a784a6a5 # v2.6
        if: always()
        with:
          paths: 'tests/ingest/**/TEST-*.xml'
          show: 'fail, skip'
      - name: Logging (hl7log-extractor)
        shell: bash
        if: always()
        run: |
          sudo -E kubectl -n scout-extractor logs deployment/hl7log-extractor
      - name: Logging (hl7-transformer)
        shell: bash
        if: always()
        run: |
          sudo -E kubectl -n scout-extractor logs deployment/hl7-transformer
  smoke-test:
    runs-on: ubuntu-latest
    needs:
      - lint
      - build-and-upload
    permissions:
      contents: read
      packages: read
    env:
      KUBECONFIG: /etc/rancher/k3s/k3s.yaml
    steps:
      - uses: actions/checkout@v6
      - name: 'Free up disk space'
        shell: bash
        run: |
          echo "Disk space before cleanup:"
          df -h
          echo "Removing unnecessary tools to free up disk space..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/swift
          sudo rm -rf /opt/ghc
          sudo apt-get clean
          docker system prune -af --volumes
          echo "Disk space after cleanup:"
          df -h
      - name: 'Generate TLS certificates and configure /etc/hosts'
        shell: bash
        run: |
          # Generate self-signed wildcard cert for *.scout.test
          mkdir -p /tmp/scout-ci-tls
          openssl req -x509 -newkey rsa:2048 -keyout /tmp/scout-ci-tls/key.pem \
            -out /tmp/scout-ci-tls/cert.pem -days 1 -nodes \
            -subj "/CN=scout.test" \
            -addext "subjectAltName=DNS:scout.test,DNS:*.scout.test,DNS:*.jupyter.scout.test"
          # Trust the self-signed cert so curl validates it in auth tests
          sudo cp /tmp/scout-ci-tls/cert.pem /usr/local/share/ca-certificates/scout-ci.crt
          sudo update-ca-certificates
          # Add /etc/hosts entries for subdomain routing (BEFORE deployment)
          {
            echo "127.0.0.1 scout.test"
            for sub in superset jupyter grafana keycloak auth temporal minio chat playbooks testuser.jupyter; do
              echo "127.0.0.1 ${sub}.scout.test"
            done
          } | sudo tee -a /etc/hosts
      - name: 'Prepare inventory.yaml'
        shell: bash
        run: |
          NODE_IP=$(hostname -I | awk '{print $1}')
          echo "Node IP for CoreDNS: $NODE_IP"
          sed -e "s/HOSTNAME/$(hostname)/" -e "s/K3S_TOKEN/$(openssl rand -hex 16)/" \
            -e "s:WORK_DIR:$(pwd):" -e "s/NODE_IP/$NODE_IP/g" \
            .github/ci_resources/inventory.yaml > ansible/inventory.yaml
      - name: 'ansible-galaxy dependencies'
        shell: bash
        run: cd ansible && sudo -E /opt/pipx_bin/ansible-galaxy install -r collections/requirements.yaml
      - name: Install Python dependencies for Ansible Kubernetes modules
        run: /opt/pipx/venvs/ansible-core/bin/python -m pip install kubernetes
      - name: 'Install k3s'
        shell: bash
        run: cd ansible && sudo -E /opt/pipx_bin/ansible-playbook -v -i inventory.yaml --diff playbooks/k3s.yaml
      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Import ALL custom images into k3s
      - name: 'Push image to k3s - superset'
        uses: ./.github/actions/k3s-image-import-or-pull
        with:
          subproject: helm/superset
          image-name: superset
      - name: 'Push image to k3s - keycloak'
        uses: ./.github/actions/k3s-image-import-or-pull
        with:
          subproject: keycloak
          image-name: keycloak
      - name: 'Push image to k3s - launchpad'
        uses: ./.github/actions/k3s-image-import-or-pull
        with:
          subproject: launchpad
          image-name: launchpad
      - name: 'Push image to k3s - scout-notebook'
        uses: ./.github/actions/k3s-image-import-or-pull
        with:
          subproject: helm/scout-notebook
          image-name: scout-notebook
      # hl7-transformer image is needed by the data-authorization seed
      # Job (writes the synthetic test_reports Delta table via PySpark
      # + Hive-Metastore-registered saveAsTable). The transformer
      # itself isn't deployed in smoke-test (no extractor playbook),
      # we just reuse the image as a vehicle for its Spark + Delta +
      # s3a + Hive client.
      - name: 'Push image to k3s - hl7-transformer'
        uses: ./.github/actions/k3s-image-import-or-pull
        with:
          subproject: extractor/hl7-transformer
          image-name: hl7-transformer
      - name: 'Install helm and helm diff'
        shell: bash
        run: cd ansible && sudo -E /opt/pipx_bin/ansible-playbook -v -i inventory.yaml --diff playbooks/helm.yaml
      # Deploy services not covered by deploy-and-test job
      # Skipped: orchestrator (Cassandra+ES+Temporal) and extractor — tested in deploy-and-test
      # Auto-skipped by missing config: staging, gpu, scout clone
      - name: 'Deploy Scout services'
        shell: bash
        run: |
          cd ansible
          for playbook in k3s traefik postgres valkey auth lake chatbot voila analytics jupyter monitor launchpad; do
            echo "=== Deploying $playbook ==="
            sudo -E /opt/pipx_bin/ansible-playbook -i inventory.yaml --diff "playbooks/${playbook}.yaml"
          done
      # Health checks — verify all services rolled out
      - name: 'Service health checks'
        shell: bash
        run: |
          echo "=== Checking Hive Metastore ==="
          sudo -E kubectl rollout status deployment/hive-metastore -n scout-data --timeout=180s
          echo "=== Checking Trino ==="
          sudo -E kubectl rollout status deployment/trino-coordinator -n scout-analytics --timeout=180s
          sudo -E kubectl rollout status deployment/trino-worker -n scout-analytics --timeout=180s
          echo "=== Checking Prometheus ==="
          sudo -E kubectl rollout status deployment/prometheus-server -n scout-monitoring --timeout=180s
          echo "=== Checking Grafana ==="
          sudo -E kubectl rollout status deployment/grafana -n scout-monitoring --timeout=180s
          echo "=== Checking Loki ==="
          sudo -E kubectl rollout status statefulset/loki -n scout-monitoring --timeout=180s
          echo "=== All pods ==="
          sudo -E kubectl get pods -A
      # Trino connectivity check. Auth (PASSWORD,JWT) is now required so
      # the trino CLI's default http://localhost:8080 listener returns 403
      # ("Authentication over HTTP is not enabled"). Hit /v1/info on the
      # HTTPS listener instead — it's the same endpoint the kubelet
      # readiness probe uses, and it requires no auth, so this still
      # catches "coordinator process started but HTTPS not listening"
      # regressions. The data-authorization-tests Job below exercises
      # the full authenticated query path with a real JWT.
      - name: 'Trino connectivity check'
        shell: bash
        run: |
          sudo -E kubectl exec -n scout-analytics deployment/trino-coordinator -- \
            curl -sk -f https://localhost:8443/v1/info
      # Data authorization tests. Seeds a synthetic
      # delta.default.test_reports table, then exercises the end-to-end
      # AuthZ pipeline (Keycloak admin -> SPI listener -> MinIO bundle ->
      # OPA pull -> Trino JWT auth + impersonation -> row filter +
      # column mask). See tests/data-authorization/.
      - name: 'Derive hl7-transformer image version'
        id: hl7-transformer-version
        uses: ./.github/actions/derive-version
        with:
          subproject: extractor/hl7-transformer
      - name: 'Data authorization tests - seed'
        shell: bash
        env:
          # docker.io/local/... is the tag k3s-image-import-or-pull
          # imports under for in-cluster use; production's
          # ghcr.io/... ref isn't loaded into k3s here.
          IMAGE: docker.io/local/washu-tag/hl7-transformer:${{ steps.hl7-transformer-version.outputs.raw-version }}
        run: |
          set -euo pipefail
          # lake_bucket differs between production ("lake") and CI
          # ("ci-lake"); read the rendered inventory so the Delta
          # warehouse path matches whichever bucket MinIO provisioned.
          export WAREHOUSE_DIR="s3a://$(yq '.k3s_cluster.vars.lake_bucket' ansible/inventory.yaml)/delta"

          # ConfigMap carries the script verbatim -- kubectl handles
          # multi-line file content correctly, so no template
          # substitution needed for seed.py.
          sudo -E kubectl create configmap data-authz-seed-script \
            -n scout-data \
            --from-file=seed.py=tests/data-authorization/seed/seed.py \
            --dry-run=client -o yaml | sudo -E kubectl apply -f -

          yq '.spec.template.spec.containers[0].image = strenv(IMAGE)
            | (.spec.template.spec.containers[0].env[]
               | select(.name == "SPARK_SQL_WAREHOUSE_DIR")).value = strenv(WAREHOUSE_DIR)' \
            tests/data-authorization/seed/job.yaml \
            | sudo -E kubectl apply -f -

          KUBECTL='sudo -E kubectl' bash tests/data-authorization/wait-for-job.sh \
            scout-data data-authz-seed 300
      - name: 'Data authorization tests - logs (seed)'
        if: always()
        shell: bash
        run: |
          sudo -E kubectl -n scout-data logs job/data-authz-seed --tail=200 || true
      - name: 'Data authorization tests - run'
        shell: bash
        run: |
          set -euo pipefail
          KC_ADMIN_PW=$(yq '.k3s_cluster.vars.keycloak_bootstrap_admin_password' ansible/inventory.yaml)
          SUPERSET_SVC_SECRET=$(yq '.k3s_cluster.vars.keycloak_superset_svc_client_secret' ansible/inventory.yaml)

          # Script in a ConfigMap (kubectl handles file content
          # correctly), secrets in a Secret. The Job manifest
          # references both by name -- no template substitution.
          sudo -E kubectl create configmap data-authz-test-script \
            -n scout-analytics \
            --from-file=run.sh=tests/data-authorization/authz-tests/run.sh \
            --dry-run=client -o yaml | sudo -E kubectl apply -f -

          sudo -E kubectl create secret generic data-authz-test-creds \
            -n scout-analytics \
            --from-literal=KC_ADMIN_PASSWORD="$KC_ADMIN_PW" \
            --from-literal=SUPERSET_SVC_CLIENT_SECRET="$SUPERSET_SVC_SECRET" \
            --dry-run=client -o yaml | sudo -E kubectl apply -f -

          sudo -E kubectl apply -f tests/data-authorization/authz-tests/job.yaml

          KUBECTL='sudo -E kubectl' bash tests/data-authorization/wait-for-job.sh \
            scout-analytics data-authz-tests 300
      - name: 'Data authorization tests - logs (run)'
        if: always()
        shell: bash
        run: |
          sudo -E kubectl -n scout-analytics logs job/data-authz-tests --tail=500 || true
      # Auth tests — verify OAuth2 Proxy blocks unauthenticated access
      - name: 'Auth curl tests'
        shell: bash
        run: bash tests/auth/auth-curl-tests.sh scout.test
      # NetworkPolicy tests — verify trino-rw ingress restrictions
      - name: 'NetworkPolicy tests'
        shell: bash
        run: KUBECTL='sudo -E kubectl' bash tests/network/network-policy-tests.sh
      # Diagnostic logging on failure
      - name: 'Debug - pod status'
        if: failure()
        shell: bash
        run: |
          sudo -E kubectl get pods -A
          sudo -E kubectl get events -A --sort-by='.lastTimestamp' | tail -50
      - name: 'Debug - all pod logs'
        if: failure()
        shell: bash
        run: |
          for ns in $(sudo -E kubectl get ns -o jsonpath='{.items[*].metadata.name}'); do
            for pod in $(sudo -E kubectl get pods -n "$ns" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
              echo "=== $ns/$pod ==="
              sudo -E kubectl logs -n "$ns" "$pod" --all-containers --tail=30 --previous 2>/dev/null || \
              sudo -E kubectl logs -n "$ns" "$pod" --all-containers --tail=30 2>/dev/null || true
            done
          done
  publish:
    if: github.ref_name == 'main' && needs.deploy-and-test.result == 'success' && needs.smoke-test.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    needs: [changes, deploy-and-test, scan-images, smoke-test]
    steps:
      - name: Checkout GitHub Action
        uses: actions/checkout@v6
      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ ENV.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Free up disk space
        shell: bash
        run: |
          echo "Disk space before cleanup:"
          df -h

          echo "Removing unnecessary tools to free up disk space..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/swift
          sudo rm -rf /opt/ghc
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          docker system prune -af --volumes

          echo "Disk space after cleanup:"
          df -h
      - name: 'Push Image - hl7log-extractor'
