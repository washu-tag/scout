name: Post-Commit Tasks

on:
  pull_request:
    types: [opened, reopened, edited, synchronize]
  push:
    branches:
      - main
      - 'ci-**'
      - 'demo**'

env:
  JAVA_DIST: 'zulu'
  JAVA_VERSION: '21'
  REGISTRY: ghcr.io

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      hl7log-extractor: ${{ steps.filter.outputs.hl7log-extractor }}
      hl7-transformer: ${{ steps.filter.outputs.hl7-transformer }}
      pyspark-notebook: ${{ steps.filter.outputs.pyspark-notebook }}
      explorer: ${{ steps.filter.outputs.explorer }}
      superset: ${{ steps.filter.outputs.superset }}
    steps:
      - uses: actions/checkout@v4.2.1
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            hl7log-extractor:
              - 'extractor/hl7log-extractor/**'
              - 'linting_java_checkstyle.xml'
            hl7-transformer:
              - 'extractor/hl7-transformer/**'
            pyspark-notebook:
              - 'helm/jupyter/notebook/**'
            explorer:
              - 'explorer/**'
            superset:
              - 'helm/superset/**'
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4.2.1
      - uses: actions/setup-python@v5.2.0
        with:
          python-version: '3.12'
          cache: 'pip'
      - uses: actions/setup-java@v4
        with:
          distribution: ${{ ENV.JAVA_DIST }}
          java-version: ${{ ENV.JAVA_VERSION }}
          cache: 'gradle'
      - uses: pre-commit/action@v3.0.1
  build-and-upload-hl7log-extractor:
    runs-on: ubuntu-latest
    needs: changes
    permissions:
      contents: read
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v4.2.1
      - name: 'Check if image exists'
        id: check-image
        uses: ./.github/actions/check-image-exists
        with:
          subproject: extractor/hl7log-extractor
          image-name: hl7log-extractor
      - name: 'Build/Cache Image - hl7log-extractor'
        if: needs.changes.outputs.hl7log-extractor == 'true' || steps.check-image.outputs.exists == 'false'
        uses: ./.github/actions/docker-build-cache
        with:
          subproject: extractor/hl7log-extractor
          image-name: hl7log-extractor
  build-and-upload-hl7-transformer:
    runs-on: ubuntu-latest
    needs: changes
    permissions:
      contents: read
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v4.2.1
      - name: 'Check if image exists'
        id: check-image
        uses: ./.github/actions/check-image-exists
        with:
          subproject: extractor/hl7-transformer
          image-name: hl7-transformer
      - name: 'Build/Cache Image - hl7-transformer'
        if: needs.changes.outputs.hl7-transformer == 'true' || steps.check-image.outputs.exists == 'false'
        uses: ./.github/actions/docker-build-cache
        with:
          subproject: extractor/hl7-transformer
          image-name: hl7-transformer
  build-and-upload-pyspark-notebook:
    runs-on: ubuntu-latest
    needs: changes
    permissions:
      contents: read
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v4.2.1
      - name: 'Check if image exists'
        id: check-image
        uses: ./.github/actions/check-image-exists
        with:
          subproject: helm/jupyter/notebook
          image-name: pyspark-notebook
      - name: 'Build/Cache Image - pyspark-notebook'
        if: needs.changes.outputs.pyspark-notebook == 'true' || steps.check-image.outputs.exists == 'false'
        uses: ./.github/actions/docker-build-cache
        with:
          subproject: helm/jupyter/notebook
          image-name: pyspark-notebook
  build-and-upload-explorer:
    runs-on: ubuntu-latest
    needs: changes
    permissions:
      contents: read
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v4.2.1
      - name: 'Check if image exists'
        id: check-image
        uses: ./.github/actions/check-image-exists
        with:
          subproject: explorer
          image-name: explorer
      - name: 'Build/Cache Image - explorer'
        if: needs.changes.outputs.explorer == 'true' || steps.check-image.outputs.exists == 'false'
        uses: ./.github/actions/docker-build-cache
        with:
          subproject: explorer
          image-name: explorer
  build-and-upload-superset:
    runs-on: ubuntu-latest
    needs: changes
    permissions:
      contents: read
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v4.2.1
      - name: 'Check if image exists'
        id: check-image
        uses: ./.github/actions/check-image-exists
        with:
          subproject: helm/superset
          image-name: superset
      - name: 'Build/Cache Image - superset'
        if: needs.changes.outputs.superset == 'true' || steps.check-image.outputs.exists == 'false'
        uses: ./.github/actions/docker-build-cache
        with:
          subproject: helm/superset
          image-name: superset
  unit-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4.2.1
      - uses: actions/setup-java@v4
        with:
          distribution: ${{ ENV.JAVA_DIST }}
          java-version: ${{ ENV.JAVA_VERSION }}
          cache: 'gradle'
      - name: 'Unit tests: hl7log-extractor'
        shell: bash
        run: cd extractor/hl7log-extractor && ./gradlew test
  ansible-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4.2.1
      - uses: actions/setup-python@v5.2.0
        with:
          python-version: '3.12'
      - name: Install Molecule and dependencies
        run: |
          pip install molecule ansible-core pytest
      - name: 'Unit tests: filter plugins'
        shell: bash
        run: cd ansible && pytest tests/unit/filter_plugins/ -v
      - name: 'Molecule tests: postgres role'
        shell: bash
        run: cd ansible/roles/postgres && molecule test -s default
      - name: 'Molecule tests: scout_common role'
        shell: bash
        run: cd ansible/roles/scout_common && molecule test -s default
  staging-deploy-and-test:
    runs-on: ubuntu-latest
    needs:
      - lint
      - unit-test
      - ansible-test
    permissions:
      contents: read
    env:
      STAGING_KUBECONFIG: /tmp/staging-k3s.yaml
      PRODUCTION_KUBECONFIG: /tmp/production-k3s.yaml
    steps:
      - uses: actions/checkout@v4.2.1
      - name: 'Install k3d'
        shell: bash
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
      - name: 'Prepare staging inventory'
        shell: bash
        run: |
          # Initial preparation (HARBOR_ENDPOINT will be replaced after we know the IP)
          sed -e "s:WORK_DIR:$(pwd):" \
            .github/ci_resources/inventory-staging.yaml > ansible/inventory-staging.yaml
      - name: 'ansible-galaxy dependencies'
        shell: bash
        run: cd ansible && sudo -E /opt/pipx_bin/ansible-galaxy install -r collections/requirements.yaml
      # - name: Install Python dependencies for Ansible Kubernetes modules
      #   run: |
      #     /opt/pipx/venvs/ansible-core/bin/python -m pip install kubernetes
      - name: 'Create staging k3s cluster'
        shell: bash
        run: |
          k3d cluster create staging \
            --api-port 6443 \
            --port "30443:30443@server:0" \
            --network staging-net \
            --kubeconfig-update-default=false \
            --kubeconfig-switch-context=false \
            -v /var/lib/harbor:/var/lib/harbor
          k3d kubeconfig get staging > $STAGING_KUBECONFIG
      - name: Install Python dependencies for Ansible Kubernetes modules - staging
        run: |
          k3d node exec staging -- python3 -m pip install kubernetes
      - name: 'Deploy Harbor to staging cluster'
        shell: bash
        run: |
          cd ansible
          sudo -E /opt/pipx_bin/ansible-playbook -v -i inventory-staging.yaml --diff \
            playbooks/harbor.yaml
      - name: 'Wait for Harbor to be ready'
        shell: bash
        env:
          KUBECONFIG: ${{ env.STAGING_KUBECONFIG }}
        run: |
          echo "Waiting for Harbor pods to be ready..."
          kubectl wait --for=condition=ready pod -l app=harbor -n harbor --timeout=600s || true
          kubectl get pods -n harbor
          kubectl get svc -n harbor
      - name: 'Get Harbor NodePort IP'
        shell: bash
        id: harbor-ip
        env:
          KUBECONFIG: ${{ env.STAGING_KUBECONFIG }}
        run: |
          HARBOR_IP=$(kubectl get node k3d-staging-server-0 -o jsonpath='{.status.addresses[?(@.type=="InternalIP")].address}')
          echo "harbor_endpoint=${HARBOR_IP}:30443" >> $GITHUB_OUTPUT
          echo "Harbor endpoint: ${HARBOR_IP}:30443"
      - name: 'Update inventory with Harbor endpoint'
        shell: bash
        env:
          HARBOR_ENDPOINT: ${{ steps.harbor-ip.outputs.harbor_endpoint }}
        run: |
          sed -i "s/HARBOR_ENDPOINT/${HARBOR_ENDPOINT}/" ansible/inventory-staging.yaml
      - name: Install Python dependencies for Ansible Kubernetes modules
        run: |
          /opt/pipx/venvs/ansible-core/bin/python -m pip install kubernetes
      - name: 'Install production k3s using Ansible playbook'
        shell: bash
        run: |
          cd ansible
          sudo -E /opt/pipx_bin/ansible-playbook -v -i inventory-staging.yaml --diff \
            --limit server playbooks/k3s.yaml
      - name: 'Deploy minimal Scout services to production'
        shell: bash
        env:
          KUBECONFIG: /etc/rancher/k3s/k3s.yaml
          K8S_AUTH_KUBECONFIG: /etc/rancher/k3s/k3s.yaml
        run: |
          cd ansible
          sudo -E /opt/pipx_bin/ansible-playbook -v -i inventory-staging.yaml --diff \
            --limit server playbooks/helm.yaml
          sudo -E /opt/pipx_bin/ansible-playbook -v -i inventory-staging.yaml --diff \
            --limit server playbooks/postgres.yaml
      - name: 'Verify registry mirrors working'
        shell: bash
        env:
          KUBECONFIG: ${{ env.PRODUCTION_KUBECONFIG }}
        run: |
          echo "=== Production k3s registry config ==="
          docker exec k3d-production-server-0 cat /etc/rancher/k3s/registries.yaml
          echo ""
          echo "=== Checking postgres pods pulled through Harbor ==="
          kubectl get pods -n cloudnative-pg -o wide
      - name: 'Verify Harbor cache'
        shell: bash
        env:
          KUBECONFIG: ${{ env.STAGING_KUBECONFIG }}
          HARBOR_ENDPOINT: ${{ steps.harbor-ip.outputs.harbor_endpoint }}
        run: |
          echo "=== Harbor projects ==="
          kubectl exec -n harbor deployment/harbor-core -- \
            curl -s -k -u admin:CIHarbor123 https://localhost/api/v2.0/projects | jq .
          echo ""
          echo "=== Docker Hub proxy repositories ==="
          kubectl exec -n harbor deployment/harbor-core -- \
            curl -s -k -u admin:CIHarbor123 https://localhost/api/v2.0/projects/dockerhub-proxy/repositories | jq .
      - name: 'Staging cluster logs'
        shell: bash
        if: always()
        env:
          KUBECONFIG: ${{ env.STAGING_KUBECONFIG }}
        run: |
          echo "=== Harbor pods ==="
          kubectl get pods -n harbor
          echo ""
          echo "=== Harbor core logs ==="
          kubectl logs -n harbor deployment/harbor-core --tail=50 || true
      - name: 'Production cluster logs'
        shell: bash
        if: always()
        env:
          KUBECONFIG: ${{ env.PRODUCTION_KUBECONFIG }}
        run: |
          echo "=== Production pods ==="
          kubectl get pods -A
          echo ""
          echo "=== Postgres operator logs ==="
          kubectl logs -n cloudnative-pg deployment/cloudnative-pg --tail=50 || true
      - name: 'Cleanup'
        shell: bash
        if: always()
        run: |
          k3d cluster delete staging || true
          k3d cluster delete production || true
  deploy-and-test:
    runs-on: ubuntu-latest
    needs:
      - lint
      - build-and-upload-hl7log-extractor
      - build-and-upload-hl7-transformer
      - build-and-upload-pyspark-notebook
      - build-and-upload-explorer
      - build-and-upload-superset
      - unit-test
      - ansible-test
    permissions:
      contents: read
      packages: read
    env:
      KUBECONFIG: /etc/rancher/k3s/k3s.yaml
    steps:
      - uses: actions/checkout@v4.2.1
      - name: 'Prepare inventory.yaml'
        shell: bash
        run: |
          sed -e "s/HOSTNAME/$(hostname)/" -e "s/K3S_TOKEN/$(openssl rand -hex 16)/" -e "s:WORK_DIR:$(pwd):" \
            .github/ci_resources/inventory.yaml > ansible/inventory.yaml
      - name: 'ansible-galaxy dependencies'
        shell: bash
        run: cd ansible && sudo -E /opt/pipx_bin/ansible-galaxy install -r collections/requirements.yaml
      - name: Install Python dependencies for Ansible Kubernetes modules
        run: |
          /opt/pipx/venvs/ansible-core/bin/python -m pip install kubernetes
      - name: 'Install k3s'
        shell: bash
        run: |
          cd ansible && sudo -E /opt/pipx_bin/ansible-playbook -v -i inventory.yaml --diff playbooks/k3s.yaml
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3.3.0
        with:
          registry: ${{ ENV.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 'Push image to k3s - hl7log-extractor'
        uses: ./.github/actions/k3s-image-import-or-pull
        with:
          subproject: extractor/hl7log-extractor
          image-name: hl7log-extractor
      - name: 'Push image to k3s - hl7-transformer'
        uses: ./.github/actions/k3s-image-import-or-pull
        with:
          subproject: extractor/hl7-transformer
          image-name: hl7-transformer
      - name: 'Install helm and helm diff'
        shell: bash
        run: cd ansible && sudo -E /opt/pipx_bin/ansible-playbook -v -i inventory.yaml --diff playbooks/helm.yaml
      - name: 'Install postgres'
        shell: bash
        run: |
          cd ansible && sudo -E /opt/pipx_bin/ansible-playbook -v -i inventory.yaml --diff playbooks/postgres.yaml
      - name: 'Install lake'
        shell: bash
        run: |
          cd ansible && sudo -E /opt/pipx_bin/ansible-playbook -v -i inventory.yaml --diff playbooks/lake.yaml
          sudo -E kubectl describe pod -l v1.min.io/tenant=minio-scout -n minio-scout
      - name: 'Install orchestrator'
        shell: bash
        run: |
          cd ansible && sudo -E /opt/pipx_bin/ansible-playbook -i inventory.yaml --diff playbooks/orchestrator.yaml
      - name: 'Install extractor'
        shell: bash
        run: |
          cd ansible && sudo -E /opt/pipx_bin/ansible-playbook -i inventory.yaml --diff playbooks/extractor.yaml
      - name: 'Run tests'
        shell: bash
        run: |
          cp .github/ci_resources/test_config_template.json tests/src/test/resources/config/local.json
          sed -i "s:WORK_DIR:$(pwd):" .github/ci_resources/tests-job.yaml
          sudo -E kubectl apply -f .github/ci_resources/tests-job.yaml
          sudo -E kubectl wait --for=condition=complete --timeout=600s job/ci-tests -n extractor &
          completion_pid=$!
          sudo -E kubectl wait --for=condition=failed --timeout=600s job/ci-tests -n extractor && exit 1 &
          failure_pid=$!
          wait -n $completion_pid $failure_pid
      - name: Test Logs
        shell: bash
        if: always()
        run: |
          sudo -E kubectl -n extractor logs job/ci-tests
      - name: Test Summary
        uses: test-summary/action@v2.4
        if: always()
        with:
          paths: 'tests/**/TEST-*.xml'
          show: 'fail, skip'
      - name: Logging (hl7log-extractor)
        shell: bash
        if: always()
        run: |
          sudo -E kubectl -n extractor logs deployment/hl7log-extractor
      - name: Logging (hl7-transformer)
        shell: bash
        if: always()
        run: |
          sudo -E kubectl -n extractor logs deployment/hl7-transformer
  publish:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    needs: [changes, deploy-and-test, staging-deploy-and-test]
    steps:
      - name: Checkout GitHub Action
        uses: actions/checkout@v4.2.1
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3.3.0
        with:
          registry: ${{ ENV.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Remove unnecessary files to save space
        shell: bash
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
      - name: 'Push Image - hl7log-extractor'
        if: needs.changes.outputs.hl7log-extractor == 'true'
        uses: ./.github/actions/docker-push
        with:
          image-name: hl7log-extractor
      - name: 'Push Image - hl7-transformer'
        if: needs.changes.outputs.hl7-transformer == 'true'
        uses: ./.github/actions/docker-push
        with:
          image-name: hl7-transformer
      - name: 'Push Image - pyspark-notebook'
        if: needs.changes.outputs.pyspark-notebook == 'true'
        uses: ./.github/actions/docker-push
        with:
          image-name: pyspark-notebook
      - name: 'Push Image - explorer'
        if: needs.changes.outputs.explorer == 'true'
        uses: ./.github/actions/docker-push
        with:
          image-name: explorer
      - name: 'Push Image - superset'
        if: needs.changes.outputs.superset == 'true'
        uses: ./.github/actions/docker-push
        with:
          image-name: superset
  publish-demo:
    if: startsWith(github.ref_name, 'demo')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    needs: [changes, deploy-and-test, staging-deploy-and-test]
    steps:
      - name: Checkout GitHub Action
        uses: actions/checkout@v4.2.1
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3.3.0
        with:
          registry: ${{ ENV.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Remove unnecessary files to save space
        shell: bash
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
      - name: 'Push Image - pyspark-notebook'
        if: needs.changes.outputs.pyspark-notebook == 'true'
        uses: ./.github/actions/docker-push
        with:
          image-name: pyspark-notebook
