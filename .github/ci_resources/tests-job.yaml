apiVersion: batch/v1
kind: Job
metadata:
  name: ci-tests
  namespace: scout-extractor
spec:
  completions: 1
  backoffLimit: 0
  template:
    # CI-only ephemeral Gradle test runner: needs a writable filesystem for the
    # Gradle build and writes into a runner-owned hostPath, so running non-root
    # with a read-only root filesystem isn't applicable here.
    # nosemgrep: yaml.kubernetes.security.run-as-non-root.run-as-non-root
    spec:
      restartPolicy: Never
      containers:
        # nosemgrep: yaml.kubernetes.security.allow-privilege-escalation-no-securitycontext.allow-privilege-escalation-no-securitycontext, yaml.kubernetes.security.writable-filesystem-container.writable-filesystem-container
        - name: tests
          image: sapmachine:21
          command: ['/bin/sh', '-c']
          args:
            - cd /app/tests && ./gradlew clean test
          volumeMounts:
            - name: test-files
              mountPath: /app/tests

      volumes:
        - name: test-files
          hostPath:
            path: WORK_DIR/tests/ingest
            type: Directory
