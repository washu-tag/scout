---
server:
  hosts:
    HOSTNAME:
      ansible_connection: local
      ansible_python_interpreter: /usr/bin/python3
      k3s_control_node: true
      external_url: scout.test
minio_hosts:
  children:
    server:
k3s_cluster:
  children:
    server:
  vars:
    hl7log_extractor_image_repository: docker.io/local/washu-tag/hl7log-extractor
    hl7_transformer_image_repository: docker.io/local/washu-tag/hl7-transformer
    launchpad_image_repository: docker.io/local/washu-tag/launchpad
    report_viewer_image_repository: docker.io/local/washu-tag/report-viewer

    # Custom image repositories (for k3s-image-import-or-pull)
    superset_image_repository: docker.io/local/washu-tag/superset
    keycloak_image_repository: docker.io/local/washu-tag/keycloak
    keycloak_image_pull_policy: IfNotPresent
    scout_notebook_image_name: docker.io/local/washu-tag/scout-notebook

    # TLS (self-signed certs generated in CI step)
    tls_cert_path: /tmp/scout-ci-tls/cert.pem
    tls_key_path: /tmp/scout-ci-tls/key.pem

    # K3s config
    k3s_token: K3S_TOKEN
    kubeconfig_group: root
    # Relocate k3s's data-dir onto the runner's near-empty scratch disk so
    # the embedded containerd image store + overlayfs snapshots don't run the
    # smaller, half-full root fs into DiskPressure eviction during large image
    # pulls (notably ollama, which bundles multi-GB CUDA runtimes). base_dir
    # (below) moves the local-path PVs there too. K3S_DATA_DIR is templated in
    # by the "Prepare inventory.yaml" workflow step. CI-only: production keeps
    # the default data-dir (/var/lib/rancher/k3s).
    k3s_extra_args: '--data-dir K3S_DATA_DIR'

    # CoreDNS: resolve *.scout.test to the node IP inside the cluster
    coredns_extra_server_blocks:
      scout-test: |
        scout.test:53 {
          hosts {
            NODE_IP scout.test
            NODE_IP superset.scout.test
            NODE_IP jupyter.scout.test
            NODE_IP grafana.scout.test
            NODE_IP keycloak.scout.test
            NODE_IP auth.scout.test
            NODE_IP temporal.scout.test
            NODE_IP minio.scout.test
            NODE_IP chat.scout.test
            NODE_IP playbooks.scout.test
            NODE_IP report-viewer.scout.test
            NODE_IP testuser.jupyter.scout.test
            fallthrough
          }
        }

    # OIDC config
    minio_oidc_enabled: false
    temporal_oidc_enabled: false

    # Minio config, ensure passwords meet complexity requirements (must be >=8 characters)
    minio_storage_size: 5Gi
    minio_volumes_per_server: 1
    s3_username: minio
    s3_password: minio123
    s3_region: us-east-1
    s3_lake_reader: lake-reader
    s3_lake_reader_secret: lakereader123
    s3_lake_writer: lake-writer
    s3_lake_writer_secret: lakewriter123
    s3_loki_writer: loki-writer
    s3_loki_writer_secret: lokiwriter123

    # Monitor config
    prometheus_storage_size: 1Gi
    loki_storage_size: 1Gi
    grafana_storage_size: 1Gi
    grafana_admin_password: ci-grafana-admin-password
    grafana_alerts_enabled: false

    # Jupyter config
    jupyter_hub_storage_size: 1Gi
    jupyter_singleuser_storage_size: 1Gi
    jupyter_prepuller_hook: false

    # Postgres config
    postgres_user: scout
    postgres_password: scout123
    postgres_superuser_password: scout123
    hive_postgres_user: hive
    hive_postgres_password: hive123
    hive_readonly_postgres_password: hivero123
    superset_postgres_user: superset
    superset_postgres_password: superset123
    postgres_parameters: {} # Use PG defaults
    postgres_storage_size: 5Gi

    # Orchestrator config
    cassandra_storage_size: 1Gi
    elasticsearch_storage_size: 1Gi

    # Local paths
    # base_dir is consumed by k3s as --default-local-storage-path for the
    # local-path provisioner; the per-service *_dir variables that used to
    # live here are dead since storage moved to dynamic provisioning
    # (ADR 0004). Kept under the k3s data-dir (see K3S_DATA_DIR above) so the
    # provisioner's PVs land on the scratch disk alongside the image store.
    base_dir: K3S_DATA_DIR/storage
    scout_repo_dir: WORK_DIR
    extractor_data_dir: '{{ scout_repo_dir }}/tests/ingest/staging_test_data'

    # Object storage paths
    lake_bucket: ci-lake
    scratch_bucket: ci-scratch

    # Trino (reduce from defaults)
    trino_worker_count: 1
    trino_worker_max_heap: 512M
    trino_coordinator_max_heap: 512M
    # RW Trino kept on so the NetworkPolicy tests have a real
    # service to probe, but slimmed hard: half the default CPU,
    # half the heap, and no jmx-exporter sidecar (nothing scrapes
    # trino-rw metrics in smoke-test). The combined save is enough
    # for the seed/test Jobs to fit on the 4-CPU runner alongside
    # the full Scout stack.
    trino_rw_coordinator_max_heap: 256M
    trino_rw_worker_max_heap: 256M
    trino_rw_coordinator_resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    trino_rw_worker_resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    trino_rw_jmx_enabled: false

    # Trino AuthZ (ADR 0020 + 0021 + 0022 + 0023): the smoke-test data-authorization
    # Job seeds delta.default.test_reports with synthetic rows across
    # facilities and modalities, then asserts row filtering + masking
    # behavior. Production filters reports/_curated/_latest/_dx; CI
    # filters test_reports instead so the assertions are deterministic
    # without running the full HL7 ingest pipeline.
    trino_filtered_tables:
      - { catalog: delta, schema: default, table: test_reports }
    # Two-dimension fixture so multi-filter compositions are exercised:
    # allowed_facilities AND allowed_modalities both clamp rows.
    # The hidden-tables / bypass scenarios (authz-tests/run.sh scenarios 6+7)
    # probe reports_report_patient_mapping, which is denied via the
    # hardcoded baseline in policy/trino/main.rego — no trino_hidden_tables
    # entry needed here.
    trino_attribute_filters:
      allowed_facilities:
        column: sending_facility
      allowed_modalities:
        column: modality

    # Spark default of 200 shuffle partitions is far too many for CI's
    # small test data — each shuffle spawns 200 tasks, most processing
    # zero rows, and scheduling overhead dominates.
    spark_sql_shuffle_partitions: 8

    # The deploy_and_test CI job exercises the full ingest workflow but
    # doesn't deploy the trino playbook, so trino-rw isn't available. Disable
    # the Trino-side view creation in add_epic_views to keep the test focused
    # on the ingest path itself. The smoke-test job doesn't deploy the
    # extractor at all, so this flag has no effect there.
    trino_view_enabled: false

    # Trino AuthZ secrets (ADR 0022). Required by the trino role's
    # AuthZ env Secret. Production deployments set this in
    # scout-inventory; CI sets a fixed test value so the smoke-test
    # deploy doesn't fail at template render.
    trino_internal_shared_secret: ci-trino-internal-shared-secret

    # Valkey (single shared password for all services)
    valkey_password: valkey123

    # OAuth2 Proxy forwardAuth: use internal service URL to avoid TLS
    # verification issues with self-signed certs inside the Traefik container
    oauth2_proxy_auth_url: 'http://oauth2-proxy.kube-system/oauth2/auth'

    # Keycloak + OAuth
    keycloak_postgres_password: keycloak123
    keycloak_bootstrap_admin_password: admin1234567890ab
    # cookie_secret must be base64-encoded and decode to exactly 16, 24, or 32 bytes
    oauth2_proxy_cookie_secret: Y2ktY29va2llLXNlY3JldA==
    oauth2_proxy_ssl_insecure_skip_verify: true
    keycloak_oauth2_proxy_client_secret: ci-secret-00000001
    keycloak_superset_client_secret: ci-secret-00000002
    keycloak_jupyterhub_client_secret: ci-secret-00000003
    keycloak_grafana_client_secret: ci-secret-00000004
    keycloak_temporal_client_secret: ci-secret-00000005
    keycloak_minio_client_secret: ci-secret-00000006
    keycloak_launchpad_client_secret: ci-secret-00000007
    keycloak_open_webui_client_secret: ci-secret-00000008
    # Trino AuthZ service principals (ADR 0022). Same client-credentials
    # pattern as the regular client secrets above; one per Trino-backed
    # surface that impersonates end users via X-Trino-User.
    keycloak_superset_svc_client_secret: ci-secret-svc-superset
    keycloak_voila_svc_client_secret: ci-secret-svc-voila
    keycloak_report_viewer_svc_client_secret: ci-secret-svc-report-viewer

    # OPA bundle writer/reader (ADR 0021). Same shape as s3_lake_*
    # secrets; one is mounted into the Keycloak pod for the bundle
    # publisher SPI to PUT bundles, the other into each OPA pod for
    # the bundle plugin to GET them.
    s3_opa_bundle_writer_secret: ci-opa-bundle-writer
    s3_opa_bundle_reader_secret: ci-opa-bundle-reader

    # Single OPA replica in CI. Production runs two for availability,
    # but in tests each replica polls MinIO independently on a 5–10s
    # interval — so wait_for_bundle (Service-LB'd) can confirm pod A
    # has the new bundle while Trino's next /rowFilters or /allow
    # call lands on pod B with the older revision. That's the actual
    # behavior in production too, just hidden by user-attribute
    # changes happening on minute-to-hour scales rather than the
    # sub-second cadence of these tests. Tests want determinism, prod
    # wants HA — split the value.
    opa_replicas: 1

    # Superset
    superset_secret: Y2ktc3VwZXJzZXQtc2VjcmV0LWtleS1mb3ItdGVzdGluZw==

    # Jupyter
    jupyter_metrics_api_token: cijupytermetricsapitokenvalue01

    # Launchpad
    launchpad_nextauth_secret: cilaunchpadnextauthsecretvalue1

    # Chat (Open WebUI + Ollama)
    enable_chat: true
    open_webui_postgres_password: openwebui123
    open_webui_secret_key: ciopenwebuisecretkeyvalue12345678
    open_webui_bootstrap_password: cibootstrappasswordvalue12345678
    scout_model_create: false
    ollama_models: []
    ollama_gpu_enabled: false
    ollama_min_gpu_memory_gb: 0
    ollama_resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

    # Playbooks (Voilà)
    enable_playbooks: true

    # Report Viewer
    report_viewer_db_password: report-viewer123

    # Loki (disable caches for CI)
    loki_chunks_cache_enabled: false
    loki_results_cache_enabled: false

    # Helm config for CI.
    helm_chart_timeout: '10m'

    # Resources (reduced for the constrained CI runner)
    hive_resources:
      requests:
        memory: 256Mi
      limits:
        memory: 512Mi
    # Grafana's defaults (100m cpu / 512Mi memory request) tipped CI's
    # runner over after promtail→alloy added a new DaemonSet pod and the
    # Grafana sidecar gained an auth container. Trim to small requests
    # with no limits — Helm --wait still observes readiness, but the
    # scheduler can place the pod immediately.
    grafana_resources:
      requests:
        cpu: 50m
        memory: 256Mi
    # Voila's default request (100m cpu / 512Mi memory) is too big for
    # the runner once the rest of the stack is up. Trim to small
    # requests with no limits.
    voila_resources:
      requests:
        cpu: 50m
        memory: 256Mi
    hl7_transformer_spark_memory: 1G
    cassandra_init_heap: 1G
    cassandra_max_heap: 1G
    elasticsearch_max_heap: 256M
