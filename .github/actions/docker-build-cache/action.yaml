name: 'Docker build + cache'
description: 'Builds and caches docker image'
inputs:
  subproject:
    description: 'Subdirectory for microservice'
    required: true
  image-name:
    description: 'Name for docker image'
    required: true
  context:
    description: >-
      Build context path. Defaults to `subproject`. Override when the
      Dockerfile needs to COPY paths outside its own directory (e.g.
      scout-notebook pulls in sdk/python from repo root).
    required: false
    default: ''
runs:
  using: 'composite'
  steps:
    - name: Remove unnecessary files to save space
      shell: bash
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

    - name: 'Derive version'
      id: derive-version
      uses: ./.github/actions/derive-version
      with:
        subproject: ${{ inputs.subproject }}

    - name: 'Build/Cache Image'
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        context: ${{ inputs.context != '' && inputs.context || inputs.subproject }}
        file: ${{ inputs.subproject }}/Dockerfile
        tags: ${{ ENV.REGISTRY }}/washu-tag/${{ inputs.image-name }}:${{ steps.derive-version.outputs.version }}
        outputs: type=docker,dest=${{ runner.temp }}/${{ inputs.image-name }}.tar
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Upload artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ inputs.image-name }}
        path: ${{ runner.temp }}/${{ inputs.image-name }}.tar
