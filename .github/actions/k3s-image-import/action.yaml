name: 'K3s image import'
description: 'Downloads docker image tags it for testing'
inputs:
  subproject:
    description: 'Subdirectory for microservice'
    required: true
  image-name:
    description: 'Name for docker image'
    required: true
runs:
  using: 'composite'
  steps:
    - name: Download artifact
      uses: actions/download-artifact@v8
      with:
        name: ${{ inputs.image-name }}
        path: ${{ runner.temp }}
    - name: 'Derive version'
      id: derive-version
      uses: ./.github/actions/derive-version
      with:
        subproject: ${{ inputs.subproject }}
    - name: Import image into k3s
      shell: bash
      # Tag locally with the RAW version (no demo suffix) so Ansible role
      # defaults — which reference raw tags — resolve identically on demo
      # branches and main.
      run: |
        sudo k3s ctr -n k8s.io images import --index-name docker.io/local/washu-tag/${{ inputs.image-name }}:${{ steps.derive-version.outputs.raw-version }} ${{ runner.temp }}/${{ inputs.image-name }}.tar
