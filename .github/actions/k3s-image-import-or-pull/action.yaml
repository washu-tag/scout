name: 'K3s image import or pull'
description: 'Downloads docker image from artifact if available, otherwise pulls from registry'
inputs:
  subproject:
    description: 'Subdirectory for microservice'
    required: true
  image-name:
    description: 'Name for docker image'
    required: true
  registry:
    description: 'Container registry (default: ghcr.io)'
    required: false
    default: 'ghcr.io'
  registry-namespace:
    description: 'Registry namespace (default: washu-tag)'
    required: false
    default: 'washu-tag'
runs:
  using: 'composite'
  steps:
    - name: 'Derive version'
      id: derive-version
      uses: ./.github/actions/derive-version
      with:
        subproject: ${{ inputs.subproject }}

    - name: Download artifact
      id: download-artifact
      uses: actions/download-artifact@v8
      continue-on-error: true
      with:
        name: ${{ inputs.image-name }}
        path: ${{ runner.temp }}

    - name: Import from artifact or pull from registry
      shell: bash
      # REGISTRY tag uses VERSION (demo-suffixed on demo-* branches to keep
      # demo images from clobbering main/release tags). LOCAL tag uses
      # RAW_VERSION so Ansible role defaults — which reference raw tags —
      # resolve identically on every branch.
      # Values passed via env: (not ${{ }} inside run:) to avoid workflow
      # script injection — CodeQL flags the inline expansion pattern.
      env:
        VERSION: ${{ steps.derive-version.outputs.version }}
        RAW_VERSION: ${{ steps.derive-version.outputs.raw-version }}
        IMAGE_NAME: ${{ inputs.image-name }}
        REGISTRY: ${{ inputs.registry }}
        NAMESPACE: ${{ inputs.registry-namespace }}
      run: |
        REGISTRY_IMAGE="${REGISTRY}/${NAMESPACE}/${IMAGE_NAME}:${VERSION}"
        LOCAL_IMAGE="docker.io/local/${NAMESPACE}/${IMAGE_NAME}:${RAW_VERSION}"
        TAR_FILE="${RUNNER_TEMP}/${IMAGE_NAME}.tar"

        if [ -f "${TAR_FILE}" ]; then
          echo "Importing newly built image from artifact..."
          sudo k3s ctr -n k8s.io images import \
            --index-name "${LOCAL_IMAGE}" \
            "${TAR_FILE}"
          echo "Successfully imported as ${LOCAL_IMAGE}"
        else
          echo "Artifact not found, pulling existing image from registry..."
          echo "Pulling ${REGISTRY_IMAGE}..."
          sudo k3s ctr -n k8s.io images pull "${REGISTRY_IMAGE}"
          echo "Successfully pulled ${REGISTRY_IMAGE}"

          # Alias to raw tag for in-cluster use
          sudo k3s ctr -n k8s.io images tag \
            "${REGISTRY_IMAGE}" \
            "${LOCAL_IMAGE}"
          echo "Tagged as ${LOCAL_IMAGE}"
        fi
