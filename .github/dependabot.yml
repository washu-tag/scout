version: 2
updates:
  # GitHub Actions: keep commit-hash pins current (security updates
  # don't cover Actions, so version updates are needed here)
  - package-ecosystem: 'github-actions'
    directories:
      - '/'
      - '.github/actions/**'
    schedule:
      interval: 'weekly'
    groups:
      github-actions:
        patterns:
          - '*'
