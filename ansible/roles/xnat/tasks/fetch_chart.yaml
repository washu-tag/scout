---
# The XNAT chart is not yet published to a Helm repo, so clone it at a pinned
# tag and resolve its subchart deps (bitnami redis + bokysan postfix) on the
# control/jump node — that's where the deploy_helm_chart wrapper runs helm for
# local-path charts, and (in air-gapped setups) the only node with internet.
# When upstream publishes a chart repo/OCI artifact, replace this whole file
# with a helm_repo_url + helm_chart_version ref in deploy.yaml.

# Dev override: set xnat_chart_path in inventory to a local chart directory (e.g.
# a working copy with un-published edits) to skip the git clone entirely.
- name: Clone + resolve chart from git
  when: xnat_chart_path is not defined
  delegate_to: localhost
  block:
    - name: Set XNAT chart clone directory
      ansible.builtin.set_fact:
        xnat_chart_clone_dir: "{{ xnat_chart_clone_dir | default('/tmp/scout-xnat-helm-chart') }}"

    - name: Clone the XNAT helm-charts repo at the pinned ref
      ansible.builtin.git:
        repo: '{{ xnat_chart_git_repo }}'
        dest: '{{ xnat_chart_clone_dir }}'
        version: '{{ xnat_chart_git_ref }}'
        force: true

    - name: Resolve XNAT chart subchart dependencies
      ansible.builtin.command:
        cmd: helm dependency update {{ xnat_chart_subpath }}
        chdir: '{{ xnat_chart_clone_dir }}'
      changed_when: true

    - name: Set chart path for the helm deploy
      ansible.builtin.set_fact:
        xnat_chart_path: '{{ xnat_chart_clone_dir }}/{{ xnat_chart_subpath }}'
