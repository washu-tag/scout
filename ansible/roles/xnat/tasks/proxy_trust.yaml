---
# Maven proxy trust for coordinate-resolved plugins.
#
# The plugin-installer image is generic: it resolves coordinates with Maven and
# only knows about a repo if the deploy hands it a settings.xml (and a CA if the
# repo is HTTPS with a self-signed cert). All the "which repo / air-gapped"
# decisions live here, so the image stays a dumb Maven runner.
#
# Two independent triggers:
#   * a coordinates plugin declares source.repo_url (artifact not on Central), or
#   * air-gapped (no egress -> mirror everything through the Nexus group).
# The staging CA is needed only when air-gapped against the self-signed Nexus.

- name: Collect non-Central repo URLs from coordinate plugins
  ansible.builtin.set_fact:
    _xnat_coordinate_repo_urls: >-
      {{ xnat_plugins_all
         | selectattr('source.type', 'equalto', 'coordinates')
         | map(attribute='source.repo_url', default='')
         | reject('equalto', '') | unique | list }}

- name: Decide whether a Maven settings.xml is needed
  ansible.builtin.set_fact:
    _xnat_maven_settings_needed: >-
      {{ (air_gapped | default(false) | bool)
         or (_xnat_coordinate_repo_urls | length > 0) }}

# Staging cert trust (per ADR-0016): when air-gapped through Nexus and the
# staging node uses its self-signed cert, the installer must trust that CA to
# fetch over HTTPS. Mirrors the jupyter role's detection.
- name: Determine if the staging self-signed CA must be trusted
  ansible.builtin.set_fact:
    _xnat_needs_staging_cert: false
  when: not (package_proxy_mode == 'nexus' and groups['staging'] is defined and groups['staging'] | length > 0)

- name: Evaluate staging cert requirement (nexus proxy on a staging node)
  ansible.builtin.set_fact:
    _xnat_needs_staging_cert: >-
      {{ (hostvars[groups['staging'][0]].tls_cert_path | default(staging_self_signed_tls_cert_path))
         == staging_self_signed_tls_cert_path }}
  when: package_proxy_mode == 'nexus' and groups['staging'] is defined and groups['staging'] | length > 0

- name: Set staging CA pod path
  ansible.builtin.set_fact:
    _xnat_staging_ca_path: /mnt/staging-ca/ca.crt
  when: _xnat_needs_staging_cert | bool

- name: Render and create the Maven settings.xml ConfigMap
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: xnat-maven-settings
        namespace: '{{ xnat_namespace }}'
      data:
        settings.xml: "{{ lookup('template', 'settings.xml.j2') }}"
  when: _xnat_maven_settings_needed | bool

- name: Slurp the staging CA certificate
  ansible.builtin.slurp:
    src: "{{ hostvars[groups['staging'][0]].tls_cert_path | default(staging_self_signed_tls_cert_path) }}"
  delegate_to: "{{ groups['staging'][0] }}"
  register: _xnat_staging_ca
  when: _xnat_needs_staging_cert | bool

- name: Create the staging CA Secret for the installer
  no_log: true
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: staging-ca-cert
        namespace: '{{ xnat_namespace }}'
      data:
        ca.crt: '{{ _xnat_staging_ca.content }}'
  when: _xnat_needs_staging_cert | bool
