---
# All XNAT Secrets are created here and referenced by name in the templated
# Helm values — the chart owns no Secrets (per the upstream-first / Ansible-owns-
# secrets approach).

# Flatten the per-plugin config blocks into typed lists the k8s tasks loop over.
- name: Build plugin config lists
  ansible.builtin.set_fact:
    xnat_authplugin_configs: >-
      {{ xnat_plugins_all | subelements('config', skip_missing=True)
         | selectattr('1.mechanism', 'equalto', 'authplugins') | list }}
    xnat_file_configs: >-
      {{ xnat_plugins_all | subelements('config', skip_missing=True)
         | selectattr('1.mechanism', 'equalto', 'file') | list }}
    xnat_file_plugins: >-
      {{ xnat_plugins_all | selectattr('source.type', 'equalto', 'file') | list }}

- name: Create first-boot site-config Secret (skips the setup wizard)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: xnat-prefs-init
        namespace: '{{ xnat_namespace }}'
      type: Opaque
      stringData:
        prefs-init.ini: "{{ lookup('template', 'prefs-init.ini.j2') }}"

# The upstream chart pulls the bokysan/postfix mail subchart unconditionally and
# references a hardcoded postfix-password Secret; without it the mail pod sits in
# CreateContainerConfigError and `helm --wait` never returns. XNAT routes mail at
# Scout's shared relay, not this pod. Remove once the upstream `mail.enabled`
# condition lands and we set mail.enabled=false.
- name: Create placeholder postfix-password Secret (mail subchart workaround)
  no_log: true
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: postfix-password
        namespace: '{{ xnat_namespace }}'
      type: Opaque
      stringData:
        username: xnat
        password: unused-placeholder

# Pattern A: deliver a locally-built / unpublished plugin JAR via a Secret. The
# jar content lives at source.secret.from_file on the control node (small/dev
# jars only — Secrets cap at ~1 MiB; prefer coordinates/image for large jars).
- name: Create plugin JAR Secrets (Pattern A)
  no_log: true
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: 'xnat-plugin-{{ item.name }}-jar'
        namespace: '{{ xnat_namespace }}'
      type: Opaque
      # Dict keys aren't templated in module args, so build the data map as a
      # value (with a computed key) instead of templating the key directly.
      data: "{{ { (item.source.secret.key | default('plugin.jar')): (lookup('file', item.source.secret.from_file) | b64encode) } }}"
  loop: '{{ xnat_file_plugins }}'
  loop_control:
    label: '{{ item.name }}'

# authplugins config: the chart mounts Secret xnat-plugin-<entry> (key
# <provider>-provider-properties) at config/auth/<provider>-provider.properties.
- name: Create auth-plugin provider-properties Secrets
  no_log: true
  vars:
    props: '{{ item.1.properties }}'
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: 'xnat-plugin-{{ item.1.entry }}'
        namespace: '{{ xnat_namespace }}'
      type: Opaque
      # Dict keys aren't templated in module args, so build the stringData map
      # as a value (with a computed key) instead of templating the key directly.
      stringData: "{{ { (item.1.provider ~ '-provider-properties'): lookup('template', 'plugin-properties.j2') } }}"
  loop: '{{ xnat_authplugin_configs }}'
  loop_control:
    label: '{{ item.0.name }}/{{ item.1.provider }}'

# Generic file config: an arbitrary property file mounted at config.dest under
# /data/xnat/home/ (for non-auth plugins configured by dropping a file).
- name: Create generic plugin config-file Secrets
  no_log: true
  vars:
    props: '{{ item.1.properties }}'
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: 'xnat-plugin-{{ item.0.name }}-cfg-{{ item.1.dest | basename | regex_replace("[^A-Za-z0-9]", "-") }}'
        namespace: '{{ xnat_namespace }}'
      type: Opaque
      # Dict keys aren't templated in module args, so build the stringData map
      # as a value (with a computed key) instead of templating the key directly.
      stringData: "{{ { (item.1.dest | basename): lookup('template', 'plugin-properties.j2') } }}"
  loop: '{{ xnat_file_configs }}'
  loop_control:
    label: '{{ item.0.name }}/{{ item.1.dest }}'
