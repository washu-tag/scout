---
# k3s Role - Main Task Orchestration
# Entry point that coordinates all k3s installation tasks
# Supports both online and air-gapped deployment modes

- name: Display k3s installation mode
  ansible.builtin.debug:
    msg: "k3s installation mode: {{ 'AIR-GAPPED' if air_gapped | default(false) | bool else 'ONLINE' }}"

################################################################################
# Binary Preparation - Online or Air-Gapped
################################################################################

- name: Prepare k3s binaries
  ansible.builtin.include_tasks: prepare_k3s_binaries.yaml

################################################################################
# Registry Mirror Configuration - Air-Gapped Only
################################################################################

- name: Configure Harbor registry mirrors
  ansible.builtin.include_tasks: registry.yaml

################################################################################
# Server Installation - Only on server nodes (includes staging)
################################################################################

- name: Install k3s server
  ansible.builtin.include_tasks: server.yaml
  when: "'server' in group_names or 'staging' in group_names"

################################################################################
# CoreDNS Customization - Only on server nodes (after server is ready)
################################################################################

- name: Configure CoreDNS custom settings
  ansible.builtin.include_tasks: coredns.yaml
  when: "'server' in group_names"

################################################################################
# GPU Worker Configuration - Only on GPU worker nodes
################################################################################

- name: Configure GPU workers
  ansible.builtin.include_tasks: gpu.yaml
  when: "'gpu_workers' in group_names"

################################################################################
# Agent Installation - Only on agent nodes
################################################################################

- name: Install k3s agent
  ansible.builtin.include_tasks: agent.yaml
  when: "'agents' in group_names"

# Taint every gpu_workers node (see enable_gpu_node_taint in
# scout_common/defaults). Flips with the var, so disabling it converges.
# Runs after agent install so GPU nodes are registered with the API
# server. Skipped on single-node clusters — same reason server.yaml
# skips the control-plane taint there. Delegates to the first server so
# the cluster kubeconfig path is stable regardless of which host triggers
# run_once, matching the pattern used by the control-plane taint.
- name: Apply GPU node taints
  delegate_to: "{{ groups['server'][0] }}"
  run_once: true
  kubernetes.core.k8s_taint:
    name: '{{ item }}'
    state: "{{ 'present' if enable_gpu_node_taint else 'absent' }}"
    taints:
      - key: nvidia.com/gpu
        value: present
        effect: NoSchedule
  loop: "{{ groups['gpu_workers'] | default([]) }}"
  when: (groups['k3s_cluster'] | default([]) | length) > 1
