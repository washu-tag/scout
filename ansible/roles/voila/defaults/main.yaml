---
# Voilà role defaults
# User-configurable settings are in inventory.yaml

# Namespace configuration
voila_namespace: '{{ scout_analytics_namespace }}'

# Helm configuration
voila_helm_chart_ref: '{{ scout_repo_dir }}/helm/voila'

# Image configuration - shared with JupyterHub (see scout_common's
# scout_notebook_image_name / _tag).
voila_image_name: '{{ scout_notebook_image_name }}'
voila_image_tag: '{{ scout_notebook_image_tag }}'

# Replicas (increase for load balancing)
voila_replicas: 1

# Resource limits - sized for POC with multiple concurrent users
voila_resources_default:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 2
    memory: 8Gi
