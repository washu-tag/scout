---
- name: Create namespace
  ansible.builtin.include_role:
    name: scout_common
    tasks_from: namespace
  vars:
    ns: '{{ voila_namespace }}'

- name: Create ConfigMap with Scout Python helpers (scout_trino, scout_voila, jupyter_server_config)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: voila-scout-python
        namespace: '{{ voila_namespace }}'
        labels:
          app.kubernetes.io/name: voila
          app.kubernetes.io/component: scout-python
      data:
        scout_trino.py: "{{ lookup('file', role_path + '/files/scout_trino.py') }}"
        scout_voila.py: "{{ lookup('file', role_path + '/files/scout_voila.py') }}"
        voila.py: "{{ lookup('file', role_path + '/files/voila.py') }}"

- name: Create Secret with voila_svc Keycloak client credentials
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: voila-svc-keycloak
        namespace: '{{ voila_namespace }}'
        labels:
          app.kubernetes.io/name: voila
      type: Opaque
      stringData:
        KEYCLOAK_VOILA_SVC_CLIENT_SECRET: '{{ keycloak_voila_svc_client_secret }}'

- name: Restrict Voila ingress to Traefik
  # The X-Trino-User impersonation pattern trusts that the
  # X-Auth-Request-Access-Token header on each request came from
  # oauth2-proxy via Traefik. Without this NetworkPolicy, an in-cluster
  # pod could connect directly to Voila on :8866 and forge the header,
  # bypassing the per-user AuthZ. Egress is unrestricted (Voila needs
  # to reach Keycloak + Trino + DNS).
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: voila-ingress
        namespace: '{{ voila_namespace }}'
        labels:
          app.kubernetes.io/name: voila
      spec:
        podSelector:
          matchLabels:
            app.kubernetes.io/name: voila
        policyTypes:
          - Ingress
        ingress:
          - from:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: '{{ traefik_namespace }}'
                podSelector:
                  matchLabels:
                    app.kubernetes.io/name: traefik
            ports:
              - protocol: TCP
                port: 8866

- name: Find all playbook directories
  ansible.builtin.find:
    paths: '{{ scout_repo_dir }}/analytics/notebooks'
    file_type: directory
    recurse: no
  register: playbook_dirs
  delegate_to: localhost

- name: Find all files in each playbook directory
  ansible.builtin.find:
    paths: '{{ item.path }}'
    file_type: file
    recurse: yes
  register: playbook_files_results
  loop: '{{ playbook_dirs.files }}'
  loop_control:
    label: '{{ item.path | basename }}'
  delegate_to: localhost

- name: Create ConfigMap for each playbook
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: 'voila-playbook-{{ item.item.path | basename }}'
        namespace: '{{ voila_namespace }}'
        labels:
          app.kubernetes.io/name: voila
          app.kubernetes.io/component: playbook
      binaryData: {}
      data: '{{ configmap_data }}'
  loop: '{{ playbook_files_results.results }}'
  loop_control:
    label: '{{ item.item.path | basename }}'
  vars:
    configmap_data: |
      {% set data = {} %}
      {% for file in item.files %}
      {%   set relative_path = file.path | relpath(item.item.path) %}
      {%   set _ = data.update({relative_path: lookup('file', file.path)}) %}
      {% endfor %}
      {{ data }}
  when: item.files | length > 0

- name: Build list of playbooks
  ansible.builtin.set_fact:
    voila_playbooks: >-
      {{
        voila_playbooks | default([]) + [item.item.path | basename]
      }}
  loop: '{{ playbook_files_results.results }}'
  loop_control:
    label: '{{ item.item.path | basename }}'
  when: item.files | length > 0
  delegate_to: localhost

- name: Parse Helm values
  ansible.builtin.set_fact:
    voila_helm_chart_values: "{{ lookup('template', 'values.yaml.j2') | from_yaml }}"

- name: Deploy Voilà
  ansible.builtin.include_role:
    name: scout_common
    tasks_from: deploy_helm_chart
  vars:
    helm_chart_name: voila
    helm_chart_ref: '{{ voila_helm_chart_ref }}'
    helm_chart_namespace: '{{ voila_namespace }}'
    helm_chart_values_files:
      - '{{ scout_repo_dir }}/helm/voila/values.yaml'
    helm_chart_values: '{{ voila_helm_chart_values }}'
    helm_chart_timeout: 15m
