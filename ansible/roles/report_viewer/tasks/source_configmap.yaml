---
# Build a ConfigMap that ships the report-viewer source tree (as a
# tar.gz) + the flat requirements.txt to the in-cluster init container.
# Used only when report_viewer_test_mode: true; never in prod.
#
# The init container untars `source.tar.gz` into /work and pip-installs
# `requirements.txt` (data key) into a shared emptyDir. See
# helm/report-viewer/templates/deployment.yaml for the consumer side.

- name: Build temp dir for source bundle
  ansible.builtin.tempfile:
    state: directory
    suffix: scout_report_viewer_src
  register: _rv_src_tmpdir
  delegate_to: localhost

- name: Pack report-viewer source tree
  community.general.archive:
    path:
      - '{{ report_viewer_src_dir }}/src'
      - '{{ report_viewer_src_dir }}/pyproject.toml'
    dest: '{{ _rv_src_tmpdir.path }}/source.tar.gz'
    format: gz
    mode: '0644'
  delegate_to: localhost

- name: Slurp packed source
  ansible.builtin.slurp:
    src: '{{ _rv_src_tmpdir.path }}/source.tar.gz'
  register: _rv_packed_src
  delegate_to: localhost

- name: Read requirements.txt
  ansible.builtin.slurp:
    src: '{{ report_viewer_src_dir }}/requirements.txt'
  register: _rv_requirements
  delegate_to: localhost

- name: Create report-viewer source ConfigMap
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: '{{ report_viewer_helm_release_name }}-source'
        namespace: '{{ report_viewer_namespace }}'
        labels:
          app.kubernetes.io/name: report-viewer
          app.kubernetes.io/component: source-bundle
      data:
        requirements.txt: '{{ _rv_requirements.content | b64decode }}'
      # binaryData accepts already-b64-encoded bytes — `slurp` returns
      # base64 of the file, which is exactly the right shape here.
      binaryData:
        source.tar.gz: '{{ _rv_packed_src.content }}'

- name: Discard temp bundle
  ansible.builtin.file:
    path: '{{ _rv_src_tmpdir.path }}'
    state: absent
  delegate_to: localhost
