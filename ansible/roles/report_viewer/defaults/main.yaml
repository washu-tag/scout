---
# Report viewer service role defaults
# User-configurable settings are in inventory.yaml

# Namespace — co-locates the service with the chat surface so a single
# NetworkPolicy can later allow OWUI tool → report-viewer traffic if we
# decide the OWUI pod should call us in-cluster (Phase 4).
report_viewer_namespace: '{{ chatbot_namespace }}'

# Helm
report_viewer_helm_chart_ref: '{{ scout_repo_dir }}/helm/report-viewer'
report_viewer_helm_release_name: report-viewer

# Image (override from inventory for CI/CD)
report_viewer_image_repository: ghcr.io/washu-tag/report-viewer
report_viewer_image_tag: latest

# Ingress
report_viewer_subdomain: report-viewer
report_viewer_host: '{{ report_viewer_subdomain }}.{{ server_hostname }}'

# Database — Postgres user/db are created via scout_common/create_db_with_owner
# against the shared CNPG cluster (postgres_cluster_name).
report_viewer_database: report_viewer
report_viewer_db_user: report_viewer
# `report_viewer_db_password` is required and must be set in inventory
# (use Ansible Vault).

# Signup-webhook receiver Postgres role (provisioned by the open-webui role).
report_viewer_owui_database: openwebui
report_viewer_owui_settings_writer_role: rvs_owui_settings_writer
# `report_viewer_owui_settings_writer_password` is required in inventory.

# Test mode — bypass the published image and run from a source-mounted
# ConfigMap on top of python:3.12-slim. Use during early dev iteration so
# we don't need to publish an image. See helm/report-viewer/values.yaml
# (sourceConfigMap) for the chart-side details. Slower restarts (per-pod
# pip install ~30-60s) — switch off once a real image is published.
# TODO REMOVE TEEST MODE!!!!
report_viewer_test_mode: false
report_viewer_test_mode_python_image: python:3.12-slim
# Source/requirements files projected into the CM. Resolved from the
# scout_repo_dir on the Ansible control node.
report_viewer_src_dir: '{{ scout_repo_dir }}/report-viewer'

# OpenTelemetry — leave OFF until Scout deploys a collector. When ready,
# set report_viewer_otel_endpoint to the OTLP HTTP endpoint (e.g.
# 'http://otel-collector.monitoring:4318') and traces start flowing.
report_viewer_otel_endpoint: ''
report_viewer_otel_service_name: scout-report-viewer

# Replicas + resources
report_viewer_replicas: 1
report_viewer_resources_default:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1
    memory: 1Gi

# Trino connection
report_viewer_trino_host: 'trino.{{ trino_namespace }}'
report_viewer_trino_port: '{{ trino_https_port }}'
report_viewer_trino_scheme: https
report_viewer_trino_catalog: delta
report_viewer_trino_schema: default
report_viewer_trino_ca_cert: ''
report_viewer_trino_auth_token_url: '{{ keycloak_internal_url }}/realms/{{ keycloak_realm_name }}/protocol/openid-connect/token'
report_viewer_trino_auth_client_id: report_viewer_svc
report_viewer_trino_auth_client_secret: '{{ keycloak_report_viewer_svc_client_secret }}'
