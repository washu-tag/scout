---
- name: Validate required variables
  ansible.builtin.assert:
    that:
      - datasets_service_db_password is defined
      - datasets_service_db_password | length > 0
    fail_msg: >
      datasets_service_db_password is required. Set it in inventory.yaml
      (use Ansible Vault).
      Example: openssl rand -hex 32 | tr -d '\n' | ansible-vault encrypt_string --vault-password-file vault/pwd.sh
    quiet: true

# Defensive trim. `openssl rand -hex N | ansible-vault encrypt_string`
# without `tr -d '\n'` captures the trailing newline; Postgres stores it
# in the password (so does the DATABASE_URL), and the two never compare
# equal through pg's auth. Strip here so a future regeneration that
# forgets to pipe through `tr` still produces a working deploy.
- name: Normalize datasets-service DB password
  ansible.builtin.set_fact:
    datasets_service_db_password: '{{ datasets_service_db_password | trim }}'
  no_log: true

- name: Create namespace
  ansible.builtin.include_role:
    name: scout_common
    tasks_from: namespace
  vars:
    ns: '{{ datasets_service_namespace }}'

- name: Initialize datasets-service database
  ansible.builtin.include_role:
    name: scout_common
    tasks_from: create_db_with_owner
  vars:
    db_name: '{{ datasets_service_database }}'
    db_owner: '{{ datasets_service_db_user }}'
    db_owner_pass: '{{ datasets_service_db_password }}'

- name: Grant schema ownership to user
  ansible.builtin.include_role:
    name: scout_common
    tasks_from: execute_sql
  vars:
    sql_script: 'ALTER SCHEMA public OWNER TO {{ datasets_service_db_user }};'
    sql_dbname: '{{ datasets_service_database }}'

# Test mode bootstrap — source-tarball ConfigMap consumed by the chart's
# init container. Mirror of the cert-distribution pattern in jupyter
# (ADR 0015): determine cert needs once, then thread the result into the
# Helm values. We bind to the same staging-ca-cert Secret jupyter
# creates so we don't duplicate the cert plumbing.
- name: Determine if staging cert trust is needed for package proxy
  ansible.builtin.set_fact:
    _ds_package_proxy_needs_staging_cert: false
  when: not (datasets_service_test_mode | bool)

- name: Evaluate staging cert requirement (test mode + nexus proxy)
  ansible.builtin.set_fact:
    _ds_uses_self_signed_cert: >-
      {{ (hostvars[groups['staging'][0]].tls_cert_path | default(staging_self_signed_tls_cert_path)) == staging_self_signed_tls_cert_path }}
    _ds_package_proxy_needs_staging_cert: false
  when:
    - datasets_service_test_mode | bool
    - package_proxy_mode | default('') == 'nexus'
    - groups['staging'] is defined
    - groups['staging'] | length > 0

- name: Set staging cert needed
  ansible.builtin.set_fact:
    _ds_package_proxy_needs_staging_cert: '{{ _ds_uses_self_signed_cert | bool }}'
  when: _ds_uses_self_signed_cert is defined

- name: Build datasets-service source ConfigMap (test mode)
  ansible.builtin.include_tasks: source_configmap.yaml
  when: datasets_service_test_mode | bool

- name: Slurp staging CA certificate (test mode + nexus self-signed)
  ansible.builtin.slurp:
    src: "{{ hostvars[groups['staging'][0]].tls_cert_path | default(staging_self_signed_tls_cert_path) }}"
  delegate_to: "{{ groups['staging'][0] | default('localhost') }}"
  register: _ds_staging_ca_cert
  when: _ds_package_proxy_needs_staging_cert | bool

- name: Create staging CA cert Secret for datasets-service pods
  # Run on the server host (no delegate_to: localhost). The server's
  # KUBECONFIG (set via the play's environment block from
  # cluster_k8s_environment) is the live /etc/rancher/k3s/k3s.yaml. The
  # localhost-delegated path (jupyter's pattern) depends on a previously-
  # fetched local kubeconfig copy that can go stale between cert
  # rotations and `make install-k3s` runs; running here avoids that.
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: staging-ca-cert
        namespace: '{{ datasets_service_namespace }}'
      data:
        ca.crt: '{{ _ds_staging_ca_cert.content }}'
  when: _ds_package_proxy_needs_staging_cert | bool

- name: Parse Helm values
  ansible.builtin.set_fact:
    datasets_service_helm_chart_values: "{{ lookup('template', 'values.yaml.j2') | from_yaml }}"

- name: Deploy datasets-service
  ansible.builtin.include_role:
    name: scout_common
    tasks_from: deploy_helm_chart
  vars:
    helm_chart_name: '{{ datasets_service_helm_release_name }}'
    helm_chart_ref: '{{ datasets_service_helm_chart_ref }}'
    helm_chart_namespace: '{{ datasets_service_namespace }}'
    helm_chart_values_files:
      - '{{ scout_repo_dir }}/helm/datasets-service/values.yaml'
    helm_chart_values: '{{ datasets_service_helm_chart_values }}'
    helm_chart_timeout: 10m
