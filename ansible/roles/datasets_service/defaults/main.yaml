---
# Datasets service role defaults
# User-configurable settings are in inventory.yaml

# Namespace — co-locates the service with the chat surface so a single
# NetworkPolicy can later allow OWUI tool → datasets-service traffic if we
# decide the OWUI pod should call us in-cluster (Phase 4).
datasets_service_namespace: '{{ chatbot_namespace }}'

# Helm
datasets_service_helm_chart_ref: '{{ scout_repo_dir }}/helm/datasets-service'
datasets_service_helm_release_name: datasets-service

# Image (override from inventory for CI/CD)
datasets_service_image_repository: ghcr.io/washu-tag/scout-datasets-service
datasets_service_image_tag: latest

# Ingress
datasets_service_subdomain: datasets
datasets_service_host: '{{ datasets_service_subdomain }}.{{ server_hostname }}'

# Database — Postgres user/db are created via scout_common/create_db_with_owner
# against the shared CNPG cluster (postgres_cluster_name).
datasets_service_database: datasets
datasets_service_db_user: datasets
# `datasets_service_db_password` is required and must be set in inventory
# (use Ansible Vault).

# Auth — Phase 0/1 dev gate. Empty disables it; once Phase 2 ships the
# Keycloak JWT path supersedes it.
datasets_service_dev_shared_secret: ''

# Test mode — bypass the published image and run from a source-mounted
# ConfigMap on top of python:3.12-slim. Use during early dev iteration so
# we don't need to publish an image. See helm/datasets-service/values.yaml
# (sourceConfigMap) for the chart-side details. Slower restarts (per-pod
# pip install ~30-60s) — switch off once a real image is published.
datasets_service_test_mode: false
datasets_service_test_mode_python_image: python:3.12-slim
# Source/requirements files projected into the CM. Resolved from the
# scout_repo_dir on the Ansible control node.
datasets_service_src_dir: '{{ scout_repo_dir }}/datasets-service'

# OpenTelemetry — leave OFF until Scout deploys a collector. When ready,
# set datasets_service_otel_endpoint to the OTLP HTTP endpoint (e.g.
# 'http://otel-collector.monitoring:4318') and traces start flowing.
datasets_service_otel_endpoint: ''
datasets_service_otel_service_name: scout-datasets

# Replicas + resources
datasets_service_replicas: 1
datasets_service_resources_default:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1
    memory: 1Gi

# Trino — pass-through JWT auth (ADR 0022): hits the HTTPS Trino with the
# user's bearer, so OPA's per-user row filters + column masks apply to
# materialize queries. Port 8080 (plain HTTP) was closed when ADR 0022
# landed; everyone uses 8443 + https now.
datasets_service_trino_host: 'trino.{{ trino_namespace }}'
datasets_service_trino_port: '{{ trino_https_port }}'
datasets_service_trino_scheme: https
datasets_service_trino_catalog: delta
datasets_service_trino_schema: default
datasets_service_trino_ca_cert: ''
