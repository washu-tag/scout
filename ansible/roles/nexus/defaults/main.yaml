---
# Default configuration for nexus role
# Override in inventory files as needed

nexus_namespace: nexus

# Helm chart (stevehipwell/nexus3)
nexus_helm_repo_name: stevehipwell
nexus_helm_repo_url: https://stevehipwell.github.io/helm-charts/
nexus_helm_chart_name: nexus3

# Admin password — REQUIRED, must be set in inventory (vault-encrypted)
# The role writes this to the nexus-root-password K8s secret on every run.
# NOTE: Nexus only reads this secret on first-ever startup. After that the
# password lives in Nexus's internal DB. To rotate, use the Nexus API:
#   PUT /service/rest/v1/security/users/admin/change-password
# Then update the vault value to keep the secret in sync.
nexus_root_password: ''

# Accept the Sonatype Nexus CE EULA (https://links.sonatype.com/products/nxrm/ce-eula).
# If false, you must manually log in to Nexus and accept the EULA during setup.
accept_nexus_eula: false

# Subdomain for ingress (results in nexus.{{ external_url }})
nexus_subdomain: nexus

# Storage
nexus_storage_size: 20Gi
nexus_storage_class: '' # empty = cluster default

# Resources (JVM-based, needs substantial memory)
# Override selectively in inventory with nexus_resources (e.g., nexus_resources: {limits: {memory: 8Gi}})
nexus_resources_default:
  requests:
    cpu: 500m
    memory: 2Gi
  limits:
    cpu: 2
    memory: 4Gi

# Blob stores (separate storage areas for different package formats)
nexus_blob_stores:
  - name: conda-store
    type: file
    path: conda-store
    softQuota:
      type: spaceRemainingQuota
      limit: 21474836480 # 20 GB
  - name: pypi-store
    type: file
    path: pypi-store
    softQuota:
      type: spaceRemainingQuota
      limit: 5368709120
  - name: yum-store
    type: file
    path: yum-store
    softQuota:
      type: spaceRemainingQuota
      limit: 5368709120 # 5 GB

# Cleanup policy — purge packages not downloaded in this many days
nexus_cleanup_last_downloaded_days: 90

# Proxy repositories — lists so operators can add/remove proxied sources
nexus_conda_repos:
  - name: conda-forge
    remoteUrl: https://conda.anaconda.org/conda-forge/
    blobStoreName: conda-store
  - name: defaults
    remoteUrl: https://repo.anaconda.com/pkgs/main/
    blobStoreName: conda-store

nexus_pypi_repos:
  - name: pypi-proxy
    remoteUrl: https://pypi.org/
    blobStoreName: pypi-store

nexus_yum_repos:
  - name: rancher-k3s
    remoteUrl: https://rpm.rancher.io/k3s/stable/common/centos/9/noarch
    blobStoreName: yum-store
  - name: epel-9
    remoteUrl: https://dl.fedoraproject.org/pub/epel/9/Everything/x86_64/
    blobStoreName: yum-store
  - name: nvidia-container-toolkit
    remoteUrl: https://nvidia.github.io/libnvidia-container/stable/rpm/x86_64/
    blobStoreName: yum-store

# Maven proxies. Maven and Gradle both resolve from Maven-format repositories,
# so a single set of Maven proxies (aggregated by nexus_maven_group below)
# serves both (ADR 0017). maven-central is default created in Nexus; declaring
# maven-central here is a harmless reaffirm when it already exists, and a
# create on a Nexus that lacks it -- so the group's member always exists.
nexus_maven_repos_base:
  - name: maven-central
    remoteUrl: https://repo1.maven.org/maven2/
    blobStoreName: default

# Added only when enable_xnat: non-XNAT deployments should not proxy a
# third-party Artifactory through the shared maven group (supply-chain surface).
# One proxy per distinct coordinate-plugin repo, derived from the shared plugin
# list (scout_common's xnat_coordinate_repo_urls — the openid default plus any
# operator `xnat_plugins`, which must be set in all.vars so this staging-run role
# sees them). The xnat_maven_proxy filter turns each URL into a {name, remoteUrl,
# blobStoreName}; names are deterministic so re-runs are idempotent. This
# replaces the formerly hard-coded nrgxnat entry — the openid repo now flows
# through the same derivation as operator plugins.
nexus_maven_repos_xnat_plugins: >-
  {{ (xnat_coordinate_repo_urls | default([])) | map('xnat_maven_proxy') | list }}

nexus_maven_repos: >-
  {{ nexus_maven_repos_base
     + (nexus_maven_repos_xnat_plugins if (enable_xnat | default(false) | bool) else []) }}

# Group that aggregates the Maven proxies into one resolvable URL. scout_common's
# maven_proxy_url points at this group (.../repository/<name>).
nexus_maven_group:
  name: scout-maven
  blobStoreName: default
  memberNames: >-
    {{ ['maven-central']
       + (nexus_maven_repos_xnat_plugins | map(attribute='name') | list
          if (enable_xnat | default(false) | bool) else []) }}

# Computed — uses external_url/inventory_hostname of the staging host (where this role runs)
# Same pattern as harbor_hostname in ansible/roles/harbor/defaults/main.yaml
nexus_hostname: '{{ nexus_subdomain }}.{{ external_url | default(inventory_hostname) }}'

# Base URL for Nexus API calls from the Ansible control node.
# Override when the control node can't reach the ingress on port 443
# (e.g., k3d with a non-standard port mapping: nexus.staging.local:9443)
nexus_api_base_url: 'https://{{ nexus_hostname }}'

# Health check URL — derived from nexus_api_base_url
nexus_health_check_url: '{{ nexus_api_base_url }}/service/rest/v1/status'
