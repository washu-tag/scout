---
# Deploy JupyterHub using Helm

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - jupyter_metrics_api_token is defined
      - jupyter_metrics_api_token | length > 0
    fail_msg: >
      Required API token (jupyter_metrics_api_token) must be set in inventory.yaml.
      Use vault encryption. Example: openssl rand -hex 32 | ansible-vault encrypt_string --vault-password-file vault/pwd.sh
    quiet: true

- name: Create namespace
  ansible.builtin.include_role:
    name: scout_common
    tasks_from: namespace
  vars:
    ns: '{{ jupyter_namespace }}'

- name: Determine target node for Jupyter pods
  ansible.builtin.set_fact:
    jupyter_target_node_name: "{{ hostvars[groups['gpu_workers'][0]]['inventory_hostname'] }}"
  when: groups['gpu_workers'] is defined and groups['gpu_workers'] | length > 0

- name: Create lake-reader ServiceAccount for Jupyter
  when: aws_deployment
  ansible.builtin.include_role:
    name: scout_common
    tasks_from: create_service_account
  vars:
    sa_name: '{{ lake_reader_service_account_name }}'
    sa_namespace: '{{ jupyter_namespace }}'
    sa_role_arn: '{{ lake_reader_role_arn }}'

- name: Setup Spark Defaults ConfigMap
  ansible.builtin.include_role:
    name: scout_common
    tasks_from: spark_config_setup
  vars:
    spark_defaults_configmap_name: '{{ jupyter_spark_defaults_configmap_name }}'
    spark_defaults_configmap_namespace: '{{ jupyter_namespace }}'
    spark_hive_metastore_uri: '{{ hive_metastore_endpoint_readonly }}'
    spark_s3_username: '{{ s3_lake_reader }}'
    spark_s3_password: '{{ s3_lake_reader_secret }}'

- name: Create ConfigMap with Scout logo for JupyterHub branding
  delegate_to: localhost
  no_log: true
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: scout-logo
        namespace: '{{ jupyter_namespace }}'
      binaryData:
        scout.png: '{{ lookup("community.general.binary_file", jupyter_logo_path) }}'
    kubeconfig: '{{ local_kubeconfig_yaml }}'

- name: Create ConfigMap with custom CSS for JupyterLab branding
  delegate_to: localhost
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: jupyterlab-custom-css
        namespace: '{{ jupyter_namespace }}'
      data:
        custom.css: '{{ lookup("file", "custom.css") }}'
    kubeconfig: '{{ local_kubeconfig_yaml }}'

- name: Create ConfigMap with custom JupyterHub templates
  delegate_to: localhost
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: jupyterhub-custom-templates
        namespace: '{{ jupyter_namespace }}'
      data:
        spawn.html: '{{ lookup("template", "spawn.html.j2") }}'
    kubeconfig: '{{ local_kubeconfig_yaml }}'

# Staging cert distribution for package proxy TLS trust (per ADR-0015)
# When package_proxy_mode is 'nexus' and the staging node uses a self-signed cert,
# we need to mount the CA cert into Jupyter pods so conda/pip can verify TLS.
# These tasks must run before the ConfigMap and Helm values are rendered,
# since condarc.j2, pip.conf.j2, and values.yaml.j2 check _package_proxy_needs_staging_cert.

- name: Determine if staging cert trust is needed for package proxy
  ansible.builtin.set_fact:
    _staging_uses_self_signed_cert: >-
      {{ (hostvars[groups['staging'][0]].tls_cert_path | default(staging_self_signed_tls_cert_path)) == staging_self_signed_tls_cert_path }}
    _package_proxy_needs_staging_cert: false
  when: package_proxy_mode == 'nexus' and groups['staging'] is defined and groups['staging'] | length > 0

- name: Evaluate staging cert requirement
  ansible.builtin.set_fact:
    _package_proxy_needs_staging_cert: '{{ _staging_uses_self_signed_cert | bool }}'
  when: _staging_uses_self_signed_cert is defined

- name: Slurp staging CA certificate
  ansible.builtin.slurp:
    src: "{{ hostvars[groups['staging'][0]].tls_cert_path | default(staging_self_signed_tls_cert_path) }}"
  delegate_to: "{{ groups['staging'][0] | default('localhost') }}"
  register: _staging_ca_cert
  when: _package_proxy_needs_staging_cert | default(false) | bool

- name: Create staging CA cert Secret for Jupyter pods
  delegate_to: localhost
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: staging-ca-cert
        namespace: '{{ jupyter_namespace }}'
      data:
        ca.crt: '{{ _staging_ca_cert.content }}'
    kubeconfig: '{{ local_kubeconfig_yaml }}'
  when: _package_proxy_needs_staging_cert | default(false) | bool

- name: Set staging CA cert pod path for templates
  ansible.builtin.set_fact:
    _staging_ca_cert_pod_path: /etc/pki/staging-secret/ca.crt
  when: _package_proxy_needs_staging_cert | default(false) | bool

- name: Discover quickstart sample files
  delegate_to: localhost
  ansible.builtin.find:
    paths: '{{ jupyter_samples_dir }}'
    file_type: file
  register: _jupyter_sample_files

- name: Build quickstart samples data
  ansible.builtin.set_fact:
    _jupyter_samples_data: "{{ _jupyter_samples_data | default({}) | combine({item | basename: lookup('file', item)}) }}"
  loop: "{{ _jupyter_sample_files.files | map(attribute='path') | list }}"
  no_log: true

- name: Create ConfigMap with Scout quickstart samples
  delegate_to: localhost
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: scout-quickstart-samples
        namespace: '{{ jupyter_namespace }}'
      data: '{{ _jupyter_samples_data }}'
    kubeconfig: '{{ local_kubeconfig_yaml }}'

- name: Parse Helm values
  ansible.builtin.set_fact:
    jh_helm_chart_values: "{{ lookup('template', 'values.yaml.j2') | from_yaml }}"

- name: Deploy JupyterHub
  ansible.builtin.include_role:
    name: scout_common
    tasks_from: deploy_helm_chart
  vars:
    helm_chart_name: jupyter
    helm_chart_ref: '{{ jupyter_helm_repo_name }}/{{ jupyter_helm_chart_name }}'
    helm_chart_version: '{{ jupyter_helm_chart_version }}'
    helm_chart_namespace: '{{ jupyter_namespace }}'
    helm_repo_name: '{{ jupyter_helm_repo_name }}'
    helm_repo_url: '{{ jupyter_helm_repo_url }}'
    helm_chart_timeout: 15m
    helm_chart_values: '{{ jh_helm_chart_values }}'
