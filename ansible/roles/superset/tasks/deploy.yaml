---
- name: Initialize Superset database
  ansible.builtin.include_role:
    name: scout_common
    tasks_from: create_db_with_owner
  vars:
    db_name: '{{ superset_database }}'
    db_owner: '{{ superset_postgres_user }}'
    db_owner_pass: '{{ superset_postgres_password }}'

- name: Create namespace
  ansible.builtin.include_role:
    name: scout_common
    tasks_from: namespace
  vars:
    ns: '{{ superset_namespace }}'

- name: Create ConfigMap with Scout logo and favicon for Superset branding
  delegate_to: localhost
  no_log: true
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: scout-logo
        namespace: '{{ superset_namespace }}'
      binaryData:
        scout.png: '{{ lookup("community.general.binary_file", superset_logo_path) }}'
        favicon.ico: '{{ lookup("community.general.binary_file", superset_favicon_path) }}'
    kubeconfig: '{{ local_kubeconfig_yaml }}'

- name: Create ConfigMap for StatsD exporter mapping
  delegate_to: localhost
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: superset-statsd-mapping
        namespace: '{{ superset_namespace }}'
      data:
        statsd_mapping.yaml: '{{ lookup("file", "statsd_mapping.yaml") }}'
    kubeconfig: '{{ local_kubeconfig_yaml }}'

- name: Create Service for StatsD exporter metrics
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: superset-statsd-metrics
        namespace: '{{ superset_namespace }}'
        labels:
          app: superset
          component: statsd-exporter
      spec:
        type: ClusterIP
        ports:
          - name: metrics
            port: '{{ superset_statsd_metrics_port }}'
            targetPort: '{{ superset_statsd_metrics_port }}'
            protocol: TCP
        selector:
          app: superset

- name: Create Secret with Valkey password for Superset
  no_log: true
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: superset-valkey-auth
        namespace: '{{ superset_namespace }}'
      type: Opaque
      stringData:
        REDIS_PASSWORD: '{{ valkey_password }}'

- name: Parse Superset Helm values
  ansible.builtin.set_fact:
    superset_helm_chart_values: "{{ lookup('template', 'values.yaml.j2') | from_yaml }}"

- name: Deploy Superset
  ansible.builtin.include_role:
    name: scout_common
    tasks_from: deploy_helm_chart
  vars:
    helm_chart_name: '{{ superset_helm_chart_name }}'
    helm_chart_ref: '{{ superset_helm_repo_name }}/{{ superset_helm_chart_name }}'
    helm_chart_version: '{{ superset_helm_chart_version }}'
    helm_chart_namespace: '{{ superset_namespace }}'
    helm_repo_name: '{{ superset_helm_repo_name }}'
    helm_repo_url: '{{ superset_helm_repo_url }}'
    helm_chart_timeout: '{{ superset_helm_timeout }}'
    helm_chart_values: '{{ superset_helm_chart_values }}'

# One-time migration: prior versions of this role created dashboard-config
# directly via kubernetes.core.k8s, so it lacks Helm ownership annotations.
# Helm 3 refuses to manage such a resource, so we delete it here when it has
# no Helm release annotation. Once the scout-dashboards chart has installed
# this ConfigMap once, this task becomes a no-op.
- name: Detect legacy unmanaged dashboard-config ConfigMap
  kubernetes.core.k8s_info:
    api_version: v1
    kind: ConfigMap
    name: dashboard-config
    namespace: '{{ superset_namespace }}'
  register: legacy_dashboard_config

- name: Remove legacy unmanaged dashboard-config (scout-dashboards chart will recreate)
  when:
    - legacy_dashboard_config.resources | length > 0
    - "'meta.helm.sh/release-name' not in (legacy_dashboard_config.resources[0].metadata.annotations | default({}))"
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: ConfigMap
    name: dashboard-config
    namespace: '{{ superset_namespace }}'

# Deploy dashboards via a separate Helm release. The chart owns the
# dashboard-config ConfigMap and an import Job whose pod template carries a
# checksum/config annotation tied to the rendered ConfigMap. Any analytics
# YAML edit changes the hash, Helm replaces the Job (per before-hook-creation
# delete policy), and the import re-runs. No Ansible-side change detection.
- name: Deploy scout-dashboards chart
  ansible.builtin.include_role:
    name: scout_common
    tasks_from: deploy_helm_chart
  vars:
    helm_chart_name: scout-dashboards
    helm_chart_ref: '{{ scout_repo_dir }}/helm/scout-dashboards'
    helm_chart_namespace: '{{ superset_namespace }}'
    helm_chart_values:
      image:
        repository: '{{ superset_image_repository }}'
        tag: '{{ superset_image_tag }}'
      trino:
        user: '{{ trino_user }}'
        namespace: '{{ trino_namespace }}'
