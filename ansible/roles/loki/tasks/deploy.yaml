---
- name: Create namespace
  ansible.builtin.include_role:
    name: scout_common
    tasks_from: namespace
  vars:
    ns: '{{ loki_namespace }}'

- name: Create loki-writer ServiceAccount for Loki
  when: aws_deployment
  ansible.builtin.include_role:
    name: scout_common
    tasks_from: create_service_account
  vars:
    sa_name: '{{ loki_writer_service_account_name }}'
    sa_namespace: '{{ loki_namespace }}'
    sa_role_arn: '{{ loki_writer_role_arn }}'

- name: Create S3 secret for Loki
  when: not aws_deployment
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: loki-secrets
        namespace: '{{ loki_namespace }}'
      type: Opaque
      stringData:
        AWS_ACCESS_KEY_ID: '{{ s3_loki_writer }}'
        AWS_SECRET_ACCESS_KEY: '{{ s3_loki_writer_secret }}'

- name: Deploy Loki
  ansible.builtin.include_role:
    name: scout_common
    tasks_from: deploy_helm_chart
  vars:
    helm_chart_name: loki
    helm_chart_ref: '{{ loki_helm_repo_name }}/loki'
    helm_chart_namespace: '{{ loki_namespace }}'
    helm_repo_name: '{{ loki_helm_repo_name }}'
    helm_repo_url: '{{ loki_helm_repo_url }}'
    helm_chart_version: '{{ loki_helm_chart_version }}'
    helm_chart_create_namespace: false
    helm_chart_timeout: '{{ loki_helm_timeout }}'
    helm_chart_values: "{{ lookup('template', 'loki.values.yaml.j2') | from_yaml }}"

# Promtail has been replaced by Grafana Alloy (see the alloy role).
# This task uninstalls a pre-existing promtail Helm release on clusters
# that were deployed before the migration. It's a no-op once the release
# is gone, so it's safe to leave in place; can be removed in a follow-up
# once all environments have transitioned. Mirrors the delegate/kubeconfig
# pattern used by scout_common/deploy_helm_chart so helm runs where it
# is installed (localhost in air-gapped mode, cluster node otherwise).
- name: Uninstall legacy Promtail Helm release
  vars:
    use_localhost: '{{ air_gapped | default(false) | bool }}'
    kubeconfig: '{{ local_kubeconfig_yaml if use_localhost else kubeconfig_yaml }}'
  delegate_to: '{{ "localhost" if use_localhost else inventory_hostname }}'
  environment:
    KUBECONFIG: '{{ kubeconfig }}'
    K8S_AUTH_KUBECONFIG: '{{ kubeconfig }}'
  kubernetes.core.helm:
    name: promtail
    release_namespace: '{{ loki_namespace }}'
    state: absent
    wait: true
