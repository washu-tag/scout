---
# Open WebUI and Ollama role defaults
# User-configurable settings are in inventory.yaml

# Helm configuration
open_webui_helm_repo_name: open-webui
open_webui_helm_repo_url: https://helm.openwebui.com/
open_webui_helm_chart_name: open-webui
open_webui_helm_release_name: open-webui

# Component names
ollama_name: ollama
open_webui_name: open-webui

# Ollama image (tag pinned in group_vars/all/versions.yaml)
ollama_image_repository: ollama/ollama

# Storage configuration
ollama_storage_size: 5Gi
ollama_storage_class: ''

# Air-gapped deployment configuration (ADR 0008)
# Set ollama_nfs_path when using shared NFS for model storage in air-gapped environments
# If air_gapped=true and ollama_nfs_path is set: models are read from NFS (pre-staged from staging)
# If air_gapped=true and ollama_nfs_path is not set: models are transferred via kubectl cp
# If air_gapped=false: models are pulled directly from registry.ollama.ai (online mode)
ollama_nfs_path: ''
# Mount path for NFS models inside containers (used by Ollama and model pull/create jobs)
ollama_nfs_mount_path: /nfs/ollama
# Namespace for staging Ollama download job (air-gapped only)
# Reuses the same namespace as RPM package downloads on staging
staging_ollama_namespace: '{{ package_download_namespace }}'

# Scout custom model configuration
scout_base_model: gpt-oss:120b
scout_model_name: gpt-oss-120b-long:latest
scout_model_num_predict: -1 # Unlimited token generation
scout_model_num_ctx: 131072 # 128K context window
scout_model_num_keep: 32768 # Keep 32K tokens in memory
scout_model_create: true # Set to false to skip Scout model creation
# List of Ollama models to pull automatically (see https://ollama.com/library)
# `scout_base_model` will be included by default
ollama_models: []

open_webui_storage_size: 2Gi
open_webui_storage_class: ''

# PostgreSQL configuration
open_webui_database: openwebui
open_webui_postgres_user: openwebui
# REQUIRED: Must be set in inventory.yaml (use vault encryption)
# Example: openssl rand -hex 32 | ansible-vault encrypt_string --vault-password-file vault/pwd.sh
open_webui_postgres_password: ''

# WebUI Secret Key for session management and OAuth security
# REQUIRED: Must be set in inventory.yaml (use vault encryption)
# Example: openssl rand -hex 32 | ansible-vault encrypt_string --vault-password-file vault/pwd.sh
open_webui_secret_key: ''

# Valkey connection URL for websocket coordination and distributed state management
open_webui_redis_url: 'redis://default:{{ valkey_password | urlencode }}@{{ valkey_helm_release_name }}.{{ valkey_namespace }}:6379'

# Resource configuration (dev defaults)
# WARNING: These are minimal defaults suitable for small models only.
# For production LLMs (especially large models like gpt-oss:120b), you MUST
# override these in inventory.yaml with significantly more resources.
# Recommended production values: 32Gi+ memory for requests, 64Gi+ for limits.
ollama_resources_default:
  requests:
    cpu: 2
    memory: 4Gi
  limits:
    cpu: 8
    memory: 16Gi

# Whether to request an NVIDIA GPU for Ollama
# Set to false for CPU-only environments (e.g., CI, dev without GPU)
ollama_gpu_enabled: true

# Minimum GPU VRAM required for Ollama (in GB)
# Used in node affinity to ensure Ollama is scheduled on nodes with sufficient GPU memory
# Default: 80GB (required for default Scout base model gpt-oss:120b at full precision)
# For smaller models or quantized versions, override in inventory.yaml:
#   ollama_min_gpu_memory_gb: 24  # For smaller models (e.g., llama3:70b)
#   ollama_min_gpu_memory_gb: 60  # For gpt-oss:120b quantized (MXFP4)
# Set to 0 to disable GPU memory requirement (schedules on any GPU node)
ollama_min_gpu_memory_gb: 80

open_webui_resources_default:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 2
    memory: 2Gi

# Content Security Policy (CSP) configuration
# Mitigates LLM data exfiltration attacks where malicious/manipulated model output
# embeds sensitive data in external resource URLs (images, scripts, forms, etc.)
# that the user's browser then fetches, leaking data to attacker-controlled servers.
# See: https://developer.nvidia.com/blog/practical-llm-security-advice-from-the-nvidia-ai-red-team/
open_webui_csp_enabled: true

# ----------------------------------------------------------------------------
# Declarative Open WebUI configuration (env-var-driven)
# ----------------------------------------------------------------------------
# These settings move admin-UI clickthrough config into Helm/Ansible. Open WebUI
# stores them as PersistentConfig — env vars seed initial values on first launch
# and are then editable in the admin UI. To force a fresh re-seed on existing
# deployments, drop the OWUI persistence PVC or wipe the relevant config rows.

# Trino MCP tool server — registered automatically as an Open WebUI external tool
# so users don't have to add it via Admin → Settings → Integrations.
# Override `tool_server_connections: []` to skip registration (e.g., environments
# without MCP Trino deployed).
mcp_trino_url: 'http://mcp-trino.{{ scout_analytics_namespace }}:8080/mcp'
mcp_trino_tool_id: 'scout-db'
tool_server_connections:
  - type: mcp # OWUI defaults to 'openapi'; MCP servers must declare explicitly
    url: '{{ mcp_trino_url }}'
    auth_type: none
    config:
      enable: true
    info:
      id: '{{ mcp_trino_tool_id }}' # Referenced from models as `server:mcp:{id}`
      name: 'Trino MCP'
      description: 'Query Scout Delta Lake with Trino'

# Disable Arena Model evaluation feature (per README post-deploy step 7)
open_webui_enable_arena_models: false

# RAG template — injected at chat time when knowledge is attached to a model.
# Path is relative to this role's `files/` directory.
open_webui_rag_template_file: rag-prompt.md

# ----------------------------------------------------------------------------
# Admin bootstrap (Phase 2 of automation)
# ----------------------------------------------------------------------------
# We mint an admin session JWT by calling OWUI's /signup endpoint (when the DB
# is empty) or /signin (on subsequent runs) through the in-cluster Service.
# `ENABLE_INITIAL_ADMIN_SIGNUP=true` lets /signup create the very first user
# as admin even when ENABLE_SIGNUP is false; once any user exists the endpoint
# self-blocks (auths.py:651 `if has_users or not ENABLE_INITIAL_ADMIN_SIGNUP`),
# so the env var is safe to leave on permanently. The bootstrap password is
# derived deterministically from open_webui_secret_key (already vault-secured)
# so we don't need to track another secret.
#
# This replaces the earlier WEBUI_AUTH_TRUSTED_*_HEADER trusted-header bootstrap.
# That mechanism set the `auth_trusted_header` frontend feature flag which made
# /auth auto-call /signin on every page load — surfacing a "trusted header"
# error toast to any user whose token expired or who passed through /auth.
# Signup-or-signin has no equivalent frontend coupling.
open_webui_bootstrap_email: 'scout-deploy@internal'
open_webui_bootstrap_name: 'Scout Deploy Bot'

# Deterministic bootstrap password derived from the WebUI secret key. SHA256
# hex (64 chars) fits bcrypt's 72-byte limit and rotates with the secret key
# (so a secret rotation forces a re-bootstrap, which is the right semantics).
open_webui_bootstrap_password: '{{ open_webui_secret_key | hash("sha256") }}'

# Set to false to skip post-deploy admin configuration entirely.
open_webui_admin_setup_enabled: true
