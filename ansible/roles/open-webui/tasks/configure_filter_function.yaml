---
# Configures one Open WebUI filter function idempotently.
# Called by configure_admin.yaml in a loop over open_webui_filter_functions.
#
# Required loop var: `fn` (one entry from open_webui_filter_functions)
# Required vars from configure_admin.yaml: `owui_admin_token`
#
# All curl commands run inside the OWUI pod against localhost:8080 — bypasses
# Traefik (and thus OAuth2 Proxy) so the OWUI Bearer JWT is the only credential
# needed.

- name: 'Read function source code: {{ fn.id }}'
  ansible.builtin.set_fact:
    _fn_content: "{{ lookup('file', role_path ~ '/files/' ~ fn.source_file) }}"

- name: 'Check if function exists: {{ fn.id }}'
  ansible.builtin.command:
    argv:
      - kubectl
      - exec
      - -n
      - '{{ chatbot_namespace }}'
      - deploy/open-webui
      - --
      - curl
      - -sf
      - -o
      - /dev/null
      - -w
      - '%{http_code}'
      - 'http://localhost:8080/api/v1/functions/id/{{ fn.id }}'
      - -H
      - 'Authorization: Bearer {{ owui_admin_token }}'
  environment:
    KUBECONFIG: '{{ kubeconfig_yaml }}'
  register: _fn_exists_check
  changed_when: false
  failed_when: false
  no_log: true

- name: 'Build FunctionForm payload: {{ fn.id }}'
  ansible.builtin.set_fact:
    _fn_payload:
      id: '{{ fn.id }}'
      name: '{{ fn.name }}'
      content: '{{ _fn_content }}'
      meta:
        description: '{{ fn.description }}'

- name: 'Create function (POST /create): {{ fn.id }}'
  ansible.builtin.command:
    argv:
      - kubectl
      - exec
      - -n
      - '{{ chatbot_namespace }}'
      - -i
      - deploy/open-webui
      - --
      - curl
      - -sfS
      - -X
      - POST
      - 'http://localhost:8080/api/v1/functions/create'
      - -H
      - 'Authorization: Bearer {{ owui_admin_token }}'
      - -H
      - 'Content-Type: application/json'
      - --data-binary
      - '@-'
    stdin: '{{ _fn_payload | to_json }}'
  environment:
    KUBECONFIG: '{{ kubeconfig_yaml }}'
  when: _fn_exists_check.stdout == '404'
  no_log: true

- name: 'Update existing function (POST /id/{id}/update): {{ fn.id }}'
  ansible.builtin.command:
    argv:
      - kubectl
      - exec
      - -n
      - '{{ chatbot_namespace }}'
      - -i
      - deploy/open-webui
      - --
      - curl
      - -sfS
      - -X
      - POST
      - 'http://localhost:8080/api/v1/functions/id/{{ fn.id }}/update'
      - -H
      - 'Authorization: Bearer {{ owui_admin_token }}'
      - -H
      - 'Content-Type: application/json'
      - --data-binary
      - '@-'
    stdin: '{{ _fn_payload | to_json }}'
  environment:
    KUBECONFIG: '{{ kubeconfig_yaml }}'
  when: _fn_exists_check.stdout == '200'
  no_log: true

- name: 'Set valves for function: {{ fn.id }}'
  ansible.builtin.command:
    argv:
      - kubectl
      - exec
      - -n
      - '{{ chatbot_namespace }}'
      - -i
      - deploy/open-webui
      - --
      - curl
      - -sfS
      - -X
      - POST
      - 'http://localhost:8080/api/v1/functions/id/{{ fn.id }}/valves/update'
      - -H
      - 'Authorization: Bearer {{ owui_admin_token }}'
      - -H
      - 'Content-Type: application/json'
      - --data-binary
      - '@-'
    stdin: '{{ fn.valves | default({}) | to_json }}'
  environment:
    KUBECONFIG: '{{ kubeconfig_yaml }}'
  when: fn.valves is defined and fn.valves | length > 0
  no_log: true

- name: 'Get current global state: {{ fn.id }}'
  ansible.builtin.command:
    argv:
      - kubectl
      - exec
      - -n
      - '{{ chatbot_namespace }}'
      - deploy/open-webui
      - --
      - curl
      - -sfS
      - 'http://localhost:8080/api/v1/functions/id/{{ fn.id }}'
      - -H
      - 'Authorization: Bearer {{ owui_admin_token }}'
  environment:
    KUBECONFIG: '{{ kubeconfig_yaml }}'
  register: _fn_current
  changed_when: false
  no_log: true

- name: 'Toggle global to match enable_global: {{ fn.id }}'
  ansible.builtin.command:
    argv:
      - kubectl
      - exec
      - -n
      - '{{ chatbot_namespace }}'
      - deploy/open-webui
      - --
      - curl
      - -sfS
      - -X
      - POST
      - 'http://localhost:8080/api/v1/functions/id/{{ fn.id }}/toggle/global'
      - -H
      - 'Authorization: Bearer {{ owui_admin_token }}'
  environment:
    KUBECONFIG: '{{ kubeconfig_yaml }}'
  when: (_fn_current.stdout | from_json).is_global | default(false) != (fn.enable_global | default(false))
  no_log: true
