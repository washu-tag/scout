---
# Configures one Open WebUI filter function idempotently.
# Called by configure_admin.yaml in a loop over open_webui_filter_functions.
#
# Required loop var: `fn` (one entry from open_webui_filter_functions)
# Required vars from configure_admin.yaml: `owui_admin_token`, `_owui_pod_name`
#
# All curl commands run inside the OWUI pod against localhost:8080 — bypasses
# Traefik (and thus OAuth2 Proxy) so the OWUI Bearer JWT is the only credential
# needed.

- name: 'Read function source code: {{ fn.id }}'
  ansible.builtin.set_fact:
    _fn_content: "{{ lookup('file', role_path ~ '/files/' ~ fn.source_file) }}"

- name: 'Check if function exists: {{ fn.id }}'
  kubernetes.core.k8s_exec:
    kubeconfig: '{{ kubeconfig_yaml }}'
    namespace: '{{ chatbot_namespace }}'
    pod: '{{ _owui_pod_name }}'
    command:
      - curl
      - -sS
      - -o
      - /dev/null
      - -w
      - '%{http_code}'
      - 'http://localhost:8080/api/v1/functions/id/{{ fn.id }}'
      - -H
      - 'Authorization: Bearer {{ owui_admin_token }}'
  register: _fn_exists_check
  changed_when: false
  no_log: true

- name: 'Build FunctionForm payload: {{ fn.id }}'
  ansible.builtin.set_fact:
    _fn_payload:
      id: '{{ fn.id }}'
      name: '{{ fn.name }}'
      content: '{{ _fn_content }}'
      meta:
        description: '{{ fn.description }}'

- name: 'Create function (POST /create): {{ fn.id }}'
  kubernetes.core.k8s_exec:
    kubeconfig: '{{ kubeconfig_yaml }}'
    namespace: '{{ chatbot_namespace }}'
    pod: '{{ _owui_pod_name }}'
    command:
      - /bin/sh
      - -c
      - |
        curl -sfS -X POST http://localhost:8080/api/v1/functions/create \
          -H "Authorization: Bearer $1" \
          -H 'Content-Type: application/json' \
          --data "$2"
      - _shell
      - '{{ owui_admin_token }}'
      - '{{ _fn_payload | to_json }}'
  when: _fn_exists_check.stdout != '200'
  no_log: true

- name: 'Update existing function (POST /id/{id}/update): {{ fn.id }}'
  kubernetes.core.k8s_exec:
    kubeconfig: '{{ kubeconfig_yaml }}'
    namespace: '{{ chatbot_namespace }}'
    pod: '{{ _owui_pod_name }}'
    command:
      - /bin/sh
      - -c
      - |
        curl -sfS -X POST "http://localhost:8080/api/v1/functions/id/$1/update" \
          -H "Authorization: Bearer $2" \
          -H 'Content-Type: application/json' \
          --data "$3"
      - _shell
      - '{{ fn.id }}'
      - '{{ owui_admin_token }}'
      - '{{ _fn_payload | to_json }}'
  when: _fn_exists_check.stdout == '200'
  no_log: true

- name: 'Set valves for function: {{ fn.id }}'
  kubernetes.core.k8s_exec:
    kubeconfig: '{{ kubeconfig_yaml }}'
    namespace: '{{ chatbot_namespace }}'
    pod: '{{ _owui_pod_name }}'
    command:
      - /bin/sh
      - -c
      - |
        body=$(mktemp)
        code=$(curl -sS -o "$body" -w '%{http_code}' -X POST \
          "http://localhost:8080/api/v1/functions/id/$1/valves/update" \
          -H "Authorization: Bearer $2" \
          -H 'Content-Type: application/json' \
          --data "$3")
        resp=$(cat "$body"); rm -f "$body"
        if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
          echo "POST .../valves/update failed: HTTP $code" >&2
          echo "$resp" >&2
          exit 1
        fi
      - _shell
      - '{{ fn.id }}'
      - '{{ owui_admin_token }}'
      - '{{ fn.valves | default({}) | to_json }}'
  when: fn.valves is defined and fn.valves | length > 0
  register: _fn_valves_result
  failed_when: false
  no_log: true

- name: 'Surface valves/update failure: {{ fn.id }}'
  ansible.builtin.fail:
    msg: |-
      Failed to set valves for {{ fn.id }} (rc={{ _fn_valves_result.rc }}). Stderr:
      {{ _fn_valves_result.stderr }}
  when: _fn_valves_result is defined and _fn_valves_result.rc is defined and _fn_valves_result.rc != 0

- name: 'Get current global state: {{ fn.id }}'
  kubernetes.core.k8s_exec:
    kubeconfig: '{{ kubeconfig_yaml }}'
    namespace: '{{ chatbot_namespace }}'
    pod: '{{ _owui_pod_name }}'
    command:
      - curl
      - -sfS
      - 'http://localhost:8080/api/v1/functions/id/{{ fn.id }}'
      - -H
      - 'Authorization: Bearer {{ owui_admin_token }}'
  register: _fn_current
  changed_when: false
  no_log: true

- name: 'Toggle global to match enable_global: {{ fn.id }}'
  kubernetes.core.k8s_exec:
    kubeconfig: '{{ kubeconfig_yaml }}'
    namespace: '{{ chatbot_namespace }}'
    pod: '{{ _owui_pod_name }}'
    command:
      - curl
      - -sfS
      - -X
      - POST
      - 'http://localhost:8080/api/v1/functions/id/{{ fn.id }}/toggle/global'
      - -H
      - 'Authorization: Bearer {{ owui_admin_token }}'
  when: (_fn_current.stdout | from_json).is_global | default(false) != (fn.enable_global | default(false))
  no_log: true

# OWUI's POST /create defaults is_active=false (FunctionForm has no is_active
# field). The function exists and is registered as global, but the filter
# never runs until is_active is true. /toggle is a TOGGLE not a setter, so
# we GET state and only flip when the current value differs from desired.
- name: 'Toggle is_active to match enable_active: {{ fn.id }}'
  kubernetes.core.k8s_exec:
    kubeconfig: '{{ kubeconfig_yaml }}'
    namespace: '{{ chatbot_namespace }}'
    pod: '{{ _owui_pod_name }}'
    command:
      - curl
      - -sfS
      - -X
      - POST
      - 'http://localhost:8080/api/v1/functions/id/{{ fn.id }}/toggle'
      - -H
      - 'Authorization: Bearer {{ owui_admin_token }}'
  when: (_fn_current.stdout | from_json).is_active | default(false) != (fn.enable_active | default(true))
  no_log: true
