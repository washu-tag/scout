---
# Phase 1.5: Re-push env-var-seeded PersistentConfig fields.
#
# OWUI stores tool servers, RAG template, default + task model IDs, etc. in
# the Postgres `config` table on first launch — env-var changes after that
# are silent no-ops (the admin UI is authoritative). Re-pushing through the
# REST API every deploy keeps inventory authoritative for these fields and
# eliminates the need to delete `config` rows after editing inventory.
#
# Fields explicitly NOT pushed here:
#   - WEBUI_URL: derived from server_hostname; expected to be stable after
#     first deploy. If it ever changes, an operator already has bigger
#     things to update (DNS, TLS, Keycloak redirect URIs).
#   - ENABLE_EVALUATION_ARENA_MODELS / ENABLE_SIGNUP / ENABLE_LOGIN_FORM /
#     ENABLE_COMMUNITY_SHARING: scout-fixed defaults; we set them false at
#     first deploy and don't expect them to change.
#   - OAuth.* PersistentConfig fields: already declarative via
#     ENABLE_OAUTH_PERSISTENT_CONFIG=false (env wins over stored).
#
# Required vars from configure_admin.yaml: `owui_admin_token`, `_owui_pod_name`,
#   `chatbot_namespace`, `kubeconfig_yaml`.

- name: 'Push tool_server_connections to /api/v1/configs/tool_servers'
  ansible.builtin.include_tasks: _owui_api_post.yaml
  vars:
    _post_path: /api/v1/configs/tool_servers
    _post_payload:
      TOOL_SERVER_CONNECTIONS: '{{ tool_server_connections | default([]) }}'

- name: 'Push RAG_TEMPLATE to /api/v1/retrieval/config/update (partial — only RAG_TEMPLATE)'
  ansible.builtin.include_tasks: _owui_api_post.yaml
  vars:
    _post_path: /api/v1/retrieval/config/update
    _post_payload:
      RAG_TEMPLATE: "{{ lookup('file', role_path ~ '/files/' ~ open_webui_rag_template_file) }}"
  when: open_webui_rag_template_file | default('') | length > 0

# /api/v1/configs/models's POST handler unconditionally assigns every field
# from the form, so a partial POST would clobber MODEL_ORDER_LIST etc. with
# nulls. GET first to preserve the other fields.
- name: 'GET current /api/v1/configs/models (preserve sibling fields)'
  ansible.builtin.command:
    argv:
      - kubectl
      - exec
      - -n
      - '{{ chatbot_namespace }}'
      - '{{ _owui_pod_name }}'
      - --
      - curl
      - -sfS
      - http://localhost:8080/api/v1/configs/models
      - -H
      - 'Authorization: Bearer {{ owui_admin_token }}'
  environment:
    KUBECONFIG: '{{ kubeconfig_yaml }}'
  register: _owui_models_config_current
  changed_when: false
  no_log: true
  when: open_webui_default_model_id | default('') | length > 0

- name: 'Push DEFAULT_MODELS to /api/v1/configs/models (merging with current)'
  ansible.builtin.include_tasks: _owui_api_post.yaml
  vars:
    _post_path: /api/v1/configs/models
    _post_payload: >-
      {{ (_owui_models_config_current.stdout | from_json)
         | combine({'DEFAULT_MODELS': open_webui_default_model_id}) }}
  when: open_webui_default_model_id | default('') | length > 0

# Same partial-payload concern for tasks/config/update — GET + merge + POST.
- name: 'GET current /api/v1/tasks/config (preserve sibling fields)'
  ansible.builtin.command:
    argv:
      - kubectl
      - exec
      - -n
      - '{{ chatbot_namespace }}'
      - '{{ _owui_pod_name }}'
      - --
      - curl
      - -sfS
      - http://localhost:8080/api/v1/tasks/config
      - -H
      - 'Authorization: Bearer {{ owui_admin_token }}'
  environment:
    KUBECONFIG: '{{ kubeconfig_yaml }}'
  register: _owui_tasks_config_current
  changed_when: false
  no_log: true
  when: open_webui_task_model_id | default('') | length > 0

- name: 'Push TASK_MODEL to /api/v1/tasks/config/update (merging with current)'
  ansible.builtin.include_tasks: _owui_api_post.yaml
  vars:
    _post_path: /api/v1/tasks/config/update
    _post_payload: >-
      {{ (_owui_tasks_config_current.stdout | from_json)
         | combine({'TASK_MODEL': open_webui_task_model_id}) }}
  when: open_webui_task_model_id | default('') | length > 0
