---
# Helper: POST a JSON payload to OWUI's REST API via the in-cluster Service.
# Used to push env-var-seeded PersistentConfig that OWUI would otherwise treat
# as seed-only (see "Bootstrap & Migration" in this role's README).
#
# Required vars (from caller):
#   _post_path:    path beginning with `/api/...` (e.g., /api/v1/configs/tool_servers)
#   _post_payload: dict — will be JSON-encoded and sent as the request body
#
# Required vars (from configure_admin.yaml):
#   _owui_pod_name, owui_admin_token, chatbot_namespace, kubeconfig_yaml
#
# Positional args to the inner shell ($1=path, $2=token, $3=json body) keep
# the JSON payload out of shell parsing.
- name: 'POST {{ _post_path }} (declarative push)'
  kubernetes.core.k8s_exec:
    kubeconfig: '{{ kubeconfig_yaml }}'
    namespace: '{{ chatbot_namespace }}'
    pod: '{{ _owui_pod_name }}'
    command:
      - /bin/sh
      - -c
      - |
        body=$(mktemp)
        code=$(curl -sS -o "$body" -w '%{http_code}' -X POST "http://localhost:8080$1" \
          -H 'Content-Type: application/json' \
          -H "Authorization: Bearer $2" \
          --data "$3")
        resp=$(cat "$body"); rm -f "$body"
        if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
          echo "POST $1 failed: HTTP $code" >&2
          echo "$resp" >&2
          exit 1
        fi
        printf '%s' "$resp"
      - _shell
      - '{{ _post_path }}'
      - '{{ owui_admin_token }}'
      - '{{ _post_payload | to_json }}'
  register: _owui_api_post_response
  changed_when: true
  no_log: true
