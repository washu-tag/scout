---
# Kubernetes deployment tasks for Open WebUI with Ollama
# These tasks run on the server host

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - open_webui_postgres_password is defined
      - open_webui_postgres_password | length > 0
      - open_webui_secret_key is defined
      - open_webui_secret_key | length > 0
    fail_msg: >
      open_webui_postgres_password and open_webui_secret_key are both required.
      Please set them in your inventory.yaml (use vault encryption).
      open_webui_secret_key backs both session signing and the deterministic
      bootstrap admin password — rotating it invalidates the bootstrap login,
      which the password-migration step in configure_admin.yaml then recovers
      on the next deploy.
      Example: openssl rand -hex 32 | ansible-vault encrypt_string --vault-password-file vault/pwd.sh
    quiet: true

- name: Create namespace
  ansible.builtin.include_role:
    name: scout_common
    tasks_from: namespace
  vars:
    ns: '{{ chatbot_namespace }}'

- name: Initialize Open WebUI database
  ansible.builtin.include_role:
    name: scout_common
    tasks_from: create_db_with_owner
  vars:
    db_name: '{{ open_webui_database }}'
    db_owner: '{{ open_webui_postgres_user }}'
    db_owner_pass: '{{ open_webui_postgres_password }}'

- name: Grant schema ownership to user
  ansible.builtin.include_role:
    name: scout_common
    tasks_from: execute_sql
  vars:
    sql_script: 'ALTER SCHEMA public OWNER TO {{ open_webui_postgres_user }};'
    sql_dbname: '{{ open_webui_database }}'

- name: Create Kubernetes Secret for sensitive env vars
  ansible.builtin.include_tasks: create_secret.yaml

# For air-gapped deployments: ensure NFS directory structure exists BEFORE deploying Ollama
# Production Ollama mounts NFS read-only, so it can't create these directories itself
- name: Pre-create Ollama directory structure on NFS (air-gapped)
  block:
    - name: Create Ollama blobs and manifests directories
      ansible.builtin.file:
        path: '{{ ollama_nfs_path }}/{{ item }}'
        state: directory
        mode: '0755'
      loop:
        - blobs
        - manifests
      delegate_to: '{{ (groups["staging"] | default([inventory_hostname]))[0] }}'
  when:
    - air_gapped | default(false) | bool
    - ollama_nfs_path is defined and ollama_nfs_path | length > 0

# Create Traefik middleware for Content Security Policy (CSP)
# Mitigates LLM data exfiltration attacks where malicious/manipulated model output
# embeds sensitive data in external resource URLs (images, scripts, forms, etc.)
# that the user's browser then fetches, leaking data to attacker-controlled servers.
# See: https://developer.nvidia.com/blog/practical-llm-security-advice-from-the-nvidia-ai-red-team/
- name: Create CSP middleware for data exfiltration prevention
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'csp-middleware.yaml.j2') | from_yaml }}"
  when: open_webui_csp_enabled | bool

- name: Parse Helm values
  ansible.builtin.set_fact:
    owui_helm_chart_values: "{{ lookup('template', 'values.yaml.j2') | from_yaml }}"

- name: Deploy Open WebUI using Helm
  ansible.builtin.include_role:
    name: scout_common
    tasks_from: deploy_helm_chart
  vars:
    helm_chart_name: '{{ open_webui_helm_release_name }}'
    helm_chart_ref: '{{ open_webui_helm_repo_name }}/{{ open_webui_helm_chart_name }}'
    helm_chart_namespace: '{{ chatbot_namespace }}'
    helm_chart_version: '{{ open_webui_helm_chart_version }}'
    helm_repo_name: '{{ open_webui_helm_repo_name }}'
    helm_repo_url: '{{ open_webui_helm_repo_url }}'
    helm_chart_values: '{{ owui_helm_chart_values }}'
    helm_chart_timeout: '10m'

- name: Wait for Open WebUI to be ready
  ansible.builtin.command: 'kubectl -n {{ chatbot_namespace }} wait --for=condition=Ready --timeout=300s pod -l app.kubernetes.io/name=open-webui'
  register: open_webui_ready
  changed_when: false

# Add NFS + HTTP health check to Ollama liveness probe (air-gapped only)
# The Helm chart only supports httpGet probes, but we need an exec probe
# to detect stale NFS handles. This replaces the HTTP probe with one that:
# 1. Checks NFS mount accessibility (fails immediately on stale handle)
# 2. Checks Ollama HTTP API via 'ollama list' (restarts if server hung)
# The readiness probe (HTTP) still handles quick removal from service;
# this liveness probe ensures restart after prolonged failures.
# Uses JSON patch to fully replace the livenessProbe (strategic merge can't
# replace probe handler types).
- name: Patch Ollama deployment with NFS liveness probe
  kubernetes.core.k8s_json_patch:
    kind: Deployment
    name: ollama
    namespace: '{{ chatbot_namespace }}'
    patch:
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe
        value:
          exec:
            command:
              [
                '/bin/sh',
                '-c',
                'ls {{ ollama_nfs_mount_path }} > /dev/null 2>&1 && ollama list > /dev/null 2>&1',
              ]
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 20
          failureThreshold: 3
          successThreshold: 1
  when:
    - air_gapped | default(false) | bool
    - ollama_nfs_path is defined
    - ollama_nfs_path | length > 0

# Ensure all Scout base models are in ollama_models list if Scout model creation is enabled
- name: Add Scout base models to ollama_models
  ansible.builtin.set_fact:
    ollama_models: "{{ (ollama_models | default([])) | union(scout_models | map(attribute='base') | list) }}"
  when: scout_model_create | bool

# Pull Ollama models and create Scout model (combined into single job)
- name: Pull Ollama models
  ansible.builtin.include_tasks: pull_models.yaml
  when: ollama_models is defined and ollama_models | length > 0

# Deploy the open-webui-bootstrap Helm chart. Its post-install/post-upgrade
# Job mints an admin JWT against OWUI's in-cluster Service and pushes filter
# functions, custom models, and PersistentConfig (tool servers, RAG template,
# DEFAULT_MODELS, TASK_MODEL) via the REST API — see helm/open-webui-bootstrap/
# and configure_admin.yaml for details.
- name: Bootstrap Open WebUI admin + push declarative config
  ansible.builtin.include_tasks: configure_admin.yaml
  when: open_webui_admin_setup_enabled | bool
