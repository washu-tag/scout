---
# Phase 2 admin configuration: mints an admin JWT via Open WebUI's trusted-header
# SSO (bypassing Traefik via the in-cluster Service), then uses it to seed
# Functions, Models, and Knowledge collections via OWUI's REST API.
#
# This file currently implements Phase 2a — the bootstrap (JWT minting only).
# Phases 2b/2c/2d will layer Functions/Models/Knowledge automation on top.

# SigninForm requires non-empty email + password (Pydantic validates the body
# BEFORE the handler picks the trusted-header path); the form values are
# discarded once trusted-header takes over (signup_handler generates a random
# uuid for the password it actually persists). We send a placeholder so the
# Pydantic validation passes.
#
# Capture HTTP status separately from body so we can surface OWUI's error
# message on non-2xx without silently failing inside curl's `-f` flag.
- name: 'Mint OWUI admin JWT via trusted-header SSO (in-cluster, bypasses Traefik)'
  ansible.builtin.command:
    argv:
      - kubectl
      - exec
      - -n
      - '{{ chatbot_namespace }}'
      - deploy/open-webui
      - --
      - /bin/sh
      - -c
      - |
        body=$(mktemp)
        code=$(curl -sS -o "$body" -w '%{http_code}' -X POST http://localhost:8080/api/v1/auths/signin \
          -H "Content-Type: application/json" \
          -H "{{ open_webui_bootstrap_email_header }}: {{ open_webui_bootstrap_email }}" \
          -H "{{ open_webui_bootstrap_name_header }}: {{ open_webui_bootstrap_name }}" \
          -H "{{ open_webui_bootstrap_role_header }}: admin" \
          --data '{"email": "{{ open_webui_bootstrap_email }}", "password": "trusted-header-bootstrap"}')
        resp=$(cat "$body"); rm -f "$body"
        if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
          echo "OWUI signin failed: HTTP $code" >&2
          echo "$resp" >&2
          exit 1
        fi
        echo "$resp"
  environment:
    KUBECONFIG: '{{ kubeconfig_yaml }}'
  register: owui_bootstrap_signin
  changed_when: false
  failed_when: false
  no_log: true

- name: 'Surface signin failure (stderr from the curl wrapper)'
  ansible.builtin.fail:
    msg: |-
      OWUI signin failed (rc={{ owui_bootstrap_signin.rc }}). Stderr from the in-pod curl:
      {{ owui_bootstrap_signin.stderr }}
      Diagnostic checklist:
        - Are the WEBUI_AUTH_TRUSTED_*_HEADER env vars actually present on the pod?
            kubectl exec -n {{ chatbot_namespace }} deploy/open-webui -- env | grep WEBUI_AUTH_TRUSTED
        - Did the OWUI pod restart after Helm picked up the env vars? (helm upgrade rolls pods)
        - Is ENABLE_PASSWORD_AUTH explicitly set to false in inventory? (signin returns 403 if so)
  when: owui_bootstrap_signin.rc != 0

- name: 'Extract admin JWT from signin response'
  ansible.builtin.set_fact:
    owui_admin_token: '{{ (owui_bootstrap_signin.stdout | from_json).token }}'
  no_log: true

- name: 'Verify admin JWT works (GET /api/v1/auths/ should return user info with role=admin)'
  ansible.builtin.command:
    cmd: >-
      kubectl exec -n {{ chatbot_namespace }} deploy/open-webui --
      curl -sf http://localhost:8080/api/v1/auths/
      -H "Authorization: Bearer {{ owui_admin_token }}"
  environment:
    KUBECONFIG: '{{ kubeconfig_yaml }}'
  register: owui_admin_verify
  changed_when: false
  no_log: true
  failed_when:
    - owui_admin_verify.rc != 0 or (owui_admin_verify.stdout | from_json).role != 'admin'

- name: 'Bootstrap complete — admin JWT minted'
  ansible.builtin.debug:
    msg: >-
      Admin JWT minted for {{ open_webui_bootstrap_email }} (role=admin).

# ---------------------------------------------------------------------------
# Phase 2b: Filter Functions (Link Sanitizer, Context Summarization)
# ---------------------------------------------------------------------------
- name: 'Configure filter functions'
  ansible.builtin.include_tasks: configure_filter_function.yaml
  loop: '{{ open_webui_filter_functions | default([]) }}'
  loop_control:
    loop_var: fn
    label: '{{ fn.id }}'

# ---------------------------------------------------------------------------
# Phase 2d: Knowledge collections (must be created BEFORE models so models
# can reference them in meta.knowledge)
# ---------------------------------------------------------------------------
- name: 'Discover OWUI pod name (for kubectl cp)'
  ansible.builtin.command:
    argv:
      - kubectl
      - get
      - pod
      - -n
      - '{{ chatbot_namespace }}'
      - -l
      - app.kubernetes.io/name=open-webui
      - -o
      - jsonpath={.items[0].metadata.name}
  environment:
    KUBECONFIG: '{{ kubeconfig_yaml }}'
  register: _owui_pod_lookup
  changed_when: false

- name: 'Set OWUI pod name fact'
  ansible.builtin.set_fact:
    _owui_pod_name: '{{ _owui_pod_lookup.stdout }}'

- name: 'Configure knowledge collections'
  ansible.builtin.include_tasks: configure_knowledge_collection.yaml
  loop: '{{ open_webui_knowledge_collections | default([]) }}'
  loop_control:
    loop_var: kc
    label: '{{ kc.name }}'

# ---------------------------------------------------------------------------
# Phase 2c: Custom UI models (Scout Explorer variants)
# ---------------------------------------------------------------------------
- name: 'Read shared Scout system prompt'
  ansible.builtin.set_fact:
    _scout_system_prompt: "{{ lookup('file', role_path ~ '/files/' ~ open_webui_scout_system_prompt_file) }}"

- name: 'Build list of knowledge objects to attach to every Scout model'
  ansible.builtin.set_fact:
    _scout_knowledge_objects: '{{ (_owui_knowledge_objects | default({})).values() | list }}'

- name: 'Configure OWUI custom models for scout_models entries with ui: block'
  ansible.builtin.include_tasks: configure_model.yaml
  loop: '{{ scout_models | default([]) | selectattr("ui", "defined") | list }}'
  loop_control:
    loop_var: m
    label: '{{ m.ui.name | default(m.name) }}'
