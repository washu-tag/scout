---
# Deploy the open-webui-bootstrap Helm chart. The chart runs a post-install/
# post-upgrade Job in the OWUI namespace that:
#   1. Migrates the bootstrap user's bcrypt hash to match the derived password.
#   2. Mints an admin JWT via /signin or (on fresh DB) /signup.
#   3. Re-pushes env-var-seeded PersistentConfig (tool servers, RAG template,
#      DEFAULT_MODELS, TASK_MODEL) — OWUI is seed-only for these otherwise.
#   4. Creates/updates filter functions + sets valves + toggles global/active.
#   5. Creates/updates custom Scout Explorer models + hide-base overrides.
#
# Replaces what used to be ~6 kubectl-exec'd Ansible task files. The script
# lives in helm/open-webui-bootstrap/files/bootstrap.py; everything else here
# just renders inventory → Helm values that the chart turns into a ConfigMap
# the Job mounts. Pure gitops: the work happens in-cluster, observable via
# `kubectl logs job/open-webui-bootstrap-<release>`.

# Build the Scout Explorer system prompt + RAG template once. Both must be
# resolved in THIS role's `role_path` context — if we left the lookup inline
# in helm_chart_values, Ansible would re-evaluate it when scout_common's
# deploy_helm_chart task materializes the dict, and `role_path` would then
# point at scout_common (wrong directory, file not found).
- name: 'Read shared Scout system prompt + RAG template'
  ansible.builtin.set_fact:
    _bootstrap_system_prompt: "{{ lookup('file', role_path ~ '/files/' ~ open_webui_scout_system_prompt_file) }}"
    _bootstrap_rag_template: "{{ lookup('file', role_path ~ '/files/' ~ open_webui_rag_template_file) if open_webui_rag_template_file | default('') | length > 0 else '' }}"

# Filter function payloads — fold inventory + source code from files/ into a
# single list the chart serializes into filters.json for the Job to consume.
- name: 'Build filter function payloads'
  ansible.builtin.set_fact:
    _bootstrap_filter_functions: '{{ _bootstrap_filter_functions | default([]) + [_one] }}'
  loop: '{{ open_webui_filter_functions | default([]) }}'
  loop_control:
    label: '{{ item.id }}'
  vars:
    _one:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      description: '{{ item.description | default("") }}'
      content: "{{ lookup('file', role_path ~ '/files/' ~ item.source_file) }}"
      enable_global: '{{ item.enable_global | default(false) }}'
      enable_active: '{{ item.enable_active | default(true) }}'
      valves: '{{ item.valves | default({}) }}'

# Custom model payloads — one Scout Explorer per scout_models[].ui entry, plus
# a hidden override on each raw Ollama tag (unless open_webui_hide_base_models
# is false or base equals the long-variant name).
- name: 'Build Scout Explorer model payloads'
  ansible.builtin.set_fact:
    _bootstrap_models: '{{ _bootstrap_models | default([]) + [_explorer] + _hide_base }}'
  loop: '{{ scout_models | default([]) | selectattr("ui", "defined") | list }}'
  loop_control:
    label: '{{ item.ui.name | default(item.name) }}'
  vars:
    _id: '{{ item.ui.id | default(item.name) }}'
    _keep_alive_resident: '{{ open_webui_scout_keep_alive_resident }}'
    _keep_alive_cold: '{{ open_webui_scout_keep_alive_cold_load }}'
    _explorer:
      id: '{{ _id }}'
      base_model_id: null
      name: '{{ item.ui.name }}'
      meta:
        profile_image_url: '{{ item.ui.profile_image_url | default(open_webui_scout_default_profile_image_url) }}'
        description: '{{ item.ui.description | default("") }}'
        toolIds: '{{ item.ui.tool_ids | default(open_webui_scout_tool_ids) }}'
        suggestion_prompts: '{{ item.ui.suggestion_prompts | default(open_webui_scout_default_suggestion_prompts) }}'
        capabilities: '{{ item.ui.capabilities | default(open_webui_scout_default_capabilities) }}'
        builtinTools: '{{ item.ui.builtin_tools | default(open_webui_scout_default_builtin_tools) }}'
      params:
        system: '{{ _bootstrap_system_prompt }}'
        function_calling: '{{ item.ui.function_calling | default(open_webui_scout_default_function_calling) }}'
        reasoning_effort: '{{ item.ui.reasoning_effort | default(open_webui_scout_default_reasoning_effort) }}'
        keep_alive: '{{ item.ui.keep_alive | default(_keep_alive_resident if (item.preload | default(true)) else _keep_alive_cold) }}'
      is_active: true
    _hide_base: >-
      {{
        [{
          'id': item.base,
          'base_model_id': none,
          'name': item.base,
          'meta': {},
          'params': {},
          'is_active': false
        }]
        if (open_webui_hide_base_models | default(true) | bool and item.base != _id)
        else []
      }}

- name: 'Deploy open-webui-bootstrap Helm chart (post-install/upgrade Job)'
  ansible.builtin.include_role:
    name: scout_common
    tasks_from: deploy_helm_chart
  vars:
    helm_chart_name: open-webui-bootstrap
    helm_chart_ref: '{{ role_path }}/../../../helm/open-webui-bootstrap'
    helm_chart_namespace: '{{ chatbot_namespace }}'
    helm_chart_values:
      # image: omitted — chart's default (matches OWUI's chart appVersion)
      # is correct for our deploys. Override via inventory if running a custom
      # OWUI build: pass `open-webui-bootstrap` chart values directly.
      owuiBaseUrl: 'http://open-webui.{{ chatbot_namespace }}:80'
      bootstrap:
        email: '{{ open_webui_bootstrap_email }}'
        name: '{{ open_webui_bootstrap_name }}'
        webuiSecretKeySecret:
          name: open-webui-secrets
          key: WEBUI_SECRET_KEY
      databaseUrl: 'postgresql://{{ open_webui_postgres_user }}:{{ open_webui_postgres_password }}@{{ db_host }}:{{ db_port }}/{{ open_webui_database }}'
      persistentConfig:
        tool_server_connections: '{{ tool_server_connections | default([]) }}'
        rag_template: '{{ _bootstrap_rag_template }}'
        default_model_id: '{{ open_webui_default_model_id | default("") }}'
        task_model_id: '{{ open_webui_task_model_id | default("") }}'
      filterFunctions: '{{ _bootstrap_filter_functions | default([]) }}'
      models: '{{ _bootstrap_models | default([]) }}'
