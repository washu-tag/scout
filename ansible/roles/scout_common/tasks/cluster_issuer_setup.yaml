---
# Bootstrap a self-signed CA for Scout internal TLS (Trino now; future internal
# services that need cluster-internal TLS will reuse the same CA).
#
# Standard cert-manager "bootstrap CA" pattern:
#   1. scout-selfsigned-bootstrap (SelfSigned ClusterIssuer) — issues the CA cert
#   2. scout-ca (Certificate, isCA: true) — the actual CA cert + key in
#      cert-manager namespace; output Secret 'scout-ca' has tls.crt, tls.key, ca.crt
#   3. scout-internal-ca (CA ClusterIssuer) — signs all internal certs using
#      the scout-ca Secret
#
# Idempotent; can be called from multiple roles. The Certificate has a long
# duration (10y) and renews 1y before expiry, so re-deploys don't churn it.

- name: Create Scout SelfSigned bootstrap ClusterIssuer
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: cert-manager.io/v1
      kind: ClusterIssuer
      metadata:
        name: scout-selfsigned-bootstrap
      spec:
        selfSigned: {}

- name: Create Scout internal CA Certificate
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: cert-manager.io/v1
      kind: Certificate
      metadata:
        name: scout-ca
        namespace: '{{ cert_manager_namespace }}'
      spec:
        isCA: true
        commonName: scout-internal-ca
        secretName: scout-ca
        privateKey:
          algorithm: ECDSA
          size: 256
        duration: 87600h # 10 years
        renewBefore: 8760h # 1 year
        issuerRef:
          name: scout-selfsigned-bootstrap
          kind: ClusterIssuer
          group: cert-manager.io

- name: Wait for Scout CA Secret to exist
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: scout-ca
    namespace: '{{ cert_manager_namespace }}'
  register: scout_ca_secret
  until: scout_ca_secret.resources | length > 0 and scout_ca_secret.resources[0].data is defined and 'tls.crt' in scout_ca_secret.resources[0].data
  retries: 30
  delay: 5

- name: Create Scout internal CA ClusterIssuer
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: cert-manager.io/v1
      kind: ClusterIssuer
      metadata:
        name: scout-internal-ca
      spec:
        ca:
          secretName: scout-ca
