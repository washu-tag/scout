---
# Create Spark configuration ConfigMap
# This is used by JupyterHub and other Spark-enabled services
#
# NOTE: spark-defaults.conf has been transferred to the hl7-transformer Helm
# chart, chart-owned via sparkDefaults.* (the "hl7-transformer.sparkDefaultsConf"
# helper, ADR 0031 phase 0). This Ansible copy is retained for the on-prem deploy
# path and will be retired separately when the Ansible service roles are removed
# (ADR 0031 phase 5 cutover).

- name: Render Spark defaults configuration
  ansible.builtin.set_fact:
    spark_defaults_conf_content: "{{ lookup('template', 'spark-defaults.conf.j2') }}"

- name: Create Spark ConfigMap
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: '{{ spark_defaults_configmap_name }}'
        namespace: '{{ spark_defaults_configmap_namespace }}'
      data:
        spark-defaults.conf: '{{ spark_defaults_conf_content }}'
