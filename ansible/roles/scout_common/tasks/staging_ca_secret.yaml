---
# Create a `staging-ca-cert` Secret in a namespace so pods can trust the
# staging node's self-signed TLS cert when talking to the package proxy
# (ADR 0016 / ADR 0017). The Secret is needed only when the package proxy is
# the staging Nexus (package_proxy_mode == 'nexus') and the staging node
# serves the default self-signed cert rather than an operator-provided one
# (a tls_cert_path override on the staging host).
#
# Usage:
#   - name: Create staging CA Secret
#     ansible.builtin.include_role:
#       name: scout_common
#       tasks_from: staging_ca_secret
#     vars:
#       staging_ca_namespace: '{{ my_namespace }}'
#
# Sets the fact `_staging_ca_needed` (bool) for callers' templates and creates
# the Secret only when true. Tasks run un-delegated under the play's
# cluster_k8s_environment, per the kubeconfig convention in
# docs/internal/ansible_roles.md — the k8s API call needs no control-node
# files (the CA is slurped from the staging host into a registered var).

- name: Determine if the staging self-signed CA must be trusted
  ansible.builtin.set_fact:
    _staging_ca_needed: >-
      {{ package_proxy_mode == 'nexus'
         and (groups['staging'] | default([]) | length > 0)
         and (hostvars[(groups['staging'] | default([inventory_hostname]))[0]].tls_cert_path
              | default(staging_self_signed_tls_cert_path))
             == staging_self_signed_tls_cert_path }}

- name: Slurp the staging CA certificate
  ansible.builtin.slurp:
    src: "{{ hostvars[groups['staging'][0]].tls_cert_path | default(staging_self_signed_tls_cert_path) }}"
  delegate_to: "{{ groups['staging'][0] }}"
  register: _staging_ca_cert
  when: _staging_ca_needed | bool

- name: Create the staging CA Secret
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: staging-ca-cert
        namespace: '{{ staging_ca_namespace }}'
      data:
        ca.crt: '{{ _staging_ca_cert.content }}'
  when: _staging_ca_needed | bool
