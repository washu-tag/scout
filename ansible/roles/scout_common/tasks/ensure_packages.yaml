---
# Generic Package Installation
# Unified wrapper that handles package installation for both online and air-gapped environments.
# In air-gapped mode, Nexus yum proxy repos must be pre-configured on the node
# (via configure_nexus_yum_repos.yaml) before calling this task.
#
# Required parameters:
#   - package_names: List of package names to install (e.g., ["python3-kubernetes"])
#   - package_type: Description for logging (e.g., "Python", "SELinux", "GPU")
#
# Optional parameters:
#   - verify_command: Command to verify installation (optional)
#   - online_repo_setup: Path to task file for online-mode repo setup (optional, skipped in air-gapped)

################################################################################
# Skip if packages already installed
################################################################################

- name: Check if {{ package_type }} packages are already installed
  ansible.builtin.shell: |
    rpm -q {{ package_names | join(' ') }} > /dev/null 2>&1
  register: packages_check
  changed_when: false
  failed_when: false

- name: Display package installation status
  ansible.builtin.debug:
    msg: "{{ package_type }} packages {{ 'already installed - skipping' if packages_check.rc == 0 else 'will be installed' }}"

################################################################################
# Guard: fail early if air-gapped without yum proxy
################################################################################

- name: Fail if air-gapped without yum proxy configured
  ansible.builtin.fail:
    msg: >-
      Air-gapped RPM installation requires a yum proxy.
      Either set package_proxy_mode: nexus and deploy Nexus on the staging node,
      or set package_proxy_mode: external and provide yum_proxy_base_url in inventory.
  when:
    - air_gapped | default(false) | bool
    - yum_proxy_base_url | default('') | length == 0
    - packages_check.rc != 0

################################################################################
# Repository setup (online mode only)
################################################################################

- name: Run online repository setup tasks
  ansible.builtin.include_tasks: '{{ online_repo_setup }}'
  when:
    - online_repo_setup is defined
    - not (air_gapped | default(false) | bool)
    - packages_check.rc != 0

################################################################################
# Install packages
################################################################################

- name: Install {{ package_type }} packages
  ansible.builtin.package:
    name: '{{ package_names }}'
    state: present
  when: packages_check.rc != 0

################################################################################
# Verification (Optional)
################################################################################

- name: Verify {{ package_type }} package installation
  ansible.builtin.shell: '{{ verify_command }}'
  register: package_verify_result
  changed_when: false
  when: verify_command is defined
