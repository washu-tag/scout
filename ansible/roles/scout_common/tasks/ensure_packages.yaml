---
# Generic Package Installation
# Unified wrapper that handles package installation for both online and air-gapped environments.
# Configures the required yum repository (if specified) and installs packages.
#
# Required parameters:
#   - package_names: List of package names to install (e.g., ["python3-kubernetes"])
#   - package_type: Description for logging (e.g., "Python", "GPU")
#
# Optional parameters:
#   - yum_repo: Dict with 'name' and 'url' for a yum repository the packages require.
#               A .repo file is created automatically. In proxy mode (yum_proxy_base_url is set),
#               baseurl points to the proxy; otherwise it points to the upstream url.
#   - verify_command: Command to verify installation (optional)

################################################################################
# Skip if packages already installed
################################################################################

- name: Check if {{ package_type }} packages are already installed
  ansible.builtin.shell: |
    rpm -q {{ package_names | join(' ') }} > /dev/null 2>&1
  register: packages_check
  changed_when: false
  failed_when: false

- name: Display package installation status
  ansible.builtin.debug:
    msg: "{{ package_type }} packages {{ 'already installed - skipping' if packages_check.rc == 0 else 'will be installed' }}"

################################################################################
# Repository setup
################################################################################

- name: Configure {{ yum_repo.name | default('') }} yum repository
  ansible.builtin.template:
    src: yum-repo.j2
    dest: '/etc/yum.repos.d/{{ yum_repo.name }}.repo'
    mode: '0644'
  when:
    - yum_repo is defined
    - packages_check.rc != 0

################################################################################
# Install packages
################################################################################

- name: Install {{ package_type }} packages
  ansible.builtin.package:
    name: '{{ package_names }}'
    state: present
  when: packages_check.rc != 0

################################################################################
# Verification (Optional)
################################################################################

- name: Verify {{ package_type }} package installation
  ansible.builtin.shell: '{{ verify_command }}'
  register: package_verify_result
  changed_when: false
  when: verify_command is defined
