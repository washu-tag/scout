---
# Configure dnf/yum to use Nexus proxy repositories on production nodes
# Only runs when package_proxy_mode == 'nexus' and air_gapped == true
# Must run before any role that calls `dnf install` in air-gapped mode
#
# 1. Trusts the staging node's self-signed CA in the system trust store
# 2. Drops .repo files into /etc/yum.repos.d/ for each Nexus yum proxy repo

- name: Skip Nexus yum repo configuration
  ansible.builtin.debug:
    msg: 'Nexus yum repos not configured (package_proxy_mode={{ package_proxy_mode }}, air_gapped={{ air_gapped | default(false) }})'
  when: package_proxy_mode != 'nexus' or not (air_gapped | default(false) | bool)

- name: Configure Nexus yum proxy repos
  when:
    - package_proxy_mode == 'nexus'
    - air_gapped | default(false) | bool
    - groups['staging'] is defined and groups['staging'] | length > 0
  block:
    - name: Load Nexus role variables (default values)
      ansible.builtin.include_vars:
        file: '{{ playbook_dir }}/../roles/nexus/defaults/main.yaml'
      run_once: true

    ############################################################################
    # Staging CA trust
    ############################################################################

    - name: Check if staging node uses self-signed cert
      ansible.builtin.set_fact:
        _staging_uses_self_signed: >-
          {{ (hostvars[(groups['staging'] | default([inventory_hostname]))[0]].tls_cert_path | default(staging_self_signed_tls_cert_path)) == staging_self_signed_tls_cert_path }}
      run_once: true

    - name: Slurp staging CA certificate
      ansible.builtin.slurp:
        src: '{{ hostvars[(groups["staging"] | default([inventory_hostname]))[0]].tls_cert_path | default(staging_self_signed_tls_cert_path) }}'
      delegate_to: "{{ (groups['staging'] | default([inventory_hostname]))[0] }}"
      register: _staging_ca_cert
      run_once: true
      when: _staging_uses_self_signed | bool

    - name: Install staging CA into system trust store
      ansible.builtin.copy:
        content: '{{ _staging_ca_cert.content | b64decode }}'
        dest: /etc/pki/ca-trust/source/anchors/staging-ca.crt
        mode: '0644'
      register: _staging_ca_installed
      when: _staging_uses_self_signed | bool

    - name: Update system CA trust
      ansible.builtin.command: update-ca-trust
      changed_when: true
      when:
        - _staging_uses_self_signed | bool
        - _staging_ca_installed is changed

    ############################################################################
    # Yum repo files
    ############################################################################

    - name: Configure Nexus yum proxy repositories
      ansible.builtin.template:
        src: nexus-yum-repo.j2
        dest: '/etc/yum.repos.d/nexus-{{ item.name }}.repo'
        mode: '0644'
      loop: '{{ nexus_yum_repos }}'
      loop_control:
        label: '{{ item.name }}'
