---
# Defaults for scout_common role
# This role contains shared tasks and default configuration values
# All values here can be overridden in inventory.yaml
timezone: 'America/Chicago'

# Storage class configuration
# Custom storage classes for k3s on-prem deployments with multiple disks requiring I/O isolation
# Leave empty for cloud deployments or single-disk k3s (cluster default will be used)
onprem_local_path_multidisk_storage_classes: []

# Helm deployment defaults
helm_chart_create_namespace: true
helm_chart_wait: true
helm_chart_timeout: '5m'
helm_chart_values: {}
helm_chart_values_files: []

# Custom images (override from inventory for CI/CD)
# Launchpad: launchpad_image_repository and launchpad_image_tag (see roles/launchpad/defaults/main.yaml)
# Superset: superset_image_repository and superset_image_tag (see roles/superset/defaults/main.yaml)
# Extractors: hl7log_extractor_image_repository/tag and hl7_transformer_image_repository/tag (see roles/extractor/defaults/main.yaml)

# Shared notebook image (scipy-notebook + trino-python-client + voila).
# Used as JupyterHub's singleuser image and as Voila's image.
scout_notebook_image_name: ghcr.io/washu-tag/scout-notebook
scout_notebook_image_tag: latest

# Kubernetes configuration
kubeconfig_yaml: /etc/rancher/k3s/k3s.yaml
air_gapped: false

# Ansible control node location relative to cluster
# TRUE when control node is external to cluster - needs fetched kubeconfig
# FALSE when control node is on the cluster - can use cluster kubeconfig directly
ansible_control_node_external_to_cluster: "{{ hostvars[inventory_hostname].ansible_connection | default('ssh') != 'local' or (air_gapped | bool) }}"

# Kubeconfig path for Ansible control node execution
# When control node is on cluster, uses the cluster's kubeconfig directly
# When control node is external, uses a fetched copy stored locally
local_kubeconfig_dir: '{{ scout_repo_dir }}/.kube/scout/{{ ansible_host | default(inventory_hostname) }}'
local_kubeconfig_yaml: "{{ (local_kubeconfig_dir + '/config') if ansible_control_node_external_to_cluster else kubeconfig_yaml }}"

# Scout repository path (on localhost / Ansible control node)
# Used for scout-local helm charts, analytics files, logos, and kubeconfig storage
# Default assumes running Ansible from within the cloned scout repo
scout_repo_dir: '{{ (playbook_dir ~ "/../..") | realpath }}'

# Clone/update scout repo to scout_repo_dir before deployment
# Default: false (assumes running from within cloned repo)
# Set to true to clone or update the repo to a different location
clone_scout_repo: false

# Namespace for air-gapped staging Jobs (Grafana plugin downloads, Ollama model staging, etc.)
package_download_namespace: default

# Consolidated Namespaces (6 primary namespaces)
scout_core_namespace: scout-core
scout_data_namespace: scout-data
scout_extractor_namespace: scout-extractor
scout_analytics_namespace: scout-analytics
scout_operators_namespace: scout-operators
scout_monitoring_namespace: scout-monitoring

# System namespaces (kept separate)
traefik_namespace: kube-system
harbor_namespace: harbor

# Squid forward proxy port (on staging node for air-gapped IdP access)
squid_port: 3128

# Domains required by each IdP for air-gapped proxy access
# Used by both squid (allowlist) and keycloak (proxy mappings)
squid_microsoft_domains:
  - login.microsoftonline.com
  - graph.microsoft.com

squid_github_domains:
  - github.com
  - api.github.com

# Staging node self-signed TLS certificate paths
# Used when tls_cert_path/tls_key_path not provided in inventory
staging_self_signed_tls_cert_path: /etc/rancher/k3s/tls/staging-tls.crt
staging_self_signed_tls_key_path: /etc/rancher/k3s/tls/staging-tls.key

# Service-to-namespace mappings
# Core infrastructure
postgres_cluster_namespace: '{{ scout_core_namespace }}'
keycloak_namespace: '{{ scout_core_namespace }}'
valkey_namespace: '{{ scout_core_namespace }}'
valkey_helm_release_name: valkey
launchpad_namespace: '{{ scout_core_namespace }}'

# Data layer
minio_tenant_namespace: '{{ scout_data_namespace }}'
# Tenant name used by the MinIO operator. Surfaced here (rather than
# only in roles/minio/defaults) so cross-namespace consumers — Keycloak
# event listener publishing the OPA bundle, OPA pulling it (ADR 0021) —
# can reference the headless service name `{tenant}-hl.{namespace}:9000`
# without depending on role-local defaults.
minio_tenant_name: scout
hive_namespace: '{{ scout_data_namespace }}'
dcm4chee_namespace: '{{ scout_data_namespace }}'
orthanc_namespace: '{{ scout_data_namespace }}'

# Extractor & workflow orchestration
extractor_namespace: '{{ scout_extractor_namespace }}'

# Analytics & user services
trino_namespace: '{{ scout_analytics_namespace }}'
# HTTPS listener port for client traffic. Lives in scout_common (not the
# trino role) so consumer roles (jupyter, superset, scout-dashboards)
# can reference it without depending on the trino role being loaded.
trino_https_port: 8443
trino_rw_namespace: '{{ scout_extractor_namespace }}'
trino_rw_release_name: trino-rw
trino_rw_endpoint_host: '{{ trino_rw_release_name }}.{{ trino_rw_namespace }}'
trino_rw_endpoint_port: 8080
# OPA enforces Trino's access-control policy. Deployed alongside Trino so
# the query path stays in-cluster. Surfaced in scout_common so consumer
# roles (grafana for the decision-log dashboard, future
# NetworkPolicy/alerts) can reference it without depending on the opa
# role being loaded.
opa_namespace: '{{ trino_namespace }}'
superset_namespace: '{{ scout_analytics_namespace }}'
jupyter_namespace: '{{ scout_analytics_namespace }}'
chatbot_namespace: '{{ scout_analytics_namespace }}'

# Operators
cnpg_operator_namespace: '{{ scout_operators_namespace }}'
minio_operator_namespace: '{{ scout_operators_namespace }}'
eck_operator_namespace: '{{ scout_operators_namespace }}'
gpu_operator_namespace: '{{ scout_operators_namespace }}'
cert_manager_namespace: '{{ scout_operators_namespace }}'

# Monitoring
prometheus_namespace: '{{ scout_monitoring_namespace }}'
grafana_namespace: '{{ scout_monitoring_namespace }}'
loki_namespace: '{{ scout_monitoring_namespace }}'
alloy_namespace: '{{ scout_monitoring_namespace }}'

# OAuth configuration
oauth_provider_name: Keycloak # User-facing name for OAuth provider (e.g., 'WashU Key', 'Keycloak')

# Keycloak OAuth client IDs and secrets (client secrets must be defined in inventory)
keycloak_oauth2_proxy_client_id: oauth2-proxy
keycloak_superset_client_id: superset
keycloak_jupyterhub_client_id: jupyterhub
keycloak_grafana_client_id: grafana
keycloak_temporal_client_id: temporal
keycloak_minio_client_id: minio
keycloak_launchpad_client_id: launchpad
keycloak_open_webui_client_id: open-webui

# OAuth callback URLs for each client
open_webui_callback_url: 'https://chat.{{ server_hostname }}/oauth/oidc/callback'
jupyterhub_callback_url: 'https://jupyter.{{ server_hostname }}/hub/oauth_callback'
grafana_callback_url: 'https://grafana.{{ server_hostname }}/login/generic_oauth'
temporal_callback_url: 'https://temporal.{{ server_hostname }}/auth/sso/callback'
superset_callback_url: 'https://superset.{{ server_hostname }}/oauth-authorized/keycloak'
minio_callback_url: 'https://minio.{{ server_hostname }}/oauth_callback'
launchpad_callback_url: 'https://{{ server_hostname }}/api/auth/callback/keycloak'

# S3/MinIO configuration (passwords defined in inventory)
s3_region: us-east-1
s3_username: minio
s3_lake_reader: lake-reader
s3_lake_writer: lake-writer
s3_loki_writer: loki-writer
# OPA bundle service accounts (ADR 0021). Writer is mounted into the
# Keycloak pod (event listener publishes the bundle); reader is mounted
# into each OPA pod (bundle plugin pulls).
s3_opa_bundle_writer: opa-bundle-writer
s3_opa_bundle_reader: opa-bundle-reader
lake_bucket: lake
scratch_bucket: scratch
loki_chunks_bucket: loki-chunks
loki_ruler_bucket: loki-ruler
loki_admin_bucket: loki-admin
# OPA bundle storage (ADR 0021). One object per Scout deployment:
# opa-bundles/scout/bundle.tar.gz, replacing per-request Keycloak admin
# API fetches with a periodic pull from MinIO.
opa_bundles_bucket: opa-bundles

# Service Account names
lake_reader_service_account_name: lake-reader
lake_writer_service_account_name: lake-writer
loki_writer_service_account_name: loki-writer

# Deployment Type
deployment_type: onprem

# Database
postgres_cluster_name: postgresql-cluster

# Usernames (passwords defined in inventory)
postgres_user: scout
hive_postgres_user: hive
hive_readonly_postgres_user: hive_readonly
superset_postgres_user: superset
keycloak_postgres_user: keycloak

# Database names
hive_database_name: hive
superset_database_name: superset

# Table names
report_delta_table_name: reports
ingest_postgres_table_name: ingest

# Hive deployment
hive_metastore_instance: hive-metastore
hive_metastore_instance_readonly: hive-metastore-readonly

# Trino RO username — the user-facing Trino has no authN; writes are blocked
# at the connector level (delta.security=READ_ONLY) and by the read-only
# metastore + S3 credentials. The RW Trino instance (trino-rw) accepts
# writes and is gated to the hl7-transformer pod via NetworkPolicy.
trino_user: trino

# Shared environment for Kubernetes operations on cluster nodes
# Use in playbooks: environment: "{{ cluster_k8s_environment }}"
cluster_k8s_environment:
  KUBECONFIG: '{{ kubeconfig_yaml }}'
  K8S_AUTH_KUBECONFIG: '{{ kubeconfig_yaml }}'

# Object storage paths (use variables for bucket names)
scratch_path: 's3://{{ scratch_bucket }}'
delta_lake_path: 's3a://{{ lake_bucket }}/delta' # Hadoop requires the s3a prefix

# OAuth2 Proxy configuration
oauth2_proxy_subdomain: auth

# Keycloak configuration (DO NOT CHANGE)
# The realm and subdomain values are hardcoded in Launchpad.
# These variables are used for constructing the authentication URLs below.
keycloak_realm_name: scout
keycloak_subdomain: keycloak

# Feature flags (override from inventory to enable/disable features)
enable_chat: false
enable_playbooks: false

# node by design (MinIO pool). With this on, the GPU node gets
# `nvidia.com/gpu=present:NoSchedule` and the above workloads carry
# matching tolerations; everything else avoids the GPU node. Disable
# for small/dev clusters where the GPU node's spare capacity is
# genuinely useful for non-GPU pods.
enable_gpu_node_taint: true

# Scout AuthZ: maps Keycloak user attributes to the SQL columns the Trino
# OPA policy filters on. Single source of truth consumed by two roles:
#   - keycloak: renders one User Profile attribute per key here so each
#     becomes editable in the Keycloak admin UI (admin-only view/edit).
#   - opa: renders the same map into data.attribute_filters so the
#     policy emits `column IN ('v1','v2')` filters for tables in
#     trino_filtered_tables. Wildcard `*` disables that filter.
#
# Adding a new restriction dimension is one inventory edit — both
# Keycloak and OPA pick it up on next deploy. Optional per-attribute
# overrides for display name / validation pattern live alongside
# `column`, see ansible/roles/keycloak/templates/scout-realm.json.j2
# for the rendered shape.
trino_attribute_filters:
  allowed_facilities:
    column: sending_facility

# Superset dashboard bundles to install. Built-in bundles: core, quality,
# followup. Override in inventory to add more (e.g. [core, quality]).
scout_dashboard_bundles:
  - core

# Package proxy configuration (per ADR-0016, following ADR-0011 service-mode pattern)
# Options: none, nexus, external
#   none     - No proxy; packages resolve directly from upstream (internet required)
#   nexus    - Nexus CE on staging node; URLs computed from nexus_host
#   external - Operator-provided proxy; set per-format URLs in inventory
package_proxy_mode: none

# Nexus connection (used when package_proxy_mode == 'nexus')
# Override nexus_host in inventory if Nexus is on a non-default host/port.
# Default derives from the staging node (where Nexus is deployed alongside Harbor).
# TLS is required; staging cert is distributed per ADR-0015.
nexus_host: >-
  {{ ((hostvars[groups['staging'][0]].nexus_subdomain | default('nexus')) ~ '.' ~ (hostvars[groups['staging'][0]].external_url | default(groups['staging'][0])))
     if (groups['staging'] is defined and groups['staging'] | length > 0)
     else '' }}

# Computed values (DO NOT CHANGE)
#
# Package proxy URLs (computed from nexus_host when package_proxy_mode is 'nexus').
# When package_proxy_mode is 'external', override these in inventory.
# conda_channel_alias is the base URL for conda channel resolution:
#   channel_alias + channel_name → full repo URL (e.g. .../repository/conda-forge)
# Nexus repos are named to match upstream channel names (conda-forge, defaults).
conda_channel_alias: >-
  {{ ('https://' ~ nexus_host ~ '/repository')
     if package_proxy_mode == 'nexus'
     else '' }}
pip_proxy_url: >-
  {{ ('https://' ~ nexus_host ~ '/repository/pypi-proxy/simple')
     if package_proxy_mode == 'nexus'
     else '' }}
yum_proxy_base_url: >-
  {{ ('https://' ~ nexus_host ~ '/repository')
     if package_proxy_mode == 'nexus'
     else '' }}
aws_deployment: "{{ deployment_type | trim | lower == 'aws' }}"
s3_endpoint: "{{ aws_deployment | ternary('', 'http://minio.' ~ minio_tenant_namespace) }}"
hive_metastore_endpoint: 'thrift://{{ hive_metastore_instance }}.{{ hive_namespace }}:9083'
hive_metastore_endpoint_readonly: 'thrift://{{ hive_metastore_instance_readonly }}.{{ hive_namespace }}:9083'
server_hostname: '{{ hostvars[groups["server"][0]].external_url | default(groups["server"][0]) }}'
db_host: '{{ postgres_cluster_name }}-rw.{{ postgres_cluster_namespace }}'
db_host_ro: '{{ postgres_cluster_name }}-r.{{ postgres_cluster_namespace }}'
db_port: 5432
jdbc_url: 'jdbc:postgresql://{{ db_host }}:{{ db_port }}'
# External Keycloak URLs (for browser/external access)
keycloak_base_url: 'https://{{ keycloak_subdomain }}.{{ server_hostname }}'
keycloak_realm_url: '{{ keycloak_base_url }}/realms/{{ keycloak_realm_name }}'
# OIDC URLs
keycloak_oidc_auth_url: '{{ keycloak_realm_url }}/protocol/openid-connect/auth'
keycloak_oidc_token_url: '{{ keycloak_realm_url }}/protocol/openid-connect/token'
keycloak_oidc_userinfo_url: '{{ keycloak_realm_url }}/protocol/openid-connect/userinfo'
keycloak_oidc_certs_url: '{{ keycloak_realm_url }}/protocol/openid-connect/certs'
keycloak_oidc_logout_url: '{{ keycloak_realm_url }}/protocol/openid-connect/logout'
keycloak_wellknown_url: '{{ keycloak_realm_url }}/.well-known/openid-configuration'

# Internal Keycloak URL for in-cluster service-to-service token minting
# (e.g. Superset/Voila minting a *_svc client_credentials JWT for Trino).
# Bypasses Traefik + TLS entirely — avoids self-signed-cert trust issues
# in CI smoke-test (which can't reach the external hostname over a
# verified cert) and reduces a network hop on every token mint in
# production. The same pattern the Trino role already uses for its
# JWKS endpoint (trino_keycloak_jwks_url).
keycloak_internal_url: 'http://keycloak-service.{{ keycloak_namespace }}:8080'
keycloak_internal_token_url: '{{ keycloak_internal_url }}/realms/{{ keycloak_realm_name }}/protocol/openid-connect/token'
oauth2_proxy_base_url: 'https://{{ oauth2_proxy_subdomain }}.{{ server_hostname }}'
oauth2_proxy_callback_url: '{{ oauth2_proxy_base_url }}/oauth2/callback'
oauth2_proxy_signout_url: '{{ oauth2_proxy_base_url }}/oauth2/sign_out'
oauth2_proxy_auth_url: '{{ oauth2_proxy_base_url }}/oauth2/auth'
