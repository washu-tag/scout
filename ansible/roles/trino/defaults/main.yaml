---
# Trino role defaults
# User-configurable settings are in inventory.yaml

# Trino Helm configuration
trino_helm_repo_name: trino
trino_helm_repo_url: https://trinodb.github.io/charts
trino_helm_chart_name: trino

# Trino AuthZ / TLS / OPA configuration (ADR 0020 authorization, ADR 0022 auth).
# JWT auth requires TLS — Trino terminates HTTPS directly using a cert from
# the Scout internal CA (cert-manager); the chart's HTTP listener is disabled.
# The user-facing Service port (`trino_https_port`) is defined in
# scout_common/defaults/main.yaml so consumer roles can reference it without
# loading the trino role.
trino_keystore_password: trinokeystorepass # protects the in-pod keystore; not a network secret

trino_keycloak_jwks_url: 'http://keycloak-service.{{ keycloak_namespace }}:8080/realms/{{ keycloak_realm_name }}/protocol/openid-connect/certs'
trino_keycloak_required_audience: trino
trino_opa_endpoint: 'http://opa-trino.{{ trino_namespace }}:8181'

# Resource sizing - users should override these in inventory
# Worker count
trino_worker_count: 2 # Number of worker replicas

# Memory
trino_worker_max_heap: 2G # JVM heap size for workers
trino_coordinator_max_heap: 1G # JVM heap size for coordinator

# Query memory allocation (Trino recommendation: 30% of heap)
# Per https://trino.io/docs/current/admin/properties-resource-management.html
trino_per_node_query_memory_fraction: 0.3 # Fraction of heap allocated to query.max-memory-per-node

# CPU (dev defaults - CI friendly)
trino_worker_cpu_request: 250m
trino_worker_cpu_limit: 2
trino_coordinator_cpu_request: 250m
trino_coordinator_cpu_limit: 1

# Resource configuration (dev defaults - CI friendly)
# Consolidated resource blocks for templates
trino_coordinator_resources:
  requests:
    cpu: '{{ trino_coordinator_cpu_request }}'
    memory: '{{ trino_coordinator_max_heap | jvm_memory_to_k8s }}'
  limits:
    cpu: '{{ trino_coordinator_cpu_limit }}'
    memory: '{{ trino_coordinator_max_heap | jvm_memory_to_k8s(4) }}'

trino_worker_resources:
  requests:
    cpu: '{{ trino_worker_cpu_request }}'
    memory: '{{ trino_worker_max_heap | jvm_memory_to_k8s }}'
  limits:
    cpu: '{{ trino_worker_cpu_limit }}'
    memory: '{{ trino_worker_max_heap | jvm_memory_to_k8s(4) }}'

# RW Trino (admin) — small instance used by hl7-transformer for view DDL
# Note: trino_rw_release_name lives in scout_common because the extractor
# role's values template references it (via trino_rw_endpoint_host) and
# does not load the trino role's defaults.
trino_rw_enabled: true
trino_rw_worker_count: 1
trino_rw_worker_max_heap: 1G
trino_rw_coordinator_max_heap: 512M

trino_rw_coordinator_resources:
  requests:
    cpu: 100m
    memory: '{{ trino_rw_coordinator_max_heap | jvm_memory_to_k8s }}'
  limits:
    cpu: 500m
    memory: '{{ trino_rw_coordinator_max_heap | jvm_memory_to_k8s(4) }}'

trino_rw_worker_resources:
  requests:
    cpu: 100m
    memory: '{{ trino_rw_worker_max_heap | jvm_memory_to_k8s }}'
  limits:
    cpu: 500m
    memory: '{{ trino_rw_worker_max_heap | jvm_memory_to_k8s(4) }}'

# Trino MCP server configuration
mcp_trino_repo_url: https://github.com/tuannvm/mcp-trino.git
mcp_trino_repo_version: 'v{{ mcp_trino_version }}'
mcp_trino_chart_path: /tmp/mcp-trino-chart
mcp_trino_release_name: mcp-trino

# MCP Trino resources (dev defaults - CI friendly)
mcp_trino_resources_default:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 1
    memory: 1Gi
