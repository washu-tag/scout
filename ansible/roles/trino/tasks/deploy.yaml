---
# Deploy Trino using Helm

- name: Parse Helm values
  ansible.builtin.set_fact:
    trino_helm_chart_values: "{{ lookup('template', 'values.yaml.j2') | from_yaml }}"

- name: Ensure Trino namespace exists
  ansible.builtin.include_role:
    name: scout_common
    tasks_from: namespace
  vars:
    ns: '{{ trino_namespace }}'
  when: not aws_deployment

- name: Create S3 credentials Secret for Trino
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: trino-s3
        namespace: '{{ trino_namespace }}'
      stringData:
        S3_ACCESS_KEY: '{{ s3_lake_reader }}'
        S3_SECRET_KEY: '{{ s3_lake_reader_secret }}'
  environment: '{{ cluster_k8s_environment }}'
  no_log: true
  when: not aws_deployment

- name: Create lake-reader ServiceAccount for Trino
  when: aws_deployment
  ansible.builtin.include_role:
    name: scout_common
    tasks_from: create_service_account
  vars:
    sa_name: '{{ lake_reader_service_account_name }}'
    sa_namespace: '{{ trino_namespace }}'
    sa_role_arn: '{{ lake_reader_role_arn }}'

- name: Deploy cert-manager (required by the Trino TLS Certificate below)
  ansible.builtin.include_role:
    name: cert_manager
  when: not aws_deployment

- name: Set up Scout internal CA ClusterIssuer (idempotent)
  ansible.builtin.include_role:
    name: scout_common
    tasks_from: cluster_issuer_setup
  when: not aws_deployment

- name: Create Trino RBAC env Secret (keystore password + internal shared secret)
  delegate_to: localhost
  no_log: true
  kubernetes.core.k8s:
    state: present
    kubeconfig: '{{ local_kubeconfig_yaml }}'
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: trino-rbac-env
        namespace: '{{ trino_namespace }}'
      type: Opaque
      stringData:
        # KEYSTORE_PASSWORD: used by cert-manager (Certificate passwordSecretRef)
        #   AND by Trino via envFrom (read in property as ${ENV:KEYSTORE_PASSWORD}).
        # INTERNAL_SHARED_SECRET: read in property as ${ENV:INTERNAL_SHARED_SECRET};
        #   protects worker↔coordinator traffic on the internal-communication channel.
        KEYSTORE_PASSWORD: '{{ trino_keystore_password }}'
        INTERNAL_SHARED_SECRET: '{{ trino_internal_shared_secret }}'

# === Password authenticator (interim, ADR 0022) =============================
# File-based PASSWORD authenticator. Service principals on
# trino_password_authenticator_users (defined per-deployment in inventory)
# get a bcrypted entry in password.db; clients authenticate with HTTP Basic.
# JWT remains the primary auth mode — see values.yaml.j2 `authenticationType:
# PASSWORD,JWT`. Trino tries each authenticator in declared order.
#
# Removal trigger: when the custom MCP tool replaces upstream mcp-trino
# (target: next quarter), drop `trino_password_authenticator_users` entirely
# and revert authenticationType to JWT-only.
- name: Create Trino password-authenticator Secret
  delegate_to: localhost
  no_log: true
  kubernetes.core.k8s:
    state: present
    kubeconfig: '{{ local_kubeconfig_yaml }}'
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: trino-password-auth
        namespace: '{{ trino_namespace }}'
      type: Opaque
      stringData:
        # Authenticator config: points at password.db, refreshes every 30s
        # so adding/rotating an entry takes effect without a pod restart.
        password-authenticator.properties: |
          password-authenticator.name=file
          file.password-file=/etc/trino/password-auth/password.db
          file.refresh-period=30s
        # password.db: `username:bcrypt-hash` per line. Rendered from a
        # separate template (Jinja control flow at column 0 confuses the
        # YAML parser when inlined here).
        password.db: "{{ lookup('template', 'password.db.j2') }}"

- name: Issue Trino TLS Certificate
  delegate_to: localhost
  kubernetes.core.k8s:
    state: present
    kubeconfig: '{{ local_kubeconfig_yaml }}'
    definition: "{{ lookup('template', 'certificate.yaml.j2') }}"

- name: Wait for Trino TLS keystore Secret to be ready
  delegate_to: localhost
  kubernetes.core.k8s_info:
    kubeconfig: '{{ local_kubeconfig_yaml }}'
    api_version: v1
    kind: Secret
    name: trino-tls
    namespace: '{{ trino_namespace }}'
  register: trino_tls_secret
  until: trino_tls_secret.resources | length > 0 and trino_tls_secret.resources[0].data is defined and 'keystore.p12' in trino_tls_secret.resources[0].data
  retries: 30
  delay: 5

- name: Deploy Trino
  ansible.builtin.include_role:
    name: scout_common
    tasks_from: deploy_helm_chart
  vars:
    helm_chart_name: trino
    helm_chart_ref: '{{ trino_helm_repo_name }}/{{ trino_helm_chart_name }}'
    helm_chart_version: '{{ trino_helm_chart_version }}'
    helm_chart_namespace: '{{ trino_namespace }}'
    helm_repo_name: '{{ trino_helm_repo_name }}'
    helm_repo_url: '{{ trino_helm_repo_url }}'
    helm_chart_values: '{{ trino_helm_chart_values }}'
