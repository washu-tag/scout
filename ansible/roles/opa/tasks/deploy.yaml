---
# Deploy OPA as a Deployment + Service in the Trino namespace.
# Trino's access-control plugin queries the Service URL set in the trino role.
#
# Policy + static data are loaded from a ConfigMap mounted as files. Per-user
# attribute data is layered on top by OPA's bundle plugin (ADR 0021): the
# Keycloak SPI listener publishes a bundle to MinIO; OPA polls and atomically
# swaps the `data.users` subtree. A policy-hash annotation forces a rollout
# on policy or static-data changes so the clean-cache guarantee is explicit;
# the bundle plugin's own readiness gate keeps new pods from serving until
# the first bundle load completes.

- name: Resolve OPA policy path on disk
  ansible.builtin.set_fact:
    # policy/trino/ at repo root. Relative from this role:
    #   ansible/roles/opa/tasks → ../../../../policy/trino
    opa_policy_path: '{{ role_path }}/../../../policy/trino/main.rego'

- name: Render OPA static data document
  ansible.builtin.set_fact:
    opa_data_json: >-
      {{ {
        "filtered_tables": (trino_filtered_tables | default([])),
        "hidden_tables": (trino_hidden_tables | default([])),
        "view_owner_principals": (trino_view_owner_principals | default([])),
        "attribute_filters": (trino_attribute_filters | default({})),
        "masked_columns": (trino_masked_columns | default([])),
        "approved_groups": (trino_approved_groups | default([])),
      } | to_json }}

- name: Render OPA bundle plugin config
  ansible.builtin.set_fact:
    # `services.minio` + `bundles.scout-users` wire the bundle plugin to
    # the MinIO endpoint and credentials. `roots: ["users"]` in the
    # bundle's .manifest scopes the atomic swap to the `data.users`
    # subtree, so the static document above isn't replaced on every
    # pull. `persist: true` writes the last successfully loaded bundle
    # to a pod-local emptyDir so a restart during a MinIO outage
    # doesn't drop OPA to deny-all. Polling interval 5–10s comfortably
    # hits ADR 0020's real-time-offboarding requirement.
    # Built as a dict + serialized with to_nice_yaml — the previous
    # `| indent(N)` approach mangled block-scalar strip indentation
    # when the result was substituted into a parent literal block.
    opa_config_yaml: >-
      {{ {
        'services': {
          'minio': {
            'url': opa_bundle_minio_url,
            'credentials': {'s3_signing': {'environment_credentials': {}}},
          },
        },
        'bundles': {
          'scout-users': {
            'service': 'minio',
            'resource': opa_bundles_bucket ~ '/scout/bundle.tar.gz',
            'polling': {
              'min_delay_seconds': opa_bundle_min_delay_seconds,
              'max_delay_seconds': opa_bundle_max_delay_seconds,
            },
            'persist': true,
          },
        },
        'decision_logs': {
          'console': true,
          'reporting': {
            'min_delay_seconds': opa_decision_log_min_delay_seconds,
            'max_delay_seconds': opa_decision_log_max_delay_seconds,
          },
        },
      } | to_nice_yaml(indent=2, width=200) }}

- name: Create OPA policy + data + config ConfigMap
  delegate_to: localhost
  # ConfigMap definition built as a dict, not a templated literal-block
  # string. Earlier iterations used `definition: |` plus `| indent(N)`
  # to embed the multi-line .rego, but with three nested literal-block
  # scalars (outer definition, inner policy.rego/data.json/config.yaml)
  # the strip-indent math is fragile — config.yaml in particular
  # rendered with top-level keys after the first at col 6 instead of
  # col 0, which OPA's YAML parser rejected at line 8. The values are
  # built in a `vars:` block so Jinja substitution happens at the
  # Python-string level (newlines, quotes preserved verbatim);
  # kubernetes.core.k8s then serializes the dict into the ConfigMap
  # without re-parsing the value strings as YAML.
  vars:
    _configmap_data:
      policy.rego: "{{ lookup('file', opa_policy_path) }}"
      data.json: '{{ opa_data_json }}'
      config.yaml: '{{ opa_config_yaml }}'
  kubernetes.core.k8s:
    state: present
    kubeconfig: '{{ local_kubeconfig_yaml }}'
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: opa-trino-policy
        namespace: '{{ opa_namespace }}'
        labels:
          app: opa-trino
      data: '{{ _configmap_data }}'

- name: Create OPA bundle reader Secret
  delegate_to: localhost
  kubernetes.core.k8s:
    state: present
    kubeconfig: '{{ local_kubeconfig_yaml }}'
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: opa-bundle-reader
        namespace: '{{ opa_namespace }}'
        labels:
          app: opa-trino
      type: Opaque
      stringData:
        # AWS-style env vars are what OPA's `environment_credentials`
        # reads at bundle-pull time. AWS_REGION is required even for
        # MinIO (the SDK's credential resolver fails closed if it's
        # unset — "no AWS_REGION set in environment" — regardless of
        # whether the target server actually cares about region). The
        # access/secret pair are the same values rendered into MinIO's
        # `{{ s3_opa_bundle_reader }}-creds` Secret in scout-data;
        # mirrored here so the cross-namespace dependency stays
        # explicit.
        AWS_ACCESS_KEY_ID: '{{ s3_opa_bundle_reader }}'
        AWS_SECRET_ACCESS_KEY: '{{ s3_opa_bundle_reader_secret }}'
        AWS_REGION: '{{ s3_region }}'

- name: Deploy OPA
  delegate_to: localhost
  kubernetes.core.k8s:
    state: present
    kubeconfig: '{{ local_kubeconfig_yaml }}'
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: opa-trino
        namespace: '{{ opa_namespace }}'
        labels:
          app: opa-trino
      spec:
        replicas: '{{ opa_replicas }}'
        selector:
          matchLabels:
            app: opa-trino
        template:
          metadata:
            labels:
              app: opa-trino
            annotations:
              # Force a rollout when policy OR static data OR bundle
              # config OR the bundle-reader credentials change. The
              # bundle itself is pulled at runtime and doesn't need a
              # rollout — that's the whole point of ADR 0021 — but
              # envFrom secretRef values are evaluated at pod-creation
              # time, so a Secret rotation without a pod restart leaves
              # the running pod stuck with stale credentials. Hashing
              # the secret values into this annotation makes credential
              # rotation observable to the Deployment controller.
              # sha256-truncated to 8 chars so the values don't appear
              # in clear text anywhere in the rendered manifest.
              policy-hash: '{{ (lookup("file", opa_policy_path) ~ opa_data_json ~ opa_config_yaml ~ s3_opa_bundle_reader ~ s3_opa_bundle_reader_secret ~ s3_region) | hash("sha256") | truncate(8, True, "") }}'
          spec:
            containers:
              - name: opa
                image: '{{ opa_image }}:{{ opa_image_tag }}'
                args:
                  - run
                  - --server
                  - --addr=0.0.0.0:8181
                  - --log-level=info
                  - --log-format=json
                  - --config-file=/policies/config.yaml
                  - /policies/policy.rego
                  - /policies/data.json
                ports:
                  - name: http
                    containerPort: 8181
                envFrom:
                  - secretRef:
                      name: opa-bundle-reader
                resources:
                  requests:
                    cpu: '{{ opa_cpu_request }}'
                    memory: '{{ opa_memory_request }}'
                  limits:
                    cpu: '{{ opa_cpu_limit }}'
                    memory: '{{ opa_memory_limit }}'
                readinessProbe:
                  httpGet:
                    # ?bundles makes the probe block on a successful first
                    # bundle activation — new pods stay out of the Service
                    # endpoint list until they hold valid data.users. Cold
                    # start under the previous pull-on-decision model didn't
                    # need this; under ADR 0021 it's essential.
                    path: /health?bundles
                    port: http
                  initialDelaySeconds: 3
                  periodSeconds: 5
                livenessProbe:
                  httpGet:
                    path: /health
                    port: http
                  initialDelaySeconds: 5
                  periodSeconds: 30
                volumeMounts:
                  - name: policies
                    mountPath: /policies
                    readOnly: true
                  - name: bundle-cache
                    mountPath: /.opa
                securityContext:
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
                  capabilities:
                    drop: [ALL]
            volumes:
              - name: policies
                configMap:
                  name: opa-trino-policy
              - name: bundle-cache
                # OPA's bundle plugin writes the last-known-good tarball
                # here when persist:true is set. EmptyDir is fine — on
                # pod restart the bundle plugin re-pulls from MinIO
                # before the readiness probe lets the pod serve traffic.
                emptyDir: {}

- name: Expose OPA via ClusterIP Service
  delegate_to: localhost
  kubernetes.core.k8s:
    state: present
    kubeconfig: '{{ local_kubeconfig_yaml }}'
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: opa-trino
        namespace: '{{ opa_namespace }}'
        labels:
          app: opa-trino
      spec:
        selector:
          app: opa-trino
        ports:
          - name: http
            port: 8181
            targetPort: http
            protocol: TCP
