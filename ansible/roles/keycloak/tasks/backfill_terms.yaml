---
# One-shot back-fill: add the TERMS_AND_CONDITIONS required action to every
# user created before this feature was introduced.
#
# defaultAction: true in the realm JSON only affects users created AFTER the
# flag was set, so pre-existing users will never be prompted without this task.
# The script (files/backfill_terms.sh) is idempotent — it skips users who
# already have the action pending or who have the terms_and_conditions
# attribute set.
#
# We stream the script into the pod via `kubectl exec -i` with `bash -s`
# (the Keycloak image is minimal and has no `tar`, ruling out `kubectl cp`).
#
# Gate with: -e keycloak_terms_backfill_existing_users=true

- name: Look up Keycloak pod for back-fill
  delegate_to: localhost
  kubernetes.core.k8s_info:
    kind: Pod
    namespace: '{{ keycloak_namespace }}'
    label_selectors:
      - 'app=keycloak'
    kubeconfig: '{{ local_kubeconfig_yaml }}'
  register: keycloak_pods

- name: Fail if no Keycloak pod is ready
  ansible.builtin.fail:
    msg: 'No Keycloak pod found in namespace {{ keycloak_namespace }}'
  when: keycloak_pods.resources | length == 0

- name: Read Keycloak admin password from cluster secret
  delegate_to: localhost
  no_log: true
  kubernetes.core.k8s_info:
    kind: Secret
    name: keycloak-admin-secret
    namespace: '{{ keycloak_namespace }}'
    kubeconfig: '{{ local_kubeconfig_yaml }}'
  register: keycloak_admin_secret

- name: Authenticate kcadm in Keycloak pod
  delegate_to: localhost
  no_log: true
  kubernetes.core.k8s_exec:
    namespace: '{{ keycloak_namespace }}'
    pod: '{{ keycloak_pods.resources[0].metadata.name }}'
    kubeconfig: '{{ local_kubeconfig_yaml }}'
    command: >-
      /opt/keycloak/bin/kcadm.sh config credentials
      --server http://localhost:8080
      --realm master
      --user {{ keycloak_bootstrap_admin_user }}
      --password {{ keycloak_admin_secret.resources[0].data.password | b64decode }}

- name: Stream back-fill script into Keycloak pod and run it
  delegate_to: localhost
  ansible.builtin.shell:
    cmd: >-
      kubectl --kubeconfig {{ local_kubeconfig_yaml | quote }}
      -n {{ keycloak_namespace | quote }}
      exec -i {{ keycloak_pods.resources[0].metadata.name | quote }} --
      bash -s {{ keycloak_realm_name | quote }}
      < {{ (role_path ~ '/files/backfill_terms.sh') | quote }}
  register: backfill_result
  changed_when: '"added TERMS_AND_CONDITIONS" in backfill_result.stdout'

- name: Report back-fill results
  ansible.builtin.debug:
    var: backfill_result.stdout_lines
