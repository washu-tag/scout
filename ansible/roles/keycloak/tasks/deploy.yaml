---
- name: Create Keycloak namespace
  kubernetes.core.k8s:
    name: '{{ keycloak_namespace }}'
    api_version: v1
    kind: Namespace
    state: present

- name: Deploy Keycloak Operator and CRDs
  delegate_to: localhost
  environment:
    K8S_AUTH_KUBECONFIG: '{{ local_kubeconfig_yaml }}'
  block:
    - name: Apply Keycloak CRD
      no_log: true
      kubernetes.core.k8s:
        state: present
        src: '{{ keycloak_crd_url }}'

    - name: Apply Keycloak KeycloakRealmImport CRD
      no_log: true
      kubernetes.core.k8s:
        state: present
        src: '{{ keycloak_realmimport_crd_url }}'

    - name: Apply Keycloak Operator
      no_log: true
      kubernetes.core.k8s:
        state: present
        src: '{{ keycloak_operator_url }}'
        namespace: '{{ keycloak_namespace }}'

- name: Wait for Keycloak Operator to be ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: keycloak-operator
    namespace: '{{ keycloak_namespace }}'
    wait: true
    wait_condition:
      type: Progressing
      status: 'True'
      reason: NewReplicaSetAvailable
    wait_timeout: 300

- name: Initialize Keycloak database
  ansible.builtin.include_role:
    name: scout_common
    tasks_from: create_db_with_owner
  vars:
    db_name: keycloak
    db_owner: '{{ keycloak_postgres_user }}'
    db_owner_pass: '{{ keycloak_postgres_password }}'

- name: Create Keycloak DB secret
  no_log: true
  kubernetes.core.k8s:
    state: present
    namespace: '{{ keycloak_namespace }}'
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: keycloak-db-secret
      type: Opaque
      stringData:
        username: '{{ keycloak_postgres_user }}'
        password: '{{ keycloak_postgres_password }}'

- name: Create Keycloak Admin Credential Secret
  no_log: true
  kubernetes.core.k8s:
    state: present
    namespace: '{{ keycloak_namespace }}'
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: keycloak-admin-secret
      type: Opaque
      stringData:
        username: '{{ keycloak_bootstrap_admin_user }}'
        password: '{{ keycloak_bootstrap_admin_password }}'

- name: Compute proxy mappings for air-gapped IdP access
  when: air_gapped | default(false) | bool
  block:
    - name: Verify staging group exists
      ansible.builtin.assert:
        that:
          - groups.get('staging', []) | length > 0
        fail_msg: "air_gapped is true but no hosts are defined in the 'staging' inventory group"

    - name: Resolve staging hostname and proxy port
      ansible.builtin.set_fact:
        _staging_hostname: "{{ hostvars[groups['staging'][0]].external_url | default(groups['staging'][0]) }}"
        _squid_port: "{{ hostvars[groups['staging'][0]].squid_port | default(squid_port) }}"
        _proxy_mappings: []

    - name: Add Microsoft IdP proxy mappings
      when:
        - keycloak_microsoft_client_id is defined
        - keycloak_microsoft_client_id | length > 0
      ansible.builtin.set_fact:
        _proxy_mappings: "{{ _proxy_mappings + [
          'login\\.microsoftonline\\.com;http://' ~ _staging_hostname ~ ':' ~ _squid_port,
          'graph\\.microsoft\\.com;http://' ~ _staging_hostname ~ ':' ~ _squid_port
          ] }}"

    - name: Add GitHub IdP proxy mappings
      when:
        - keycloak_gh_client_id is defined
        - keycloak_gh_client_id | length > 0
      ansible.builtin.set_fact:
        _proxy_mappings: "{{ _proxy_mappings + [
          'github\\.com;http://' ~ _staging_hostname ~ ':' ~ _squid_port,
          'api\\.github\\.com;http://' ~ _staging_hostname ~ ':' ~ _squid_port
          ] }}"

    - name: Build proxy-mappings option
      when: _proxy_mappings | length > 0
      ansible.builtin.set_fact:
        _keycloak_proxy_options:
          - name: spi-connections-http-client-default-proxy-mappings
            value: "{{ _proxy_mappings | join(',') }}"

    - name: Default empty if no IdP configured
      when: _proxy_mappings | length == 0
      ansible.builtin.set_fact:
        _keycloak_proxy_options: []

- name: Default empty proxy options when not air-gapped
  when: not (air_gapped | default(false) | bool)
  ansible.builtin.set_fact:
    _keycloak_proxy_options: []

- name: Create Keycloak CR
  vars:
    _keycloak_base_options:
      - name: metrics-enabled
        value: 'true'
      - name: event-metrics-user-enabled
        value: 'true'
      - name: event-metrics-user-tags
        value: 'realm,idp,clientId'
      - name: spi-events-listener-jboss-logging-success-level
        value: info
        # Hacky way to get an env variable into the Keycloak pod until the operator supports it natively
      - name: scout-url
        value: '{{ server_hostname }}'
  kubernetes.core.k8s:
    state: present
    namespace: '{{ keycloak_namespace }}'
    definition:
      apiVersion: k8s.keycloak.org/v2alpha1
      kind: Keycloak
      metadata:
        name: keycloak
      spec:
        instances: 1
        image: '{{ keycloak_image_repository }}:{{ keycloak_image_tag }}'
        bootstrapAdmin:
          user:
            secret: keycloak-admin-secret
        db:
          vendor: postgres
          usernameSecret:
            name: keycloak-db-secret
            key: username
          passwordSecret:
            name: keycloak-db-secret
            key: password
          host: '{{ db_host }}'
          database: keycloak
          port: '{{ db_port}}'
        http:
          httpEnabled: true
        hostname:
          hostname: 'keycloak.{{ server_hostname }}'
        ingress:
          enabled: false
        proxy:
          headers: xforwarded
        additionalOptions: "{{ _keycloak_base_options + _keycloak_proxy_options }}"

# The operator wants to use a subdomain and does not appear to support a path-based ingress
- name: Create Keycloak Ingress
  kubernetes.core.k8s:
    state: present
    namespace: '{{ keycloak_namespace }}'
    definition:
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: keycloak-ingress
        namespace: '{{ keycloak_namespace }}'
      spec:
        ingressClassName: traefik
        rules:
          - host: 'keycloak.{{ server_hostname }}'
            http:
              paths:
                - backend:
                    service:
                      name: keycloak-service
                      port:
                        name: http
                  path: /
                  pathType: Prefix

- name: Wait for Keycloak to be ready
  kubernetes.core.k8s_info:
    api_version: k8s.keycloak.org/v2alpha1
    kind: Keycloak
    name: keycloak
    namespace: '{{ keycloak_namespace }}'
    wait: true
    wait_condition:
      type: Ready
      status: 'True'
    wait_timeout: 300
