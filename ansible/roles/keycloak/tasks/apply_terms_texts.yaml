---
# POST per-site Terms of Use text via the Keycloak realm-localization API.
#
# keycloak-config-cli does not import `localizationTexts` from the realm JSON
# (https://github.com/adorsys/keycloak-config-cli/issues/1290), so the
# overrides need a separate admin-API call. The realm attribute
# `scout_terms_hash` — set by the ScoutTermsRequiredAction SPI's contract —
# IS imported via the realm JSON, and the Java required-action compares it
# to a per-user attribute to decide whether to prompt on each login.
#
# Idempotency: hash `keycloak_terms_localizations`, compare against the
# realm attribute. Same hash → no-op. Different hash → POST new
# localization. (The SPI's user-prompt behavior kicks in automatically
# because realm-attribute changes are applied by config-cli.)

- name: Look up Keycloak pod for localization overrides
  delegate_to: localhost
  kubernetes.core.k8s_info:
    kind: Pod
    namespace: '{{ keycloak_namespace }}'
    label_selectors:
      - 'app=keycloak'
    kubeconfig: '{{ local_kubeconfig_yaml }}'
  register: keycloak_pods_for_i18n

- name: Fail if no Keycloak pod is ready
  ansible.builtin.fail:
    msg: 'No Keycloak pod found in namespace {{ keycloak_namespace }}'
  when: keycloak_pods_for_i18n.resources | length == 0

- name: Read Keycloak admin password from cluster secret
  delegate_to: localhost
  no_log: true
  kubernetes.core.k8s_info:
    kind: Secret
    name: keycloak-admin-secret
    namespace: '{{ keycloak_namespace }}'
    kubeconfig: '{{ local_kubeconfig_yaml }}'
  register: keycloak_admin_secret_for_i18n

- name: Authenticate kcadm in Keycloak pod
  delegate_to: localhost
  no_log: true
  kubernetes.core.k8s_exec:
    namespace: '{{ keycloak_namespace }}'
    pod: '{{ keycloak_pods_for_i18n.resources[0].metadata.name }}'
    kubeconfig: '{{ local_kubeconfig_yaml }}'
    command: >-
      /opt/keycloak/bin/kcadm.sh config credentials
      --server http://localhost:8080
      --realm master
      --user {{ keycloak_bootstrap_admin_user }}
      --password {{ keycloak_admin_secret_for_i18n.resources[0].data.password | b64decode }}

- name: Fetch current realm attributes
  delegate_to: localhost
  kubernetes.core.k8s_exec:
    namespace: '{{ keycloak_namespace }}'
    pod: '{{ keycloak_pods_for_i18n.resources[0].metadata.name }}'
    kubeconfig: '{{ local_kubeconfig_yaml }}'
    command: '/opt/keycloak/bin/kcadm.sh get realms/{{ keycloak_realm_name }} --fields attributes'
  register: realm_attrs_raw
  changed_when: false

- name: Compute desired vs applied terms hash
  ansible.builtin.set_fact:
    # The realm attribute is set via the realm JSON (templated from the same
    # expression), so after config-cli re-imports it reflects the current
    # inventory content. We compare against it to decide whether the
    # localization POST is needed.
    current_localization_hash: >-
      {{ (realm_attrs_raw.stdout | from_json).attributes.scout_terms_hash | default('') }}
    desired_localization_hash: >-
      {{ keycloak_terms_localizations | to_json(sort_keys=true) | hash('sha256') | truncate(16, True, '') }}

- name: Report terms localization state
  ansible.builtin.debug:
    msg: >-
      terms hash current={{ current_localization_hash }} desired={{ desired_localization_hash }}
      {% if current_localization_hash == desired_localization_hash %}(up-to-date, skipping localization POST){% else %}(will POST new localization){% endif %}

- name: POST Terms of Use localization overrides
  when: current_localization_hash != desired_localization_hash
  block:
    - name: Write terms localization JSON to local tempfile
      delegate_to: localhost
      ansible.builtin.copy:
        dest: /tmp/scout-terms-localization.json
        content: '{{ keycloak_terms_localizations | to_json }}'
        mode: '0600'

    - name: Stream terms localization JSON into Keycloak pod
      delegate_to: localhost
      ansible.builtin.shell:
        cmd: >-
          kubectl --kubeconfig {{ local_kubeconfig_yaml | quote }}
          -n {{ keycloak_namespace | quote }}
          exec -i {{ keycloak_pods_for_i18n.resources[0].metadata.name | quote }} --
          sh -c 'cat > /tmp/scout-terms.json'
          < /tmp/scout-terms-localization.json
      changed_when: true

    - name: Upsert localization overrides to Keycloak
      delegate_to: localhost
      kubernetes.core.k8s_exec:
        namespace: '{{ keycloak_namespace }}'
        pod: '{{ keycloak_pods_for_i18n.resources[0].metadata.name }}'
        kubeconfig: '{{ local_kubeconfig_yaml }}'
        command: >-
          /opt/keycloak/bin/kcadm.sh create
          realms/{{ keycloak_realm_name }}/localization/en
          -f /tmp/scout-terms.json

    - name: Clean up terms JSON inside pod
      delegate_to: localhost
      kubernetes.core.k8s_exec:
        namespace: '{{ keycloak_namespace }}'
        pod: '{{ keycloak_pods_for_i18n.resources[0].metadata.name }}'
        kubeconfig: '{{ local_kubeconfig_yaml }}'
        command: rm -f /tmp/scout-terms.json

    - name: Remove local terms JSON tempfile
      delegate_to: localhost
      ansible.builtin.file:
        path: /tmp/scout-terms-localization.json
        state: absent
