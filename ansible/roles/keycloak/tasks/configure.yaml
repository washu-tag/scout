---
# The realm template consumes keycloak_xnat_client_secret inside its
# enable_xnat-gated client block, and the auth play runs before the xnat role
# (whose own assert can therefore never fire first) — fail here with a clear
# message instead of a raw AnsibleUndefinedVariable mid-template.
- name: Validate XNAT client secret is set when enable_xnat is true
  ansible.builtin.assert:
    that:
      - keycloak_xnat_client_secret is defined
      - keycloak_xnat_client_secret | length > 0
    fail_msg: >
      keycloak_xnat_client_secret is required when enable_xnat is true: the
      Keycloak realm provisions the xnat client. Set it in your inventory.yaml
      (use vault encryption).
      Example: openssl rand -hex 16 | ansible-vault encrypt_string --vault-password-file vault/pwd.sh
    quiet: true
  when: enable_xnat | default(false) | bool

- name: Create Secret for Scout Keycloak Realm
  delegate_to: localhost
  no_log: true
  kubernetes.core.k8s:
    state: present
    namespace: '{{ keycloak_namespace }}'
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: keycloak-config
      data:
        scout-realm.json: "{{ lookup('template', 'scout-realm.json.j2') | b64encode }}"
    kubeconfig: '{{ local_kubeconfig_yaml }}'

- name: Run Keycloak Config CLI
  ansible.builtin.include_role:
    name: scout_common
    tasks_from: deploy_helm_chart
  vars:
    helm_chart_name: keycloak-config-cli
    helm_chart_ref: '{{ keycloak_config_cli_helm_chart_ref }}'
    helm_chart_namespace: '{{ keycloak_namespace }}'
    helm_chart_create_namespace: true
    helm_chart_wait: true
    helm_chart_timeout: '5m'
    helm_chart_values:
      image:
        repository: '{{ keycloak_config_cli_image }}'
        tag: '{{ keycloak_config_cli_image_tag }}'
      existingConfigSecret: 'keycloak-config'
      annotations: # Hash the realm config to force re-deploy on changes
        config-hash: '{{ lookup("template", "scout-realm.json.j2") | hash("sha256") | truncate(8, True, "") }}'
      env:
        KEYCLOAK_URL: 'http://keycloak-service.{{ keycloak_namespace }}:8080/'
        KEYCLOAK_USER: '{{ keycloak_bootstrap_admin_user }}'
      existingSecret: keycloak-admin-secret
