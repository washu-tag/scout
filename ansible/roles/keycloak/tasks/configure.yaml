---
- name: Create Secret for Scout Keycloak Realm
  delegate_to: localhost
  no_log: true
  kubernetes.core.k8s:
    state: present
    namespace: '{{ keycloak_namespace }}'
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: keycloak-config
      data:
        scout-realm.json: "{{ lookup('template', 'scout-realm.json.j2') | b64encode }}"
    kubeconfig: '{{ local_kubeconfig_yaml }}'

- name: Run Keycloak Config CLI
  ansible.builtin.include_role:
    name: scout_common
    tasks_from: deploy_helm_chart
  vars:
    helm_chart_name: keycloak-config-cli
    helm_chart_ref: '{{ keycloak_config_cli_helm_chart_ref }}'
    helm_chart_namespace: '{{ keycloak_namespace }}'
    helm_chart_create_namespace: true
    helm_chart_wait: true
    helm_chart_timeout: '5m'
    helm_chart_values:
      image:
        repository: '{{ keycloak_config_cli_image }}'
        tag: '{{ keycloak_config_cli_image_tag }}'
      existingConfigSecret: 'keycloak-config'
      annotations: # Hash the realm config to force re-deploy on changes
        config-hash: '{{ lookup("template", "scout-realm.json.j2") | hash("sha256") | truncate(8, True, "") }}'
      env:
        KEYCLOAK_URL: 'http://keycloak-service.{{ keycloak_namespace }}:8080/'
        KEYCLOAK_USER: '{{ keycloak_bootstrap_admin_user }}'
      existingSecret: keycloak-admin-secret

# Declare the three Scout-specific user attributes written by
# ScoutTermsRequiredAction (scout_terms_hash_accepted,
# scout_terms_accepted_at, scout_admin_approval_email_sent_at) as managed
# attributes in the realm's user-profile config. Managed attributes are
# always admin-visible regardless of the realm's unmanagedAttributePolicy,
# so the feature doesn't depend on a realm-wide policy setting.
- name: Declare Scout user attributes in the realm user-profile
  ansible.builtin.include_tasks: configure_user_profile.yaml
