---
# Default configuration for traefik role
# Configures Traefik ingress controller with TLS termination

# Timeout for waiting on Traefik Helm jobs (in seconds)
traefik_helm_job_timeout: 300
# Inventory requirements depend on tls_mode:
#
# tls_mode: file
#   - tls_cert_path: PEM cert on the k3s server (wildcard cert for the domain)
#   - tls_key_path:  PEM key on the k3s server
#
# tls_mode: cert_manager
#   - cert_manager_acme_account_email
#   - acmedns_host
#   - acmedns_credentials (vault-encrypted)
