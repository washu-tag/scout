---
# One-time uninstall of the legacy Promtail Helm release on clusters that
# were deployed before Alloy replaced it. Idempotent — no-op once gone.
# Safe to remove after Scout 3.1.0 or 4.0.0 (whichever ships first).
- name: Uninstall legacy Promtail Helm release
  ansible.builtin.include_role:
    name: scout_common
    tasks_from: deploy_helm_chart
  vars:
    helm_chart_name: promtail
    helm_chart_namespace: '{{ alloy_namespace }}'
    helm_chart_state: absent
    helm_chart_timeout: '{{ alloy_helm_timeout }}'
    # Setting helm_repo_name (without helm_repo_url) keeps the wrapper's
    # is_local_chart=false branch so use_localhost still tracks air_gapped.
    helm_repo_name: '{{ alloy_helm_repo_name }}'
