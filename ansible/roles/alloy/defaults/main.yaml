---
# Alloy role defaults
# User-configurable settings are in inventory.yaml

# Helm configuration
alloy_helm_repo_name: grafana
alloy_helm_repo_url: https://grafana.github.io/helm-charts
alloy_helm_timeout: 5m

# Namespace (defaults to the shared monitoring namespace from scout_common)
alloy_namespace: '{{ scout_monitoring_namespace }}'

# Loki write endpoint (DaemonSet ships logs here)
alloy_loki_write_url: 'http://loki-gateway.{{ loki_namespace }}.svc.cluster.local:3100/loki/api/v1/push'
