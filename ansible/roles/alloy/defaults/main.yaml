---
# Alloy role defaults
# User-configurable settings are in inventory.yaml

# Helm configuration
alloy_helm_repo_name: grafana
alloy_helm_repo_url: https://grafana.github.io/helm-charts
# DaemonSet rolls one pod at a time across the cluster's nodes with
# the chart's default `maxUnavailable: 1`. 5m was tight on a 4-node
# deployment once readiness gates kicked in (dev04 hit `context
# deadline exceeded` and rolled back). 10m comfortably covers a
# 4–6 node roll plus image pulls.
alloy_helm_timeout: 10m

# Loki write endpoint (DaemonSet ships logs here). loki-gateway is the
# nginx fronting Loki and exposes port 80 (the underlying loki Service
# exposes 3100, but the gateway is the supported entry point).
alloy_loki_write_url: 'http://loki-gateway.{{ loki_namespace }}.svc.cluster.local/loki/api/v1/push'

# DaemonSet tolerations. Default tolerates every taint so log collection
# follows pods onto control-plane, GPU, and custom-tainted nodes. Override
# in inventory.yaml with a narrower list if some nodes should be excluded.
alloy_tolerations:
  - operator: Exists
