---
# Default values for Temporal deployment

# Temporal versions (updated October 2025)
temporal_version: ~0.67.0  # Latest: 0.67.0 (Artifact Hub)
cass_operator_version: ~0.60.0  # Latest: 0.60.0 (Artifact Hub)

# Storage naming
cassandra_name: cassandra
cassandra_storage_class: '{{ cassandra_name }}-storage'
elasticsearch_name: elasticsearch
elasticsearch_storage_class: '{{ elasticsearch_name }}-storage'

# Storage definitions for persistent volumes
temporal_storage_definitions:
  - name: '{{ cassandra_name }}'
    size: "{{ cassandra_storage_size | default('100Gi') }}"
    path: '{{ temporal_cassandra_dir }}'
    pv_name: '{{ cassandra_name }}-pv'
    storage_class_name: '{{ cassandra_storage_class }}'
  - name: '{{ elasticsearch_name }}'
    size: "{{ elasticsearch_storage_size | default('100Gi') }}"
    path: '{{ temporal_elasticsearch_dir }}'
    pv_name: '{{ elasticsearch_name }}-pv'
    storage_class_name: '{{ elasticsearch_storage_class }}'

# Cassandra configuration
cassandra_server_version: 5.0.3  # Latest stable: 5.0.3 (2025)
cassandra_replica_count: 1
temporal_cassandra_init_heap: 2G
temporal_cassandra_max_heap: 8G

# Elasticsearch configuration
elasticsearch_replica_count: 1

# Temporal server configuration
temporal_server_replica_count: 1
