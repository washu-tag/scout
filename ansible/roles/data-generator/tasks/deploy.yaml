---
- name: Create data-generator namespace
  kubernetes.core.k8s:
    name: '{{ data_generator_namespace }}'
    api_version: v1
    kind: Namespace
    state: present

- name: Deploy data-generator
  ansible.builtin.include_role:
    name: scout_common
    tasks_from: deploy_helm_chart
  vars:
    helm_chart_name: data-generator
    # Pull the published OCI chart from GHCR (helm runs on the jump node via the
    # wrapper's localhost delegation). Dev override: data_generator_chart_path
    # points helm at a local chart dir, in which case no --version is passed
    # (helm rejects --version with a local path).
    helm_chart_ref: '{{ data_generator_chart_path | default(data_generator_chart_oci_ref) }}'
    helm_chart_version: '{{ data_generator_chart_version if data_generator_chart_path is not defined else omit }}'
    helm_chart_namespace: '{{ data_generator_namespace }}'
    helm_chart_values:
      replicaCount: '{{ data_generator_replicas }}'
      image:
        repository: '{{ data_generator_image_repository }}'
        tag: '{{ data_generator_image_tag }}'
        pullPolicy: '{{ data_generator_pull_policy }}'
      resources: '{{ data_generator_resources_default | combine(data_generator_resources | default({}), recursive=true) }}'
      volumes:
        - name: data
          hostPath:
            path: '{{ data_generator_workspace }}'
        - name: output
          hostPath:
            path: '{{ data_generator_output }}'
      config:
        application:
          spring:
            temporal:
              connection:
                target: 'temporal-internal-frontend.{{ scout_extractor_namespace }}:7236'
      env:
        secrets: '{{ data_generator_secrets }}'
      javaToolOptions: '{{ data_generator_java_tool_opts }}'
