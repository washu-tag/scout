---
# Default values for custom data-generator

# --- Upstream chart (washu-tag/data-generator, published as an OCI artifact) ---
# Pulled directly from GHCR by helm on the jump node. data_generator_chart_version
# is pinned in group_vars/all/versions.yaml (Renovate-monitored, per ADR 0015).
# Dev override: set data_generator_chart_path to a local chart dir for
# unpublished edits.
data_generator_chart_oci_ref: oci://ghcr.io/washu-tag/charts/data-generator

# Storage configuration
data_generator_workspace: /beegfs/shared/data-generator-input
data_generator_output: /beegfs/shared/data-generator

# Resource configuration
data_generator_resources_default:
  requests:
    cpu: 1
    memory: 4Gi
  limits:
    memory: 16Gi
data_generator_java_tool_opts: '-XX:MaxRAMPercentage=75.0'

# Deployment/container parameters
data_generator_replicas: 1
data_generator_image_repository: ghcr.io/washu-tag/data-generator
data_generator_image_tag: latest
data_generator_pull_policy: IfNotPresent

# Secrets to auth to external LLMs
data_generator_secrets: {}
