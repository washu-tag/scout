replicaCount: 1

image:
  repository: xnatworks/xnat-web
  tag: '1.9.2.1'

redis:
  enabled: false

activemq:
  broker:
    enabled: false

cnpg:
  cluster:
    enabled: true
    instances: 1
    storage:
      size: 10Gi
      storageClass: local-path
    credentials:
      database: xnat
      username: xnat
      password: xnatdevpgpassword
  # Workaround for a chart bug in templates/_postgresql.tpl: the else
  # branch of postgresqlPort emits `"5432"` on its own line with no
  # whitespace trimmer, so the rendered wait-for-postgres init container
  # ends up with a literal newline before the port and the YAML block
  # scalar breaks. Setting the value here makes the chart take the (clean)
  # `if` branch instead. The number itself is unchanged.
  external:
    postgresqlPort: 5432

ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: traefik
  hosts:
    - host: xnat.dev03.tag.rcif.io
      paths:
        - path: /
          pathType: Prefix

volumes:
  xnatdata:
    accessMode: ReadWriteOnce
    storageClass: local-path
    size: 10Gi
  build:
    accessMode: ReadWriteOnce
    storageClass: local-path
    size: 5Gi
  cache:
    accessMode: ReadWriteOnce
    storageClass: local-path
    size: 10Gi
  archive:
    accessMode: ReadWriteOnce
    storageClass: local-path
    size: 10Gi
  prearchive:
    accessMode: ReadWriteOnce
    storageClass: local-path
    size: 5Gi

authplugins:
  keycloak:
    provider: keycloak
    auth: true

# Skip XNAT's first-boot setup wizard. The xnat-prefs-init Secret (created
# out-of-band before helm install) contains a prefs-init.ini file that XNAT
# consumes on first launch and self-completes the wizard, keeping the deploy
# non-interactive and reproducible.
extraVolumes:
  - name: prefs-init
    secret:
      secretName: xnat-prefs-init
extraVolumeMounts:
  - name: prefs-init
    mountPath: /data/xnat/home/config/prefs-init.ini
    subPath: prefs-init.ini

# Bump the startup probe so Hibernate's first-boot DDL has time to finish.
# Chart default (failureThreshold=15 * periodSeconds=10 = 150s) is too tight;
# real first-boot is 3-5 min. 60 * 10s = 10 min budget.
probes:
  startup:
    failureThreshold: 60

initContainers:
  - name: install-openid-plugin
    image: curlimages/curl:8.10.1
    command: ['sh', '-c']
    args:
      - >
        set -e;
        curl -fsSL -o /data/xnat/home/plugins/openid-auth-plugin.jar
        https://bitbucket.org/xnatx/openid-auth-plugin/downloads/openid-auth-plugin-1.4.1-xpl.jar
    volumeMounts:
      - name: home-plugins
        mountPath: /data/xnat/home/plugins
