replicaCount: 1

# XNAT 1.10.0: upstream re-cut the image so the Temurin JRE (21) now matches the
# nrg JAR bytecode level (JDK 21). The earlier 1.10.0 image shipped a JDK 8 JRE
# against JDK 21 bytecode and never wired Spring; that is fixed.
image:
  repository: xnatworks/xnat-web
  tag: '1.10.0'

redis:
  enabled: false

activemq:
  broker:
    enabled: false

cnpg:
  cluster:
    enabled: true
    instances: 1
    storage:
      size: 10Gi
      storageClass: local-path
    credentials:
      database: xnat
      username: xnat
      password: xnatdevpgpassword
  # Workaround for a chart bug in templates/_postgresql.tpl (else branch of
  # postgresqlPort emits "5432" with no whitespace trimmer, breaking the YAML).
  external:
    postgresqlPort: 5432

ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: traefik
    # oauth2-proxy ForwardAuth + error redirect + Scout-wide security headers.
    # oauth2-proxy remains the edge approval gate; the openid plugin's
    # /openid-login is an app-level callback behind this middleware.
    traefik.ingress.kubernetes.io/router.middlewares: >-
      kube-system-oauth2-proxy-error@kubernetescrd,
      kube-system-oauth2-proxy-auth@kubernetescrd
  hosts:
    - host: xnat.dev03.tag.rcif.io
      paths:
        - path: /
          pathType: Prefix

volumes:
  xnatdata:
    accessMode: ReadWriteOnce
    storageClass: local-path
    size: 10Gi
  build:
    accessMode: ReadWriteOnce
    storageClass: local-path
    size: 5Gi
  cache:
    accessMode: ReadWriteOnce
    storageClass: local-path
    size: 10Gi
  archive:
    accessMode: ReadWriteOnce
    storageClass: local-path
    size: 10Gi
  prearchive:
    accessMode: ReadWriteOnce
    storageClass: local-path
    size: 5Gi

# The xnat-openid-auth-plugin makes XNAT its own confidential OIDC client and
# runs its own authorization-code flow against Keycloak. Its config is delivered
# as a provider-properties file, not via extraConfig. The chart's `authplugins`
# mechanism mounts Secret `xnat-plugin-keycloak` (key `openid-provider-properties`)
# at config/auth/openid-provider.properties. We set `provider: openid` so the
# mounted filename is `openid-provider.properties` (what the plugin expects),
# with the provider's own id set to `keycloak` inside the file.
authplugins:
  keycloak:
    provider: openid
    auth: true

# Skip XNAT's first-boot setup wizard via the xnat-prefs-init Secret, and mount
# the openid plugin JAR Secret so the install-openid-plugin init container can
# copy it into the plugins dir.
extraVolumes:
  - name: prefs-init
    secret:
      secretName: xnat-prefs-init
  - name: openid-plugin-jar
    secret:
      secretName: openid-auth-plugin-jar
extraVolumeMounts:
  - name: prefs-init
    mountPath: /data/xnat/home/config/prefs-init.ini
    subPath: prefs-init.ini

# Bump the startup probe so Hibernate's first-boot DDL has time to finish
# (real first-boot is 3-5 min). 60 * 10s = 10 min budget; pairs with
# helm install --wait --timeout 20m.
probes:
  startup:
    failureThreshold: 60

# Pattern A delivery: copy the plugin JAR from a mounted Secret into the shared
# home-plugins volume. Air-gap friendly; no deploy-time egress. (The cluster
# can't resolve bitbucket.org anyway, so Pattern B is not an option here.)
initContainers:
  - name: install-openid-plugin
    image: busybox:1.36
    command: ['sh', '-c']
    args:
      - >
        set -e;
        cp /mnt/openid-plugin/plugin.jar /data/xnat/home/plugins/openid-auth-plugin.jar;
        ls -l /data/xnat/home/plugins
    volumeMounts:
      - name: home-plugins
        mountPath: /data/xnat/home/plugins
      - name: openid-plugin-jar
        mountPath: /mnt/openid-plugin
        readOnly: true
