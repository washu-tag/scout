[siteConfig]
siteUrl=https://xnat.dev03.tag.rcif.io
siteId=scout-xnat-dev03
adminEmail=admin@dev03.tag.rcif.io
smtpEnabled=false
initialized=true
requireLogin=true
# Enable the openid plugin's `keycloak` provider on the login page. Without this,
# enabledProviders defaults to ['localdb'] and the "Sign in with Scout" link never
# renders (the provider must be in this list for XnatProviderManager to surface it).
# Dropping 'localdb' leaves only the SSO button (admin/admin still works via the REST API).
# Single-quoted JSON matches XNAT's own default-value format for this list preference.
enabledProviders=['keycloak']
