# xnat-openid-auth-plugin provider config for Scout / Keycloak.
# Mounted by the chart's `authplugins` mechanism at
# /data/xnat/home/config/auth/openid-provider.properties
# (entry `keycloak` with `provider: openid` -> file name `openid-provider.properties`,
#  with the provider's own id set to `keycloak` below).
#
# The clientSecret placeholder is substituted with the real Keycloak `xnat`
# client secret when the Secret is created (kept out of git).

auth.method=openid
type=openid
provider.id=keycloak
auto.enabled=true
auto.verified=true
name=Scout SSO

siteUrl=https://xnat.dev03.tag.rcif.io
preEstablishedRedirUri=/openid-login

openid.keycloak.clientId=xnat
openid.keycloak.clientSecret=__XNAT_CLIENT_SECRET__
openid.keycloak.accessTokenUri=https://keycloak.dev03.tag.rcif.io/realms/scout/protocol/openid-connect/token
openid.keycloak.userAuthUri=https://keycloak.dev03.tag.rcif.io/realms/scout/protocol/openid-connect/auth
openid.keycloak.userInfoUri=https://keycloak.dev03.tag.rcif.io/realms/scout/protocol/openid-connect/userinfo
openid.keycloak.scopes=openid,profile,email
openid.keycloak.shouldFilterEmailDomains=false
openid.keycloak.forceUserCreate=true
openid.keycloak.emailProperty=email
openid.keycloak.givenNameProperty=given_name
openid.keycloak.familyNameProperty=family_name
openid.keycloak.pkceEnabled=true
openid.keycloak.usernamePattern=[providerId]-[sub]
openid.keycloak.link=<a href="/openid-login?providerId=keycloak">Sign in with Scout</a>
