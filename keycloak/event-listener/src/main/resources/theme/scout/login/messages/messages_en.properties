termsTitle=Scout Terms of Use

termsBody=<p>Scout processes protected health information. By continuing, I acknowledge each of the following:</p><ul><li>Scout is a research platform and is not approved for clinical care, clinical decision-making, or patient management. I will not rely on its output to inform the diagnosis or treatment of any patient.</li><li>I have completed training on my institution's HIPAA privacy and information security policies and procedures applicable to this project.</li><li>In accordance with my institution's HIPAA policy, I will not access or search for protected health information pertaining to myself, family members, friends, co-workers, or any individual with whom I have a personal relationship, except as required by my authorized research duties.</li><li>I will use AI responsibly in accordance with all applicable laws and my institution's AI policies and procedures.</li><li>I am aware of the implications that AI may have on the results I see in Scout.</li><li>I will take all efforts to minimize the risks and negative impacts associated with the use of AI.</li></ul><p>By clicking <strong>Continue</strong>, I accept the statements above.</p>

doAccept=Continue
doDecline=Decline and sign out
