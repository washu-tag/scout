# Test-only logging config (jboss-logmanager, the backend jboss-logging binds to
# via Keycloak's transitive deps). Wired in build.gradle's `test` task.
#
# Two tests deliberately make the OPA-bundle S3 upload throw / return HTTP 500 to
# assert graceful handling + retry; the code-under-test logs those (correctly) at
# ERROR/WARN, which dumped multi-frame stacktraces into CI for a *passing* build.
# Silence just those two categories under test — production logging is unchanged.

loggers=edu.washu.tag.keycloak.events.MinioBundleUploader,edu.washu.tag.keycloak.events.OpaUserBundlePublisherProviderFactory

logger.level=INFO
logger.handlers=CONSOLE

handler.CONSOLE=org.jboss.logmanager.handlers.ConsoleHandler
handler.CONSOLE.level=ALL
handler.CONSOLE.formatter=PATTERN

formatter.PATTERN=org.jboss.logmanager.formatters.PatternFormatter
formatter.PATTERN.properties=pattern
formatter.PATTERN.pattern=%d{HH:mm:ss,SSS} %-5p [%c] %s%e%n

logger.edu.washu.tag.keycloak.events.MinioBundleUploader.level=OFF
logger.edu.washu.tag.keycloak.events.OpaUserBundlePublisherProviderFactory.level=OFF
