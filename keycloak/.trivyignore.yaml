# Everything below ships inside the upstream quay.io/keycloak/keycloak
# server distribution (its bundled jackson / JDBC-driver jars), not in
# our event-listener provider jar (whose Keycloak deps are compileOnly and
# don't ship). There's nothing to bump in our layer and no fixed base image
# to adopt yet. Revisit when a newer Keycloak release bundles the fixed
# versions.
vulnerabilities:
  # mssql-jdbc (Keycloak bundles JDBC drivers for all supported DBs; Scout
  # uses postgres, so the SQL Server driver is never loaded)
  - id: CVE-2025-59250 # com.microsoft.sqlserver:mssql-jdbc 13.2.1
  # jackson-databind bundled by Keycloak
  - id: CVE-2026-54512 # jackson-databind
  - id: CVE-2026-54513 # jackson-databind
  # postgresql JDBC driver bundled by Keycloak (the driver Scout actually uses).
  # CVE-2026-54291 is a SCRAM channel-binding downgrade that only bites when the
  # client sets channelBinding=require over a MITM'd TLS link; Scout's Keycloak DB
  # connection doesn't. Fixed in pgjdbc 42.7.12, which Keycloak 26.6.4 doesn't
  # bundle yet; drop this once a newer Keycloak base ships the fixed driver.
  - id: CVE-2026-54291 # org.postgresql:postgresql 42.7.11
