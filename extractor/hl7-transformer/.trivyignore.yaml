  - id: CVE-2026-42582 # netty-codec-http3
  - id: CVE-2026-42583 # netty-codec-compression
  - id: CVE-2026-42584 # netty-codec-http
  - id: CVE-2026-42587 # netty-codec-http/http2
  - id: CVE-2026-44249 # netty-handler
  - id: CVE-2026-44892 # netty-codec-http3
  - id: CVE-2026-44894 # netty-codec-classes-quic
  - id: CVE-2026-45416 # netty-handler
